<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaynos — Help Center</title>
  <meta name="theme-color" content="#060609" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    /* Design tokens aligned with Kaynos app (src/styles.css) */
    :root {
      --bg: #060609;
      --bg-elevated: #141418;
      --bg-secondary: #1e1e24;
      --bg-tertiary: #2a2a32;
      --bg-glass: rgba(20, 20, 24, 0.82);
      --bg-hover: rgba(245, 245, 247, 0.04);
      --bg-active: rgba(245, 245, 247, 0.07);
      --text-primary: #f0f0f4;
      --text-secondary: rgba(240, 240, 244, 0.68);
      --text-tertiary: rgba(240, 240, 244, 0.46);
      --border: rgba(240, 240, 244, 0.08);
      --border-strong: rgba(240, 240, 244, 0.15);
      --accent: #3b9eff;
      --accent-hover: #5aafff;
      --accent-soft: rgba(59, 158, 255, 0.12);
      --success: #32D74B;
      --warning: #FF9F0A;
      --danger: #FF453A;
      --font-body: 'Inter', 'Helvetica Neue', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
      --sidebar-w: 280px;
      --header-h: 56px;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 2px 20px rgba(0, 0, 0, 0.30), 0 0 1px rgba(255, 255, 255, 0.04);
      --shadow-lg: 0 12px 48px rgba(0, 0, 0, 0.40), 0 0 1px rgba(255, 255, 255, 0.05);
      --leading-normal: 1.5;
      --leading-relaxed: 1.65;
      --text-base: 0.875rem;
      --text-3xl: 1.875rem;
      --text-xl: 1.25rem;
      --text-lg: 1.0625rem;
      --ease-out: cubic-bezier(0.22, 0.61, 0.36, 1);
      --duration-fast: 0.15s;

      /* Legacy names used in markup */
      --text: var(--text-primary);
      --bg-sidebar: var(--bg-elevated);
      --bg-card: var(--bg-elevated);
      --bg-code: var(--bg-secondary);
      --border-light: var(--border);
      --accent-light: var(--accent-soft);
      --accent-dark: var(--accent-hover);

      color-scheme: dark;
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
      text-size-adjust: 100%;
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }

      html {
        scroll-behavior: auto;
      }
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: var(--bg-tertiary) transparent;
    }

    *::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    *::-webkit-scrollbar-track {
      background: transparent;
    }

    *::-webkit-scrollbar-thumb {
      background: var(--bg-tertiary);
      border-radius: 9999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    ::selection {
      background: rgba(59, 158, 255, 0.30);
      color: var(--text-primary);
    }

    body {
      font-family: var(--font-body);
      color: var(--text);
      background: var(--bg);
      line-height: var(--leading-normal);
      font-size: var(--text-base);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* HEADER */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-h);
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 100;
      gap: 16px
    }

    .header-logo {
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -.02em;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .header-logo span {
      opacity: .4;
      font-weight: 400
    }

    .header-search {
      flex: 1;
      max-width: 400px;
      position: relative
    }

    .header-search input {
      width: 100%;
      height: 36px;
      padding: 0 12px 0 36px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      background: var(--bg-secondary);
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--text);
      outline: none;
      transition: border-color var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out);
    }

    .header-search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(59, 158, 255, 0.12);
    }

    .header-search input::placeholder {
      color: var(--text-tertiary)
    }

    .header-search svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      pointer-events: none
    }

    .menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      padding: 4px
    }

    .search-results {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      max-height: 360px;
      overflow-y: auto;
      display: none;
      box-shadow: var(--shadow-lg);
    }

    .search-results.active {
      display: block
    }

    .search-result {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border-light);
      font-size: 14px
    }

    .search-result:last-child {
      border-bottom: none
    }

    .search-result:hover {
      background: var(--bg-hover);
    }

    .search-result .sr-title {
      font-weight: 500;
      margin-bottom: 2px
    }

    .search-result .sr-section {
      font-size: 12px;
      color: var(--text-tertiary)
    }

    .search-result .sr-snippet {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px
    }

    .search-result mark {
      background: var(--accent-soft);
      color: var(--accent-hover);
      border-radius: 2px;
      padding: 0 2px;
    }

    .search-empty {
      padding: 20px 14px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 14px
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      top: var(--header-h);
      left: 0;
      width: var(--sidebar-w);
      height: calc(100vh - var(--header-h));
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px 0;
      z-index: 90;
      transition: transform 0.25s var(--ease-out);
      box-shadow: inset 0 1px 0 rgba(59, 158, 255, 0.12);
    }

    .sidebar-section {
      margin-bottom: 8px
    }

    .sidebar-section-title {
      padding: 6px 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-tertiary)
    }

    .sidebar-link {
      display: block;
      padding: 6px 20px 6px 28px;
      font-size: 14px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color .1s, background .1s;
      cursor: pointer;
      border-left: 2px solid transparent
    }

    .sidebar-link:hover {
      color: var(--text);
      background: var(--bg-hover);
    }

    .sidebar-link.active {
      color: var(--accent);
      border-left-color: var(--accent);
      font-weight: 600;
      background: var(--accent-soft);
    }

    /* CONTENT */
    .content {
      margin-left: var(--sidebar-w);
      margin-top: var(--header-h);
      min-height: calc(100vh - var(--header-h))
    }

    .content-inner {
      max-width: 740px;
      margin: 0 auto;
      padding: 40px 48px 80px
    }

    /* TYPOGRAPHY */
    .content-inner h1 {
      font-size: var(--text-3xl);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .content-inner h2 {
      font-size: var(--text-xl);
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-top: 40px;
      margin-bottom: 12px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      line-height: 1.3;
    }

    .content-inner h2:first-of-type {
      border-top: none;
      padding-top: 0
    }

    .content-inner h3 {
      font-size: var(--text-lg);
      font-weight: 600;
      margin-top: 28px;
      margin-bottom: 8px;
    }

    .content-inner p {
      margin-bottom: 16px;
      color: var(--text)
    }

    .content-inner ul,
    .content-inner ol {
      margin-bottom: 16px;
      padding-left: 24px
    }

    .content-inner li {
      margin-bottom: 6px;
      color: var(--text)
    }

    .content-inner strong {
      font-weight: 600
    }

    .content-inner code {
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      background: var(--bg-code);
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      color: var(--accent-hover);
    }

    .content-inner a {
      color: var(--accent);
      text-decoration: none;
      transition: color var(--duration-fast) var(--ease-out);
    }

    .content-inner a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    .content-inner hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0
    }

    /* TABLES */
    .content-inner table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
      font-size: 14px
    }

    .content-inner th {
      text-align: left;
      padding: 10px 14px;
      background: var(--bg-code);
      font-weight: 600;
      font-size: 13px;
      border: 1px solid var(--border)
    }

    .content-inner td {
      padding: 10px 14px;
      border: 1px solid var(--border);
      vertical-align: top
    }

    /* HINTS */
    .hint {
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      font-size: var(--text-base);
      display: flex;
      gap: 10px;
      line-height: var(--leading-relaxed);
    }

    .hint-warning {
      background: rgba(255, 159, 10, 0.12);
      border: 1px solid rgba(255, 159, 10, 0.35);
      color: var(--text-primary);
    }

    .hint-info {
      background: var(--accent-soft);
      border: 1px solid rgba(59, 158, 255, 0.35);
      color: var(--text-primary);
    }

    .hint-info a {
      color: var(--accent-hover);
      font-weight: 500;
    }

    .hint-icon {
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 2px
    }

    /* QUICK LINKS */
    .quick-links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px
    }

    .quick-link {
      padding: 14px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      text-decoration: none;
      color: var(--text);
      transition: border-color var(--duration-fast) var(--ease-out),
        box-shadow var(--duration-fast) var(--ease-out),
        background var(--duration-fast) var(--ease-out);
      cursor: pointer;
      font-size: var(--text-base);
    }

    .quick-link:hover {
      border-color: var(--accent);
      background: var(--bg-secondary);
      box-shadow: var(--shadow);
      text-decoration: none;
    }

    .quick-link .ql-title {
      font-weight: 500;
      margin-bottom: 2px
    }

    .quick-link .ql-desc {
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    /* BREADCRUMB */
    .breadcrumb {
      font-size: 0.8125rem;
      color: var(--text-tertiary);
      margin-bottom: 16px;
    }

    .breadcrumb a {
      color: var(--text-tertiary);
      text-decoration: none
    }

    .breadcrumb a:hover {
      color: var(--accent-hover);
    }

    .breadcrumb span {
      margin: 0 6px
    }

    /* FOOTER NAV */
    .footer-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border)
    }

    .footer-nav a {
      text-decoration: none;
      color: var(--text-secondary);
      font-size: var(--text-base);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color var(--duration-fast) var(--ease-out);
    }

    .footer-nav a:hover {
      color: var(--accent-hover);
    }

    .footer-nav .fn-label {
      font-size: 12px;
      color: var(--text-tertiary)
    }

    .footer-nav .fn-title {
      font-weight: 500;
      color: var(--text)
    }

    .footer-nav a:hover .fn-title {
      color: var(--accent-hover);
    }

    /* MOBILE */
    @media(max-width:768px) {
      .sidebar {
        transform: translateX(-100%)
      }

      .sidebar.open {
        transform: translateX(0)
      }

      .content {
        margin-left: 0
      }

      .content-inner {
        padding: 24px 20px 60px
      }

      .menu-btn {
        display: block
      }

      .header-search {
        max-width: none
      }

      .quick-links {
        grid-template-columns: 1fr
      }

      .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 85
      }

      .overlay.active {
        display: block;
      }
    }

    .menu-btn:focus-visible,
    .header-search input:focus-visible,
    .sidebar-link:focus-visible,
    .quick-link:focus-visible,
    .header-logo:focus-visible,
    .footer-nav a:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px rgba(59, 158, 255, 0.55);
    }
  </style>
</head>

<body>

  <header class="header">
    <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
        <line x1="3" y1="5" x2="17" y2="5" />
        <line x1="3" y1="10" x2="17" y2="10" />
        <line x1="3" y1="15" x2="17" y2="15" />
      </svg>
    </button>
    <a href="#" class="header-logo" onclick="navigate('welcome');return false"><svg width="30" height="4"
        viewBox="0 0 30 4" fill="none" style="display:inline-block;vertical-align:middle">
        <rect x="0" y="0" width="30" height="4" fill="#1a1a1a" />
        <rect x="20" y="0" width="4" height="4" fill="#c62828" />
        <rect x="0" y="0" width="30" height="4" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.5" />
      </svg> kaynos <span>docs</span></a>
    <div class="header-search">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="7" cy="7" r="4.5" />
        <line x1="10.5" y1="10.5" x2="14" y2="14" />
      </svg>
      <input type="text" id="searchInput" placeholder="Search docs..." oninput="handleSearch(this.value)"
        onfocus="handleSearch(this.value)" autocomplete="off">
      <div class="search-results" id="searchResults"></div>
    </div>
  </header>

  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <nav class="sidebar" id="sidebar"></nav>

  <main class="content">
    <div class="content-inner" id="pageContent"></div>
  </main>

  <script>
    const PAGES = {
      welcome: {
        title: "Welcome to Kaynos",
        section: "",
        content: `
<h1>Welcome to Kaynos</h1>
<p>Kaynos helps martial arts schools run on video: instructors upload sessions, drop timestamped notes, students review when it works for them.</p>
<p>Use the sidebar or search to get started, manage your school, or fix a problem.</p>
<h2>Quick links</h2>
<div class="quick-links">
<a class="quick-link" onclick="navigate('setup')"><div class="ql-title">Setting up your school</div><div class="ql-desc">First login and admin basics</div></a>
<a class="quick-link" onclick="navigate('first-upload')"><div class="ql-title">Your first video upload</div><div class="ql-desc">Files, formats, Vimeo</div></a>
<a class="quick-link" onclick="navigate('upload-issues')"><div class="ql-title">Video upload problems</div><div class="ql-desc">Errors, speed, stuck uploads</div></a>
<a class="quick-link" onclick="navigate('playback-issues')"><div class="ql-title">Video playback problems</div><div class="ql-desc">Won't play, buffer, codec</div></a>
<a class="quick-link" onclick="navigate('inviting-members')"><div class="ql-title">Inviting your team</div><div class="ql-desc">Invites, roles, roster</div></a>
<a class="quick-link" onclick="navigate('faq')"><div class="ql-title">FAQ</div><div class="ql-desc">Short answers to common questions</div></a>
</div>
<h2>Still stuck?</h2>
<ul>
<li><strong>Email:</strong> support@kaynos.net</li>
<li><strong>Chat:</strong> Bottom-right inside the app</li>
<li><strong>Typical reply:</strong> Within a few hours on business days</li>
</ul>
`},

      setup: {
        title: "Setting up your school",
        section: "Getting Started",
        content: `
<h1>Setting up your school</h1>
<p>After signup, credentials go to the email you used. Log in and you’re in.</p>
<h2>First login</h2>
<ol>
<li>Open the welcome email link or go to <strong>app.kaynos.net</strong>.</li>
<li>Sign in with the email and temp password from that email.</li>
<li>You’ll land on the <strong>Instructor Dashboard</strong>.</li>
</ol>
<h2>Change your password</h2>
<p>Do this first: temp passwords aren’t meant to stick around.</p>
<ol>
<li>Open your name in the sidebar (menu on mobile) → <strong>Profile</strong>.</li>
<li>Under <strong>Change Password</strong>, enter current + new password.</li>
<li><strong>Update Password</strong>.</li>
</ol>
<h2>Admin</h2>
<p>School admins: use sidebar <strong>Admin</strong> for roster, invites, roles, and school-wide activity.</p>
`},

      "inviting-members": {
        title: "Inviting your team",
        section: "Getting Started",
        content: `
<h1>Inviting your team</h1>
<p>People join via email invite with a temp password. Admins can invite anyone; instructors only invite students.</p>
<h2>Add someone</h2>
<ol>
<li><strong>Admin</strong> (admins) or <strong>Students</strong> (instructors).</li>
<li><strong>Add Member</strong> or <strong>Add Student</strong>.</li>
<li>Name, email, and role (admins pick instructor vs student).</li>
<li><strong>Send Invite</strong>.</li>
</ol>
<p>They get email with a temp password. No email? Check spam/junk.</p>
<h2>Who can invite</h2>
<table><thead><tr><th>Your role</th><th>Can add</th></tr></thead><tbody>
<tr><td><strong>Admin</strong></td><td>Instructors and students</td></tr>
<tr><td><strong>Instructor</strong></td><td>Students only</td></tr>
<tr><td><strong>Student</strong></td><td>No</td></tr>
</tbody></table>
<h2>Roles</h2>
<table><thead><tr><th>Role</th><th>What they can do</th></tr></thead><tbody>
<tr><td><strong>Admin</strong></td><td>All instructor powers, plus members, invites, school settings.</td></tr>
<tr><td><strong>Instructor</strong></td><td>Sessions, classes, uploads, notes, see all student progress.</td></tr>
<tr><td><strong>Student</strong></td><td>Their sessions, all school classes, watch, notes, progress. No uploads or other people’s private sessions.</td></tr>
</tbody></table>
<h2>Resend invite</h2>
<p><strong>Admin</strong> → roster → person → <strong>Reset Password</strong> sends a fresh temp password email.</p>
<h2>Tips</h2>
<ul>
<li>Onboard instructors before the student flood if you can.</li>
<li>Use a real email they check; that’s their login.</li>
<li>No cap on headcount.</li>
</ul>
`},

      "first-upload": {
        title: "Your first video upload",
        section: "Getting Started",
        content: `
<h1>Your first video upload</h1>
<p>Video lives on a <strong>session</strong> (1:1) or <strong>class</strong> (group). Upload a file or paste a Vimeo link.</p>
<h2>Upload a file</h2>
<ol>
<li>New session or class → video source <strong>Upload</strong>.</li>
<li>Drag a file onto the zone or click to pick one.</li>
<li>Watch progress (speed + ETA). Green check = done.</li>
<li>Finish the rest of the form and save.</li>
</ol>
<h2>Behavior</h2>
<ul>
<li>Under ~100 MB: one shot.</li>
<li>Bigger files: chunked parallel upload; failed chunks retry up to 3×.</li>
<li>You can cancel mid-upload.</li>
</ul>
<h2>Formats</h2>
<table><thead><tr><th>Format</th><th>Extension</th><th>Notes</th></tr></thead><tbody>
<tr><td>MP4</td><td>.mp4</td><td>Best default</td></tr>
<tr><td>MOV</td><td>.mov</td><td>iPhone / GoPro</td></tr>
<tr><td>WebM</td><td>.webm</td><td>Screen / web capture</td></tr>
<tr><td>MKV</td><td>.mkv</td><td>OK, less common</td></tr>
</tbody></table>
<p>Max size: <strong>5 GB</strong> per file.</p>
<h2>Vimeo</h2>
<p>Choose <strong>Vimeo</strong>, paste URL or ID — it embeds in that session or class.</p>
<h2>Recording tips</h2>
<ul>
<li>Landscape reads best on the wall.</li>
<li>Slight elevation sees the whole mat.</li>
<li>Steady light helps technique detail.</li>
</ul>
`},

      roles: {
        title: "Understanding user roles",
        section: "Getting Started",
        content: `
<h1>Understanding user roles</h1>
<p>Three roles per school; permissions differ.</p>

        content: `

      faq: {
        title: "Frequently asked questions",
        section: "FAQ",
        content: `
<h1>Frequently asked questions</h1>
<p>Straight answers from how we built Kaynos: you run the academy, your coaches teach on the mats, and your members train. The rest of the help center walks through setup and troubleshooting step by step.</p>

<h2>What you’re signing up for</h2>

<h3>What is Kaynos, in plain language?</h3>
<p>It’s the tool I wish we had when private lessons and comp prep meant texting clips that disappeared in the group chat. You put roll footage or instruction on a <strong>session</strong> (one student) or a <strong>class</strong> (everyone in the school), drop notes right on the timeline, and your people review when life lets them. No extra app store download, just the work.</p>

<h3>Do my students need to install something?</h3>
<p>Nope. They hit <strong>app.kaynos.net</strong> in a normal phone or laptop browser. If they can watch YouTube on your gym Wi‑Fi, they can use Kaynos. Same for coaches on the front desk laptop.</p>

<h3>Is this only for BJJ?</h3>
<p>We’re BJJ people first, but the workflow is the same anywhere video plus coaching notes matter: wrestling, judo, MMA, striking gyms, anywhere you’re breaking down film like you break down a roll.</p>

<hr>

<h2>Running the school</h2>

<h3>Do you cap how many students or coaches I can add?</h3>
<p>Not in the software. Your school grows, you keep inviting. I’m not going to tell you to kick someone off the mat because a headcount limit lit up.</p>

<h3>Can my white belts watch each other’s private lessons?</h3>
<p>That’s a <strong>no</strong>, by design. A <strong>session</strong> stays between that student, the coach who filmed it, and your admins. <strong>Classes</strong> are the room where everyone sees the same tape, like a big group class or an open mat recap.</p>

<h3>Can families download my class video and pass it around?</h3>
<p>There’s no download button. Playback runs through streaming links that expire. You still own your curriculum; we’re not trying to make it trivial for your content to walk out the door as a file.</p>

<hr>

<h2>Trust, kids on camera, and the boring important stuff</h2>

<h3>How serious are you about security?</h3>
<p>HTTPS end to end. Passwords hashed, not sitting in a spreadsheet somewhere. Video sits in real cloud storage behind a CDN (details in <a onclick="navigate('storage')">Video storage and retention</a>). You handle your culture; we handle not being careless with the pipe.</p>

<h3>What about minors on the footage?</h3>
<p>That’s on the academy. Get your waivers and parent consent in order the same way you would for any recording on the mats, follow your local rules, and read our Terms of Service. If you’re unsure, talk to someone who bills hourly. We’re coaches, not lawyers.</p>

<hr>

<h2>What works on the devices your guys actually use</h2>

<h3>Which browsers actually behave?</h3>
<p>Current Chrome, Firefox, Safari, Edge. If someone’s upload or playback is acting weird, Chrome is usually the first place I tell them to try before we blame the platform.</p>

<h3>Do you expose an API for my own tooling?</h3>
<p>Yes. School admins can mint tokens and wire up schedules, reporting, whatever you’re scripting behind the scenes. Read <a onclick="navigate('developer-api')">Developer API</a> before you paste secrets into a repo, please.</p>

<hr>

<h2>When something breaks, talk to us</h2>

<h3>How do I get a human?</h3>
<p>Email <strong>support@kaynos.net</strong>: what happened, what you expected, gym name, browser. A screenshot or quick recording gets you fixed faster than a vague “it broke.” Logged in? There’s chat in the app too.</p>
`},

      "developer-api": {
        title: "Developer API",
        section: "Developers",
        content: `
<h1>Developer API</h1>
<p>Versioned HTTPS API for one school at a time — scheduling glue, internal scripts, light reporting.</p>

<div class="hint hint-info"><span class="hint-icon" aria-hidden="true">📘</span><div><strong>Swagger</strong><br>Log into the app as a <strong>school admin</strong>, then open API docs (in-app). Same browser = cookies work for Try it out.<br><a href="https://app.kaynos.net/admin/api-docs" target="_blank" rel="noopener noreferrer">Swagger (production)</a></div></div>

<p>OpenAPI YAML: <a href="https://app.kaynos.net/openapi.yaml" target="_blank" rel="noopener noreferrer">app.kaynos.net</a> · <a href="https://raw.githubusercontent.com/jlambert229/kaynos/main/public/openapi.yaml" target="_blank" rel="noopener noreferrer">GitHub raw</a></p>
<p style="font-size:0.8125rem;color:var(--text-secondary)">If the app URL returns HTML, use the GitHub raw link — deploy should route YAML via function.</p>

<h2>Access model</h2>
<ul>
<li><strong><code>/api/v1/...</code></strong> — Bearer token. Admins mint tokens under <strong>Admin → Developer API</strong>.</li>
<li><strong><code>/api/integrations/...</code></strong> — Session cookie: list / create / revoke tokens. Swagger needs you logged in.</li>
<li><strong><code>/admin/api-docs</code></strong> — Swagger; admin session required.</li>
</ul>

<h2>Base URLs</h2>
<table>
<thead><tr><th>Where</th><th>Host</th><th>API prefix</th></tr></thead>
<tbody>
<tr><td>Prod</td><td><code>https://app.kaynos.net</code></td><td><code>/api/v1</code></td></tr>
<tr><td>Local Netlify</td><td><code>http://localhost:8888</code> (usual)</td><td><code>/api/v1</code></td></tr>
</tbody>
</table>
<p><code>GET /api/v1</code> — tiny route index, no auth.</p>

<h2>Auth header</h2>
<pre style="background:var(--bg-code);padding:14px 16px;border-radius:var(--radius-sm);font-family:var(--font-mono);font-size:0.8125rem;overflow-x:auto;margin-bottom:16px;border:1px solid var(--border)">Authorization: Bearer kn_&lt;your-secret&gt;</pre>
<p>Shown once at creation. Treat like a password — vault or env, never git.</p>

<h3>Scopes</h3>
<table>
<thead><tr><th>Scope</th><th>Does</th></tr></thead>
<tbody>
<tr><td><code>read</code></td><td>GETs on sessions, classes, members, etc.</td></tr>
<tr><td><code>write</code></td><td>Mutations + reads.</td></tr>
</tbody>
</table>

<h3>Who the token “is”</h3>
<p>Permissions match the user who created the token. No UI permission ⇒ <code>403</code> from API too.</p>

<h2>v1 surface (see Swagger for fields)</h2>
<ul>
<li>Sessions + classes — CRUD-ish, progress.</li>
<li>Members — roster ops where product allows.</li>
<li>Notes on sessions/classes.</li>
</ul>

<h2>Token CRUD (cookie)</h2>
<ol>
<li><code>GET /api/integrations/tokens</code> — metadata.</li>
<li><code>POST /api/integrations/tokens</code> — body e.g. <code>{"name":"…","scopes":["read"]}</code>; plaintext secret once in response.</li>
<li><code>DELETE /api/integrations/tokens/{id}</code> — revoke.</li>
</ol>

<h2>Errors</h2>
<p>JSON <code>error</code> string. Usual codes: <code>401</code> bad/missing token, <code>403</code> scope or role, <code>404</code> not in your school, <code>400</code> validation.</p>

<h2>Hygiene</h2>
<ul>
<li>Revoke when admins roll off.</li>
<li>Default to <code>read</code> unless you truly need writes.</li>
<li>No tokens in public clients — backend only.</li>
</ul>

<h2>Links</h2>
<ul>
<li><a href="https://app.kaynos.net/admin/api-docs" target="_blank" rel="noopener noreferrer">Swagger</a></li>
<li><a href="https://app.kaynos.net/openapi.yaml" target="_blank" rel="noopener noreferrer">OpenAPI (app)</a></li>
<li><a href="https://raw.githubusercontent.com/jlambert229/kaynos/main/public/openapi.yaml" target="_blank" rel="noopener noreferrer">OpenAPI (raw)</a></li>
</ul>
`}

    const NAV = [
      { section: "", pages: ["welcome"] },
      { section: "Getting Started", pages: ["setup", "inviting-members", "first-upload", "roles"] },
      { section: "Video", pages: ["uploading", "playback", "formats", "storage"] },
      { section: "Sessions & Classes", pages: ["creating-sessions", "creating-classes", "notes", "tags", "progress"] },
      { section: "Account Management", pages: ["managing-members", "profile", "notifications"] },
      { section: "Developers", pages: ["developer-api"] },
      { section: "Troubleshooting", pages: ["upload-issues", "playback-issues", "login-issues", "email-issues", "performance", "mobile"] },
      { section: "FAQ", pages: ["faq"] }
    ];

    const allPageKeys = NAV.flatMap(g => g.pages);

    function buildSidebar() {
      const sb = document.getElementById('sidebar');
      let html = '';
      NAV.forEach(g => {
        if (g.section) html += `<div class="sidebar-section"><div class="sidebar-section-title">${g.section}</div>`;
        else html += `<div class="sidebar-section">`;
        g.pages.forEach(p => {
          html += `<a class="sidebar-link" data-page="${p}" onclick="navigate('${p}')">${PAGES[p].title}</a>`;
        });
        html += '</div>';
      });
      sb.innerHTML = html;
    }

    function navigate(pageId) {
      const page = PAGES[pageId];
      if (!page) return;
      document.getElementById('pageContent').innerHTML = page.content;
      document.querySelectorAll('.sidebar-link').forEach(l => l.classList.toggle('active', l.dataset.page === pageId));
      window.scrollTo(0, 0);
      history.pushState({ page: pageId }, '', '#' + pageId);
      document.title = page.title + ' — Kaynos Docs';
      closeSidebar();
      document.getElementById('searchInput').value = '';
      document.getElementById('searchResults').classList.remove('active');
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('active');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('active');
    }

    function handleSearch(q) {
      const sr = document.getElementById('searchResults');
      if (!q || q.length < 2) { sr.classList.remove('active'); sr.innerHTML = ''; return }
      const lower = q.toLowerCase();
      const results = [];
      for (const [id, page] of Object.entries(PAGES)) {
        const text = page.content.replace(/<[^>]+>/g, ' ').toLowerCase();
        const idx = text.indexOf(lower);
        if (idx !== -1 || page.title.toLowerCase().includes(lower)) {
          let snippet = '';
          if (idx !== -1) {
            const start = Math.max(0, idx - 40);
            const end = Math.min(text.length, idx + q.length + 60);
            snippet = (start > 0 ? '...' : '') + text.slice(start, end).replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), m => `<mark>${m}</mark>`) + (end < text.length ? '...' : '');
          }
          results.push({ id, title: page.title, section: page.section, snippet });
        }
      }
      if (results.length === 0) {
        sr.innerHTML = '<div class="search-empty">No results found</div>';
      } else {
        sr.innerHTML = results.slice(0, 8).map(r => `<div class="search-result" onclick="navigate('${r.id}')"><div class="sr-title">${r.title}</div>${r.section ? `<div class="sr-section">${r.section}</div>` : ''}${r.snippet ? `<div class="sr-snippet">${r.snippet}</div>` : ''}</div>`).join('');
      }
      sr.classList.add('active');
    }

    document.addEventListener('click', e => {
      if (!e.target.closest('.header-search')) document.getElementById('searchResults').classList.remove('active');
    });
    document.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus() }
    });

    window.addEventListener('popstate', e => {
      if (e.state && e.state.page) navigate(e.state.page);
      else navigate('welcome');
    });

    buildSidebar();
    const hash = location.hash.slice(1);
    navigate(hash && PAGES[hash] ? hash : 'welcome');
  </script>
</body>

</html>
