  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #060609;
      --bg-elevated:  #111115;
      --bg-secondary: #1a1a20;
      --bg-tertiary:  #252530;
      --bg-glass:     rgba(6,6,9,0.88);
      --bg-hover:     rgba(255,255,255,0.04);
      --bg-active:    rgba(255,255,255,0.07);
      --text-primary:   #f0f0f6;
      --text-secondary: rgba(240,240,246,0.65);
      --text-tertiary:  rgba(240,240,246,0.38);
      --border:         rgba(255,255,255,0.07);
      --border-strong:  rgba(255,255,255,0.12);
      --accent:         #2184f3;
      --accent-hover:   #4da3f7;
      --accent-soft:    rgba(33,132,243,0.10);
      --accent-border:  rgba(33,132,243,0.25);
      --success:        #40c057;
      --success-soft:   rgba(64,192,87,0.10);
      --warning:        #fd7e14;
      --warning-soft:   rgba(253,126,20,0.10);
      --danger:         #fa5252;
      --danger-soft:    rgba(250,82,82,0.10);
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
      --sidebar-w: 268px;
      --toc-w:     216px;
      --header-h:  56px;
      --radius:    10px;
      --radius-sm: 7px;
      --radius-xs: 4px;
      --shadow:    0 1px 12px rgba(0,0,0,.35), 0 0 1px rgba(255,255,255,.04);
      --shadow-lg: 0 8px 40px rgba(0,0,0,.50), 0 0 1px rgba(255,255,255,.05);
      --ease: cubic-bezier(0.22,0.61,0.36,1);
      --dur: 0.14s;
      color-scheme: dark;
    }

    /* ── LIGHT MODE ─── */
    :root.light {
      --bg:           #ffffff;
      --bg-elevated:  #f8f9fa;
      --bg-secondary: #f1f3f5;
      --bg-tertiary:  #e9ecef;
      --bg-glass:     rgba(255,255,255,0.92);
      --bg-hover:     rgba(0,0,0,0.03);
      --bg-active:    rgba(0,0,0,0.06);
      --text-primary:   #1a1a2e;
      --text-secondary: rgba(26,26,46,0.72);
      --text-tertiary:  rgba(26,26,46,0.55);
      --border:         rgba(0,0,0,0.08);
      --border-strong:  rgba(0,0,0,0.14);
      --accent:         #1a6fdb;
      --accent-hover:   #1560c2;
      --accent-soft:    rgba(26,111,219,0.08);
      --accent-border:  rgba(26,111,219,0.22);
      --success:        #2b8a3e;
      --success-soft:   rgba(43,138,62,0.08);
      --warning:        #e8590c;
      --warning-soft:   rgba(232,89,12,0.08);
      --danger:         #e03131;
      --danger-soft:    rgba(224,49,49,0.08);
      --shadow:    0 1px 8px rgba(0,0,0,.08), 0 0 1px rgba(0,0,0,.12);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.12), 0 0 1px rgba(0,0,0,.08);
      color-scheme: light;
    }

    html { font-size: 16px; scroll-behavior: smooth; text-size-adjust: 100%; -webkit-text-size-adjust: 100%; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
      html { scroll-behavior: auto; }
    }

    * { scrollbar-width: thin; scrollbar-color: var(--bg-tertiary) transparent; }
    *::-webkit-scrollbar { width: 5px; height: 5px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 9999px; }

    ::selection { background: rgba(33,132,243,.28); color: var(--text-primary); }

    body {
      font-family: var(--font-body);
      color: var(--text-primary);
      background: var(--bg);
      line-height: 1.6;
      font-size: .9375rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── READING PROGRESS ─── */
    #progress-bar {
      position: fixed; top: 0; left: 0; height: 2px; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-hover));
      z-index: 200; transition: width .1s linear; pointer-events: none;
    }

    /* ── HEADER ─── */
    .header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--bg-glass);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 20px; z-index: 100; gap: 12px;
    }

    .header-logo {
      font-weight: 600; font-size: .9063rem; letter-spacing: -.025em;
      color: var(--text-primary); text-decoration: none;
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0; white-space: nowrap;
    }
    .header-logo-icon {
      width: 26px; height: 26px; background: #050508;
      border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .header-logo-sep { color: var(--text-tertiary); font-weight: 400; margin: 0 1px; }
    .header-logo-sub { color: var(--text-tertiary); font-weight: 400; font-size: 13px; }

    .header-search { flex: 1; max-width: 380px; position: relative; }
    .header-search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--text-tertiary); pointer-events: none; display: flex;
    }
    .header-search input {
      width: 100%; height: 34px;
      padding: 0 72px 0 34px;
      border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
      background: var(--bg-secondary);
      font-family: var(--font-body); font-size: .875rem; color: var(--text-primary);
      outline: none; transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
    }
    .header-search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(33,132,243,.10);
    }
    .header-search input::placeholder { color: var(--text-tertiary); }
    .search-kbd {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      display: flex; gap: 2px; pointer-events: none;
    }
    .search-kbd kbd {
      font-family: var(--font-body); font-size: 10px;
      color: var(--text-tertiary); border: 1px solid var(--border-strong);
      border-radius: 3px; padding: 1px 4px; background: var(--bg-tertiary);
    }

    .search-results {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: var(--bg-elevated); border: 1px solid var(--border-strong);
      border-radius: var(--radius); max-height: 400px; overflow-y: auto;
      display: none; box-shadow: var(--shadow-lg); z-index: 110;
    }
    .search-results.active { display: block; }
    .search-result {
      padding: 10px 14px; cursor: pointer;
      border-bottom: 1px solid var(--border); font-size: .875rem;
      transition: background var(--dur);
    }
    .search-result:last-child { border-bottom: none; }
    .search-result:hover, .search-result.focused { background: var(--bg-hover); }
    .search-result .sr-title { font-weight: 500; margin-bottom: 2px; }
    .search-result .sr-section { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .05em; }
    .search-result .sr-snippet { font-size: .8125rem; color: var(--text-secondary); margin-top: 4px; line-height: 1.5; }
    .search-result mark { background: rgba(33,132,243,.20); color: var(--accent-hover); border-radius: 2px; padding: 0 2px; }
    .sr-badge { display: inline-flex; margin-left: 6px; vertical-align: middle; }
    .sr-badge svg { width: 11px; height: 11px; }
    .sr-bookmarked { color: var(--warning); }
    .sr-read { color: var(--success); }
    .search-empty { padding: 24px 14px; text-align: center; color: var(--text-tertiary); font-size: .875rem; }

    .header-spacer { flex: 1; }

    .header-app-link {
      flex-shrink: 0; font-size: .875rem; font-weight: 500;
      color: var(--text-secondary); text-decoration: none;
      white-space: nowrap; padding: 5px 10px; border-radius: var(--radius-sm);
      border: 1px solid var(--border-strong);
      transition: all var(--dur) var(--ease);
      display: flex; align-items: center; gap: 5px;
    }
    .header-app-link:hover {
      color: var(--text-primary); border-color: var(--accent);
      background: var(--accent-soft); text-decoration: none;
    }

    .menu-btn {
      display: none; background: none; border: none;
      color: var(--text-secondary); cursor: pointer;
      padding: 6px; border-radius: var(--radius-sm);
      transition: color var(--dur), background var(--dur); flex-shrink: 0;
    }
    .menu-btn:hover { color: var(--text-primary); background: var(--bg-hover); }

    .theme-toggle {
      background: none; border: 1px solid var(--border-strong);
      color: var(--text-secondary); cursor: pointer;
      padding: 5px 8px; border-radius: var(--radius-sm);
      transition: all var(--dur); display: flex; align-items: center;
      flex-shrink: 0; font-size: 14px; line-height: 1;
    }
    .theme-toggle:hover { color: var(--text-primary); border-color: var(--accent); background: var(--accent-soft); }

    /* ── LAYOUT ─── */
    .layout {
      margin-top: var(--header-h);
      margin-left: var(--sidebar-w);
      min-height: calc(100vh - var(--header-h));
    }

    /* ── SIDEBAR ─── */
    .sidebar {
      position: fixed; top: var(--header-h); left: 0;
      width: var(--sidebar-w); height: calc(100vh - var(--header-h));
      background: var(--bg-elevated); border-right: 1px solid var(--border);
      overflow-y: auto; padding: 16px 0 32px; z-index: 90;
      transition: transform .22s var(--ease);
    }
    .sidebar-section { margin-bottom: 4px; }
    .sidebar-section-title {
      padding: 10px 16px 4px; font-size: .6563rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .09em; color: var(--text-tertiary);
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none; transition: color var(--dur); gap: 6px;
    }
    .sidebar-section-title svg { width: 12px; height: 12px; flex-shrink: 0; opacity: .6; }
    .sidebar-section-title:hover { color: var(--text-secondary); }
    .sidebar-section-title .chevron {
      transition: transform .18s var(--ease); font-size: 9px; opacity: .5;
    }
    .sidebar-section.collapsed .chevron { transform: rotate(-90deg); }
    .sidebar-section.collapsed .sidebar-links { display: none; }
    .sidebar-link {
      display: block; padding: 6px 16px 6px 20px;
      font-size: .875rem; color: var(--text-secondary);
      text-decoration: none; transition: color var(--dur), background var(--dur);
      cursor: pointer; border-left: 2px solid transparent;
      margin: 1px 0;
    }
    .sidebar-link:hover { color: var(--text-primary); background: var(--bg-hover); }
    .sidebar-link.active {
      color: var(--accent); border-left-color: var(--accent);
      font-weight: 500; background: var(--accent-soft);
    }

    /* ── CONTENT ─── */
    .content { min-width: 0; display: flex; justify-content: center; }
    .content-with-toc {
      width: 100%; display: flex; justify-content: center;
      padding: 40px 48px 96px;
    }
    .content-wrap { width: 100%; max-width: 720px; display: flex; flex-direction: column; }

    /* ── PAGE TRANSITION ─── */
    .content-inner { animation: fadeUp .18s var(--ease); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── TYPOGRAPHY ─── */
    .content-inner h1 {
      font-size: 2rem; font-weight: 700; letter-spacing: -.035em;
      line-height: 1.15; margin-bottom: 6px; color: var(--text-primary);
    }
    .article-meta {
      font-size: .8125rem; color: var(--text-tertiary); margin-bottom: 18px;
      display: flex; align-items: center; gap: 12px;
    }
    .article-meta-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-tertiary); }
    .content-inner h2 {
      font-size: 1.1875rem; font-weight: 600; letter-spacing: -.015em;
      margin-top: 44px; margin-bottom: 14px;
      padding-top: 28px; border-top: 1px solid var(--border);
      line-height: 1.3; scroll-margin-top: calc(var(--header-h) + 16px);
    }
    .content-inner h2:first-of-type { border-top: none; padding-top: 0; margin-top: 28px; }
    .heading-anchor {
      opacity: 0; margin-left: 6px; color: var(--text-tertiary);
      text-decoration: none; font-weight: 400; transition: opacity var(--dur), color var(--dur);
      cursor: pointer; font-size: .85em;
    }
    .content-inner h2:hover .heading-anchor,
    .content-inner h3:hover .heading-anchor,
    .heading-anchor:focus { opacity: 1; }
    .heading-anchor:hover { color: var(--accent); }
    .content-inner h3 {
      font-size: 1rem; font-weight: 600; margin-top: 28px; margin-bottom: 10px;
      color: var(--text-primary); scroll-margin-top: calc(var(--header-h) + 16px);
    }
    .content-inner p { margin-bottom: 16px; color: var(--text-secondary); line-height: 1.7; }
    .content-inner ul, .content-inner ol { margin-bottom: 16px; padding-left: 22px; }
    .content-inner li { margin-bottom: 7px; color: var(--text-secondary); line-height: 1.65; }
    .content-inner strong { font-weight: 600; color: var(--text-primary); }
    .content-inner code {
      font-family: var(--font-mono); font-size: .8125rem;
      background: var(--bg-secondary); padding: 2px 6px;
      border-radius: var(--radius-xs); color: var(--accent-hover);
      border: 1px solid var(--border);
    }
    .content-inner a { color: var(--accent); text-decoration: none; transition: color var(--dur); }
    .content-inner a:hover { color: var(--accent-hover); text-decoration: underline; text-decoration-color: rgba(33,132,243,.4); }
    .content-inner hr { border: none; border-top: 1px solid var(--border); margin: 36px 0; }

    /* ── CODE BLOCKS ─── */
    .code-block-wrap { position: relative; margin-bottom: 20px; }
    .content-inner pre {
      background: var(--bg-secondary); padding: 16px 18px;
      border-radius: var(--radius-sm); font-family: var(--font-mono);
      font-size: .8125rem; overflow-x: auto;
      border: 1px solid var(--border); line-height: 1.65;
      color: var(--text-secondary); margin-bottom: 0;
    }
    .copy-btn {
      position: absolute; top: 8px; right: 8px;
      padding: 4px 9px; background: var(--bg-tertiary);
      border: 1px solid var(--border-strong); border-radius: var(--radius-xs);
      color: var(--text-tertiary); font-size: 11px; font-family: var(--font-body);
      cursor: pointer; transition: all var(--dur); opacity: 0;
    }
    .code-block-wrap:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { color: var(--text-primary); background: var(--bg-active); }
    .copy-btn.copied { color: var(--success); border-color: rgba(64,192,87,.4); }

    /* ── TABLES ─── */
    .table-wrap { overflow-x: auto; margin-bottom: 24px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .content-inner table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    .content-inner th {
      text-align: left; padding: 10px 14px;
      background: var(--bg-secondary); font-weight: 600;
      font-size: .8125rem; color: var(--text-secondary);
      border-bottom: 1px solid var(--border-strong); white-space: nowrap;
    }
    .content-inner td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: top; color: var(--text-secondary); }
    .content-inner tr:last-child td { border-bottom: none; }
    .content-inner tr:hover td { background: var(--bg-hover); }

    /* ── HINTS ─── */
    .hint {
      padding: 13px 16px; border-radius: var(--radius-sm);
      margin-bottom: 20px; font-size: .875rem;
      display: flex; gap: 10px; line-height: 1.65;
    }
    .hint-icon { flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; }
    .hint-icon svg { width: 16px; height: 16px; }
    .hint-warning  { background: var(--warning-soft); border: 1px solid rgba(253,126,20,.28); border-left: 3px solid var(--warning); }
    .hint-info     { background: var(--accent-soft);  border: 1px solid var(--accent-border); border-left: 3px solid var(--accent); }
    .hint-tip      { background: var(--success-soft); border: 1px solid rgba(64,192,87,.28); border-left: 3px solid var(--success); }
    .hint-danger   { background: var(--danger-soft);  border: 1px solid rgba(250,82,82,.28); border-left: 3px solid var(--danger); }
    .hint-info a, .hint-warning a, .hint-tip a, .hint-danger a { color: var(--accent); font-weight: 500; }
    .hint > div:last-child { flex: 1; }

    /* ── QUICK LINKS ─── */
    .quick-links { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
    @media (min-width: 640px) { .quick-links { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); } }
    .quick-link.featured { border-color: var(--accent-border); background: var(--accent-soft); }
    .quick-link.featured:hover { border-color: var(--accent); background: var(--bg-secondary); }
    .quick-link {
      padding: 14px 16px; background: var(--bg-elevated);
      border: 1px solid var(--border-strong); border-radius: var(--radius);
      text-decoration: none; color: var(--text-primary);
      transition: border-color var(--dur), box-shadow var(--dur), background var(--dur), transform var(--dur);
      cursor: pointer; font-size: .875rem; display: flex; flex-direction: column; gap: 3px;
    }
    .quick-link:hover {
      border-color: var(--accent); background: var(--bg-secondary);
      box-shadow: 0 0 0 1px rgba(33,132,243,.12), var(--shadow);
      text-decoration: none; transform: translateY(-1px);
    }
    .quick-link .ql-icon { margin-bottom: 6px; display: flex; color: var(--accent); }
    .quick-link .ql-icon svg { width: 22px; height: 22px; }
    .quick-link .ql-title { font-weight: 500; color: var(--text-primary); }
    .quick-link .ql-desc { font-size: .8125rem; color: var(--text-secondary); line-height: 1.4; }

    /* ── BREADCRUMB ─── */
    .breadcrumb {
      font-size: .8125rem; color: var(--text-tertiary);
      margin-bottom: 20px; display: flex; align-items: center; gap: 6px;
    }
    .breadcrumb a { color: var(--text-tertiary); text-decoration: none; transition: color var(--dur); cursor: pointer; }
    .breadcrumb a:hover { color: var(--accent); }
    .breadcrumb-sep { opacity: .4; }
    .breadcrumb-current { color: var(--text-secondary); }

    /* ── FOOTER NAV ─── */
    .footer-nav {
      display: flex; justify-content: space-between;
      margin-top: 56px; padding-top: 24px;
      border-top: 1px solid var(--border); gap: 12px;
    }
    .footer-nav-btn {
      text-decoration: none; padding: 12px 16px;
      border-radius: var(--radius-sm); border: 1px solid var(--border-strong);
      background: var(--bg-elevated); transition: all var(--dur);
      display: flex; flex-direction: column; gap: 3px;
      min-width: 0; flex: 1; max-width: 240px; cursor: pointer;
    }
    .footer-nav-btn.next { align-items: flex-end; margin-left: auto; }
    .footer-nav-btn:hover { border-color: var(--accent); background: var(--bg-secondary); }
    .fn-label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .05em; }
    .fn-title { font-size: .875rem; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── ON-PAGE TOC ─── */
    .toc {
      display: none; position: sticky;
      top: calc(var(--header-h) + 24px); width: var(--toc-w);
      max-height: calc(100vh - var(--header-h) - 48px);
      overflow-y: auto; flex-shrink: 0; padding: 0 0 24px;
      align-self: flex-start; margin-left: 40px;
    }
    .toc-title { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .09em; color: var(--text-tertiary); margin-bottom: 10px; }
    .toc-link {
      display: block; padding: 4px 0 4px 12px;
      font-size: .8125rem; color: var(--text-tertiary);
      text-decoration: none; border-left: 2px solid transparent;
      transition: color var(--dur), border-color var(--dur); line-height: 1.45;
    }
    .toc-link:hover { color: var(--text-secondary); text-decoration: none; }
    .toc-link.active { color: var(--accent); border-left-color: var(--accent); }
    .toc-link.toc-h3 { padding-left: 20px; font-size: .75rem; }

    /* ── TABLET ─── */
    @media (min-width: 769px) and (max-width: 1199px) {
      .content-with-toc { padding: 32px 28px 80px; }
      .sidebar { width: 220px; }
      .layout { margin-left: 220px; }
    }

    @media (min-width: 1200px) {
      .toc { display: block; }
    }

    /* ── BACK TO TOP ─── */
    #back-top {
      position: fixed; bottom: 28px; right: 28px;
      width: 38px; height: 38px; background: var(--bg-elevated);
      border: 1px solid var(--border-strong); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary); cursor: pointer; box-shadow: var(--shadow);
      transition: all var(--dur) var(--ease);
      opacity: 0; pointer-events: none; z-index: 50;
    }
    #back-top.visible { opacity: 1; pointer-events: auto; }
    #back-top:hover { color: var(--text-primary); border-color: var(--accent); background: var(--bg-secondary); }

    /* ── TOAST ─── */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--bg-elevated); border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm); padding: 8px 16px;
      font-size: .875rem; color: var(--text-primary);
      box-shadow: var(--shadow-lg); z-index: 150;
      opacity: 0; transition: all .2s var(--ease); pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── OVERLAY ─── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.60); z-index: 85;
      backdrop-filter: blur(2px);
    }
    .overlay.active { display: block; }

    /* ── WELCOME HERO ─── */
    .hero { padding: 32px 0 36px; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 500; color: var(--accent);
      background: var(--accent-soft); border: 1px solid var(--accent-border);
      border-radius: 9999px; padding: 3px 10px; margin-bottom: 18px;
      text-transform: uppercase; letter-spacing: .07em;
    }
    .hero h1 {
      font-size: 2.375rem !important; font-weight: 700;
      letter-spacing: -.04em !important; line-height: 1.1;
      margin-bottom: 14px !important;
    }
    .hero p { font-size: 1.0625rem; color: var(--text-secondary); line-height: 1.65; max-width: 520px; margin-bottom: 0; }

    /* ── SUPPORT CARD ─── */
    .support-card {
      padding: 18px 20px; background: var(--bg-elevated);
      border: 1px solid var(--border-strong); border-radius: var(--radius);
      margin-top: 4px; display: flex; flex-direction: column; gap: 10px;
    }
    .support-item { display: flex; align-items: flex-start; gap: 10px; font-size: .875rem; color: var(--text-secondary); }
    .support-item-icon {
      width: 28px; height: 28px; background: var(--bg-secondary);
      border-radius: var(--radius-sm); display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; color: var(--accent);
    }
    .support-item-icon svg { width: 14px; height: 14px; }
    .support-item strong { color: var(--text-primary); font-weight: 500; }
    .support-item a { color: var(--accent); font-weight: 500; }

    /* ── MOBILE ─── */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); z-index: 95; }
      .sidebar.open { transform: translateX(0); }
      .layout { margin-left: 0; }
      .content-with-toc { padding: 24px 20px 80px; }
      .quick-links { grid-template-columns: 1fr; }
      .menu-btn { display: flex; }
      .header-search { max-width: none; }
      .header-app-link span { display: none; }
      .text-size-controls { display: none; }
      .footer-nav { flex-direction: column; }
      .footer-nav-btn { max-width: none; }
      .footer-nav-btn.next { align-items: flex-start; }
      .hero h1 { font-size: 1.75rem !important; }
      .feedback-btn, .bookmark-btn, .share-btn, .print-btn,
      .copy-article-btn, .wizard-option, .checklist-item,
      .preflight-item { min-height: 44px; display: inline-flex; align-items: center; }
    }

    :focus-visible { outline: 2px solid rgba(33,132,243,.6); outline-offset: 2px; }
    .sidebar-link:focus-visible, .quick-link:focus-visible, .header-logo:focus-visible {
      outline: none; box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px rgba(33,132,243,.55);
    }
    .menu-btn:focus-visible, .theme-toggle:focus-visible, .lang-toggle:focus-visible,
    .feedback-btn:focus-visible, .bookmark-btn:focus-visible, .share-btn:focus-visible,
    .print-btn:focus-visible, .copy-article-btn:focus-visible, .chatbot-fab:focus-visible,
    .text-size-btn:focus-visible, .tour-btn:focus-visible, .wizard-option:focus-visible,
    .mobile-nav-btn:focus-visible, .header-app-link:focus-visible {
      outline: none; box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px rgba(33,132,243,.55);
    }

    /* ── SKIP LINK ─── */
    .skip-link {
      position: fixed; top: -100%; left: 16px; z-index: 999;
      background: var(--accent); color: #fff; padding: 8px 16px;
      border-radius: var(--radius-sm); font-size: .875rem; font-weight: 500;
      text-decoration: none; transition: top .15s var(--ease);
    }
    .skip-link:focus { top: 8px; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

    /* ── PRINT STYLES ─── */
    @media print {
      .header, .sidebar, .toc, #back-top, #toast, #progress-bar,
      .footer-nav, .skip-link, .overlay, .menu-btn, .copy-btn,
      .chatbot-fab, .chatbot-panel, .mobile-nav, .tour-overlay,
      .kbd-modal-overlay, .offline-banner, .page-feedback,
      .article-actions, .bookmark-btn, .share-btn, .print-btn,
      .heading-anchor, .wizard-feedback, .wizard-escalate,
      .wizard-restart, .checklist, .related-articles,
      .role-picker, .step-tips, .preflight, .calc-wrap,
      .breadcrumb, .error-lookup, .lang-toggle,
      .text-size-controls, .theme-toggle, .search-kbd,
      .palette-overlay, .nudge-prompt, .welcome-back,
      .copy-article-btn, .user-highlight { display: none !important; }
      .layout { margin-left: 0 !important; }
      .content-with-toc { padding: 0 !important; }
      body { background: #fff; color: #111; font-size: 12pt; }
      .content-inner h1 { color: #111; }
      .content-inner h2, .content-inner h3 { color: #222; border-color: #ccc; }
      .content-inner p, .content-inner li { color: #333; }
      .content-inner a { color: #111; text-decoration: underline; }
      .content-inner a[href]::after { content: " (" attr(href) ")"; font-size: 9pt; color: #666; }
      .content-inner a[onclick]::after { content: none; }
      .hint { border: 1px solid #ccc; background: #f5f5f5 !important; }
      .quick-link { border: 1px solid #ccc; background: #f9f9f9 !important; }
      .content-inner pre { border: 1px solid #ccc; background: #f5f5f5 !important; }
      .content-inner code { background: #f0f0f0 !important; border-color: #ccc; color: #333; }
      .table-wrap { border-color: #ccc; }
      .content-inner th { background: #eee !important; color: #222; border-color: #ccc; }
      .content-inner td { color: #333; border-color: #ddd; }
    }

    /* ── KEYBOARD SHORTCUTS MODAL ─── */
    .kbd-modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.65); backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    .kbd-modal-overlay.active { display: flex; }
    .kbd-modal {
      background: var(--bg-elevated); border: 1px solid var(--border-strong);
      border-radius: var(--radius); padding: 24px 28px;
      max-width: 400px; width: 90%; box-shadow: var(--shadow-lg);
    }
    .kbd-modal h3 { margin: 0 0 16px; font-size: 1rem; font-weight: 600; color: var(--text-primary); }
    .kbd-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
    .kbd-row span { font-size: .875rem; color: var(--text-secondary); }
    .kbd-row kbd {
      font-family: var(--font-body); font-size: 11px; color: var(--text-tertiary);
      border: 1px solid var(--border-strong); border-radius: 4px;
      padding: 2px 7px; background: var(--bg-tertiary); min-width: 24px; text-align: center;
    }
    .kbd-modal-close {
      margin-top: 16px; width: 100%; padding: 8px;
      background: var(--bg-secondary); border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm); color: var(--text-secondary);
      font-size: .8125rem; cursor: pointer; transition: all var(--dur);
    }
    .kbd-modal-close:hover { color: var(--text-primary); background: var(--bg-tertiary); }

    /* ── FEEDBACK WIDGET ─── */
    .page-feedback {
      margin-top: 40px; padding: 20px 0;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      font-size: .875rem; color: var(--text-tertiary);
    }
    .page-feedback span { white-space: nowrap; }
    .feedback-btn {
      padding: 5px 14px; border-radius: var(--radius-sm);
      border: 1px solid var(--border-strong); background: var(--bg-elevated);
      color: var(--text-secondary); font-size: .8125rem; cursor: pointer;
      transition: all var(--dur);
    }
    .feedback-btn:hover { border-color: var(--accent); color: var(--text-primary); background: var(--bg-secondary); }
    .feedback-btn.selected { border-color: var(--success); color: var(--success); background: var(--success-soft); pointer-events: none; }
    .feedback-thanks { font-size: .8125rem; color: var(--success); display: none; }

    /* ── RELATED ARTICLES ─── */
    .related-articles { margin-top: 36px; padding-top: 24px; border-top: 1px solid var(--border); }
    .related-title {
      font-size: 10.5px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .09em; color: var(--text-tertiary); margin-bottom: 12px;
    }
    .related-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
    .related-card {
      padding: 12px 14px; background: var(--bg-elevated);
      border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
      text-decoration: none; transition: all var(--dur); cursor: pointer;
      display: flex; flex-direction: column; gap: 3px;
    }
    .related-card:hover { border-color: var(--accent); background: var(--bg-secondary); text-decoration: none; transform: translateY(-1px); }
    .related-card-title { font-size: .875rem; font-weight: 500; color: var(--text-primary); }
    .related-card-section { font-size: .75rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .04em; }

    /* ── SIDEBAR READ INDICATOR ─── */
    .sidebar-link .read-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--success); margin-left: 6px; vertical-align: middle; flex-shrink: 0;
    }
    .sidebar-link { display: flex; align-items: center; }
    .sidebar-link .sl-text { flex: 1; }

    /* ── SIDEBAR PROGRESS BAR ─── */
    .sidebar-progress {
      padding: 14px 16px; border-top: 1px solid var(--border);
      font-size: .75rem; color: var(--text-tertiary);
    }
    .sidebar-progress-bar {
      height: 3px; background: var(--bg-tertiary); border-radius: 2px;
      margin-top: 6px; overflow: hidden;
    }
    .sidebar-progress-fill {
      height: 100%; background: var(--success); border-radius: 2px;
      transition: width .3s var(--ease);
    }

    /* ── SIDEBAR BOOKMARKS / RECENT ─── */
    .sidebar-dynamic { border-bottom: 1px solid var(--border); padding-bottom: 4px; margin-bottom: 4px; }
    .sidebar-dynamic:empty { display: none; border: none; padding: 0; margin: 0; }
    .sidebar-dynamic .sidebar-section-title { cursor: default; display: flex; align-items: center; gap: 6px; }
    .sidebar-dynamic .sidebar-section-title svg { width: 12px; height: 12px; flex-shrink: 0; }
    .sidebar-dynamic .sidebar-link { font-size: .8125rem; }

    /* ── ARTICLE ACTIONS BAR ─── */
    .article-actions {
      display: flex; align-items: center; gap: 8px; margin-bottom: 20px;
    }

    /* ── BOOKMARK BUTTON ─── */
    .bookmark-btn {
      background: none; border: 1px solid var(--border-strong);
      color: var(--text-tertiary); padding: 4px 10px;
      border-radius: var(--radius-sm); font-size: .75rem;
      cursor: pointer; transition: all var(--dur);
      display: inline-flex; align-items: center; gap: 4px;
    }
    .bookmark-btn:hover { color: var(--accent); border-color: var(--accent); }
    .bookmark-btn.bookmarked { color: var(--warning); border-color: rgba(253,126,20,.4); background: var(--warning-soft); }
    .bookmark-btn svg { width: 12px; height: 12px; }

    /* ── GLOSSARY ─── */
    .glossary-term {
      padding: 14px 0; border-bottom: 1px solid var(--border);
    }
    .glossary-term:last-child { border-bottom: none; }
    .glossary-term dt {
      font-weight: 600; font-size: .9375rem; color: var(--text-primary);
      margin-bottom: 4px; display: flex; align-items: center; gap: 8px;
    }
    .glossary-term dt code {
      font-family: var(--font-mono); font-size: .75rem; background: var(--bg-secondary);
      padding: 1px 6px; border-radius: var(--radius-xs); color: var(--accent);
      border: 1px solid var(--border); font-weight: 400;
    }
    .glossary-term dd { color: var(--text-secondary); line-height: 1.65; font-size: .875rem; }

    /* ── DOC SEARCH (FAB + panel) ─── */
    .chatbot-fab {
      position: fixed; bottom: 28px; right: 80px; z-index: 90;
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--accent); color: #fff; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.3); transition: all .2s var(--ease);
    }
    .chatbot-fab:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(0,0,0,.4); }
    .chatbot-fab svg { width: 20px; height: 20px; }
    @media (max-width: 768px) { .chatbot-fab { bottom: 68px; right: 16px; } #back-top { right: 68px; } }

    .chatbot-panel {
      position: fixed; bottom: 84px; right: 28px; z-index: 95;
      width: 360px; max-height: 480px; background: var(--bg-elevated);
      border: 1px solid var(--border-strong); border-radius: var(--radius);
      box-shadow: var(--shadow-lg); display: none; flex-direction: column;
      overflow: hidden;
    }
    .chatbot-panel.open { display: flex; }
    @media (max-width: 768px) { .chatbot-panel { bottom: 120px; right: 8px; left: 8px; width: auto; } }

    .chatbot-header {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .chatbot-header-title { font-size: .875rem; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 6px; }
    .chatbot-header-title svg { width: 14px; height: 14px; color: var(--accent); }
    .chatbot-close {
      background: none; border: none; color: var(--text-tertiary);
      cursor: pointer; padding: 4px; border-radius: var(--radius-xs);
      transition: color var(--dur); display: flex;
    }
    .chatbot-close:hover { color: var(--text-primary); }
    .chatbot-close svg { width: 14px; height: 14px; }

    .chatbot-messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
      min-height: 200px; max-height: 340px;
    }
    .chat-msg {
      max-width: 85%; padding: 8px 12px; border-radius: var(--radius-sm);
      font-size: .8125rem; line-height: 1.55;
    }
    .chat-msg.bot {
      background: var(--bg-secondary); color: var(--text-secondary);
      align-self: flex-start; border: 1px solid var(--border);
    }
    .chat-msg.user {
      background: var(--accent-soft); color: var(--text-primary);
      align-self: flex-end; border: 1px solid var(--accent-border);
    }
    .chat-msg a { color: var(--accent); font-weight: 500; cursor: pointer; }
    .chat-msg a:hover { text-decoration: underline; }
    .chat-suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .chat-suggestion {
      font-size: .75rem; padding: 4px 10px; border-radius: 9999px;
      border: 1px solid var(--border-strong); background: var(--bg-elevated);
      color: var(--text-secondary); cursor: pointer; transition: all var(--dur);
    }
    .chat-suggestion:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

    .chatbot-input-wrap {
      padding: 10px 12px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; flex-shrink: 0;
    }
    .chatbot-input {
      flex: 1; padding: 7px 12px; border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm); background: var(--bg-secondary);
      color: var(--text-primary); font-family: var(--font-body);
      font-size: .8125rem; outline: none; transition: border-color var(--dur);
    }
    .chatbot-input:focus { border-color: var(--accent); }
    .chatbot-input::placeholder { color: var(--text-tertiary); }
    .chatbot-send {
      padding: 7px 12px; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-sm); cursor: pointer;
      font-size: .8125rem; font-weight: 500; transition: background var(--dur);
      display: flex; align-items: center;
    }
    .chatbot-send:hover { background: var(--accent-hover); }
    .chatbot-send svg { width: 14px; height: 14px; }

    /* ── SHARE BUTTON ─── */
    .share-btn {
      background: none; border: 1px solid var(--border-strong);
      color: var(--text-tertiary); padding: 4px 10px;
      border-radius: var(--radius-sm); font-size: .75rem;
      cursor: pointer; transition: all var(--dur);
      display: inline-flex; align-items: center; gap: 4px;
    }
    .share-btn:hover { color: var(--accent); border-color: var(--accent); }
    .share-btn svg { width: 12px; height: 12px; }

    /* ── TEXT SIZE ─── */
    .text-size-controls {
      display: flex; align-items: center; gap: 2px; flex-shrink: 0;
    }
    .text-size-btn {
      background: none; border: 1px solid var(--border-strong);
      color: var(--text-secondary); width: 28px; height: 28px;
      border-radius: var(--radius-xs); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; font-weight: 600; transition: all var(--dur);
      font-family: var(--font-body);
    }
    .text-size-btn:hover { color: var(--text-primary); border-color: var(--accent); }
    .text-size-btn:first-child { border-radius: var(--radius-xs) 0 0 var(--radius-xs); border-right: none; }
    .text-size-btn:last-child { border-radius: 0 var(--radius-xs) var(--radius-xs) 0; }

    /* ── OFFLINE BANNER ─── */
    .offline-banner {
      display: none; position: fixed; top: var(--header-h); left: 0; right: 0;
      background: var(--warning-soft); border-bottom: 1px solid rgba(253,126,20,.3);
      color: var(--warning); text-align: center; padding: 6px;
      font-size: .8125rem; font-weight: 500; z-index: 99;
    }
    .offline-banner.show { display: block; }

    /* ── ONBOARDING TOUR ─── */
    .tour-overlay {
      position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,.70); backdrop-filter: blur(3px);
      display: none; align-items: center; justify-content: center;
    }
    .tour-overlay.active { display: flex; }

    .tour-card {
      background: var(--bg-elevated); border: 1px solid var(--border-strong);
      border-radius: var(--radius); padding: 28px 32px;
      max-width: 420px; width: 90%; box-shadow: var(--shadow-lg);
      text-align: center; animation: fadeUp .2s var(--ease);
    }
    .tour-card h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; color: var(--text-primary); letter-spacing: -.02em; }
    .tour-card p { font-size: .875rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 20px; }
    .tour-icon { margin-bottom: 16px; color: var(--accent); }
    .tour-icon svg { width: 40px; height: 40px; }

    .tour-steps { display: flex; gap: 6px; justify-content: center; margin-bottom: 20px; }
    .tour-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--bg-tertiary); transition: all .2s;
    }
    .tour-dot.active { background: var(--accent); width: 20px; border-radius: 4px; }

    .tour-actions { display: flex; gap: 10px; justify-content: center; }
    .tour-btn {
      padding: 8px 20px; border-radius: var(--radius-sm);
      font-size: .875rem; font-weight: 500; cursor: pointer;
      transition: all var(--dur); border: none;
    }
    .tour-btn-primary { background: var(--accent); color: #fff; }
    .tour-btn-primary:hover { background: var(--accent-hover); }
    .tour-btn-ghost {
      background: transparent; color: var(--text-tertiary);
      border: 1px solid var(--border-strong);
    }
    .tour-btn-ghost:hover { color: var(--text-primary); border-color: var(--text-tertiary); }

    /* ── ROLE PICKER ─── */
    .role-picker { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
    .role-card {
      padding: 16px; background: var(--bg-secondary);
      border: 2px solid var(--border-strong); border-radius: var(--radius);
      cursor: pointer; transition: all var(--dur); text-align: left;
    }
    .role-card:hover { border-color: var(--accent); background: var(--accent-soft); }
    .role-card.selected { border-color: var(--accent); background: var(--accent-soft); box-shadow: 0 0 0 2px rgba(33,132,243,.2); }
    .role-card-icon { font-size: .875rem; margin-bottom: 6px; color: var(--accent); display: flex; }
    .role-card-icon svg { width: 20px; height: 20px; }
    .role-card-title { font-weight: 600; font-size: .875rem; color: var(--text-primary); }
    .role-card-desc { font-size: .75rem; color: var(--text-tertiary); margin-top: 2px; }

    /* ── GETTING STARTED CHECKLIST ─── */
    .checklist { margin-bottom: 28px; }
    .checklist-title {
      font-size: .875rem; font-weight: 600; color: var(--text-primary);
      margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
    }
    .checklist-progress {
      font-size: .75rem; color: var(--text-tertiary); font-weight: 400;
    }
    .checklist-item {
      display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      margin-bottom: 6px; cursor: pointer; transition: all var(--dur);
      font-size: .875rem; color: var(--text-secondary);
    }
    .checklist-item:hover { border-color: var(--accent); background: var(--bg-hover); }
    .checklist-item.done { opacity: .55; }
    .checklist-item.done .cl-text { text-decoration: line-through; }
    .checklist-check {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid var(--border-strong); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      margin-top: 1px; transition: all var(--dur);
    }
    .checklist-item.done .checklist-check {
      background: var(--success); border-color: var(--success); color: #fff;
    }
    .checklist-item.done .checklist-check svg { width: 10px; height: 10px; }
    .cl-text { flex: 1; }
    .cl-link { color: var(--accent); font-weight: 500; }

    /* ── PULSE HINT ─── */
    /* ── TROUBLESHOOT WIZARD ─── */
    .wizard-step { animation: fadeUp .18s var(--ease); }
    .wizard-question {
      font-size: 1.0625rem; font-weight: 600; color: var(--text-primary);
      margin-bottom: 16px; line-height: 1.4;
    }
    .wizard-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .wizard-option {
      padding: 12px 16px; background: var(--bg-elevated);
      border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
      cursor: pointer; transition: all var(--dur); font-size: .875rem;
      color: var(--text-secondary); display: flex; align-items: center; gap: 10px;
    }
    .wizard-option:hover { border-color: var(--accent); color: var(--text-primary); background: var(--accent-soft); }
    .wizard-option svg { width: 16px; height: 16px; color: var(--accent); flex-shrink: 0; }
    .wizard-restart {
      font-size: .8125rem; color: var(--text-tertiary); cursor: pointer;
      background: none; border: none; padding: 0; margin-top: 8px;
      transition: color var(--dur);
    }
    .wizard-restart:hover { color: var(--accent); }
    .wizard-result {
      padding: 16px; background: var(--bg-elevated);
      border: 1px solid var(--border-strong); border-radius: var(--radius);
      margin-bottom: 16px;
    }
    .wizard-result p { margin-bottom: 8px; }

    /* ── ERROR LOOKUP ─── */
    .error-lookup { margin-bottom: 24px; }
    .error-input {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
      background: var(--bg-secondary); color: var(--text-primary);
      font-family: var(--font-mono); font-size: .8125rem;
      outline: none; transition: border-color var(--dur); margin-bottom: 10px;
    }
    .error-input:focus { border-color: var(--accent); }
    .error-input::placeholder { color: var(--text-tertiary); font-family: var(--font-body); }
    .error-results { display: flex; flex-direction: column; gap: 8px; }
    .error-match {
      padding: 10px 14px; background: var(--bg-elevated);
      border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
      cursor: pointer; transition: all var(--dur); font-size: .8125rem;
    }
    .error-match:hover { border-color: var(--accent); background: var(--accent-soft); }
    .error-match-title { font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
    .error-match-hint { color: var(--text-secondary); font-size: .75rem; }

    /* ── GLOSSARY TOOLTIP ─── */
    .term-tooltip {
      border-bottom: 1px dotted var(--accent); cursor: help;
      position: relative; color: var(--accent);
    }
    .term-tooltip-popup {
      display: none; position: absolute; bottom: calc(100% + 8px); left: 50%;
      transform: translateX(-50%); width: 260px; padding: 10px 12px;
      background: var(--bg-elevated); border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm); box-shadow: var(--shadow-lg);
      font-size: .8125rem; color: var(--text-secondary); line-height: 1.5;
      z-index: 200; pointer-events: none;
    }
    .term-tooltip:hover .term-tooltip-popup,
    .term-tooltip:focus .term-tooltip-popup { display: block; }
    .term-tooltip-popup::after {
      content: ''; position: absolute; top: 100%; left: 50%;
      transform: translateX(-50%); border: 6px solid transparent;
      border-top-color: var(--border-strong);
    }

    /* ── CONTACT FORM ─── */
    .contact-form { margin-top: 16px; }
    .contact-field {
      width: 100%; padding: 8px 12px; margin-bottom: 8px;
      border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
      background: var(--bg-secondary); color: var(--text-primary);
      font-family: var(--font-body); font-size: .8125rem; outline: none;
      transition: border-color var(--dur); resize: vertical;
    }
    .contact-field:focus { border-color: var(--accent); }
    .contact-field::placeholder { color: var(--text-tertiary); }
    .contact-submit {
      padding: 8px 20px; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-sm); cursor: pointer;
      font-size: .8125rem; font-weight: 500; transition: background var(--dur);
    }
    .contact-submit:hover { background: var(--accent-hover); }

    /* ── SPEED CALCULATOR ─── */
    .calc-wrap { margin-bottom: 24px; }
    .calc-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .calc-label { font-size: .8125rem; color: var(--text-secondary); min-width: 80px; }
    .calc-input {
      width: 120px; padding: 7px 12px;
      border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
      background: var(--bg-secondary); color: var(--text-primary);
      font-family: var(--font-body); font-size: .875rem; outline: none;
      transition: border-color var(--dur);
    }
    .calc-input:focus { border-color: var(--accent); }
    .calc-unit { font-size: .8125rem; color: var(--text-tertiary); }
    .calc-result {
      padding: 14px 16px; background: var(--accent-soft);
      border: 1px solid var(--accent-border); border-radius: var(--radius-sm);
      font-size: .9375rem; font-weight: 600; color: var(--text-primary);
      display: none;
    }
    .calc-result.show { display: block; }

    /* ── COMPARISON TABLE ─── */
    .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    @media (max-width: 520px) { .compare-grid { grid-template-columns: 1fr; } }
    .compare-card {
      padding: 18px; background: var(--bg-elevated);
      border: 1px solid var(--border-strong); border-radius: var(--radius);
    }
    .compare-card h3 { font-size: 1rem; margin-bottom: 8px; color: var(--text-primary); }
    .compare-card p { font-size: .8125rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 8px; }
    .compare-card ul { padding-left: 18px; margin: 0; }
    .compare-card li { font-size: .8125rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 4px; }
    .compare-label {
      display: inline-block; font-size: .6875rem; font-weight: 600;
      padding: 2px 8px; border-radius: 9999px; margin-bottom: 10px;
      text-transform: uppercase; letter-spacing: .05em;
    }
    .compare-label.private { background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent-border); }
    .compare-label.shared { background: var(--success-soft); color: var(--success); border: 1px solid rgba(64,192,87,.28); }

    /* ── PREFLIGHT CHECKLIST ─── */
    .preflight { margin-bottom: 24px; }
    .preflight-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      margin-bottom: 6px; font-size: .875rem; color: var(--text-secondary);
      cursor: pointer; transition: all var(--dur); user-select: none;
    }
    .preflight-item:hover { border-color: var(--accent); background: var(--bg-hover); }
    .preflight-item.checked { color: var(--text-tertiary); }
    .preflight-item.checked .pf-text { text-decoration: line-through; }
    .preflight-box {
      width: 18px; height: 18px; border-radius: 4px;
      border: 2px solid var(--border-strong); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--dur);
    }
    .preflight-item.checked .preflight-box {
      background: var(--success); border-color: var(--success); color: #fff;
    }
    .preflight-item.checked .preflight-box svg { width: 10px; height: 10px; }
    .preflight-status {
      padding: 12px 16px; border-radius: var(--radius-sm);
      font-size: .875rem; font-weight: 500; margin-top: 8px; display: none;
    }
    .preflight-status.ready { display: block; background: var(--success-soft); color: var(--success); border: 1px solid rgba(64,192,87,.28); }

    /* ── BROWSER CHECK ─── */
    .browser-result {
      padding: 14px 16px; border-radius: var(--radius-sm);
      font-size: .875rem; margin-bottom: 20px; display: flex;
      align-items: center; gap: 10px;
    }
    .browser-result svg { width: 18px; height: 18px; flex-shrink: 0; }
    .browser-result.good { background: var(--success-soft); color: var(--success); border: 1px solid rgba(64,192,87,.28); }
    .browser-result.warn { background: var(--warning-soft); color: var(--warning); border: 1px solid rgba(253,126,20,.28); }

    /* ── SHORTCUT CARD ─── */
    .shortcut-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
    @media (max-width: 520px) { .shortcut-grid { grid-template-columns: 1fr; } }
    .shortcut-card {
      padding: 10px 14px; background: var(--bg-elevated);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      display: flex; justify-content: space-between; align-items: center;
      font-size: .8125rem;
    }
    .shortcut-card span { color: var(--text-secondary); }
    .shortcut-card kbd {
      font-family: var(--font-mono); font-size: .75rem; color: var(--text-tertiary);
      border: 1px solid var(--border-strong); border-radius: 4px;
      padding: 2px 7px; background: var(--bg-tertiary);
    }

    /* ── WIZARD ESCALATION ─── */
    .wizard-feedback { display: flex; align-items: center; gap: 10px; margin-top: 12px; font-size: .8125rem; color: var(--text-tertiary); }
    .wizard-fb-btn {
      padding: 4px 14px; border-radius: var(--radius-sm);
      border: 1px solid var(--border-strong); background: var(--bg-elevated);
      color: var(--text-secondary); font-size: .8125rem; cursor: pointer; transition: all var(--dur);
    }
    .wizard-fb-btn:hover { border-color: var(--accent); color: var(--text-primary); }
    .wizard-fb-btn.selected { border-color: var(--success); color: var(--success); background: var(--success-soft); pointer-events: none; }
    .wizard-escalate {
      margin-top: 10px; padding: 12px 14px; background: var(--warning-soft);
      border: 1px solid rgba(253,126,20,.28); border-radius: var(--radius-sm);
      font-size: .8125rem; color: var(--text-secondary); display: none;
    }
    .wizard-escalate.show { display: block; }
    .wizard-escalate a { color: var(--accent); font-weight: 500; }

    /* ── WHATS NEW BADGE ─── */
    .new-badge {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); margin-left: 6px; vertical-align: middle;
      animation: pulse-ring 2s ease-out infinite;
    }

    /* ── PRINT BUTTON ─── */
    .print-btn {
      background: none; border: 1px solid var(--border-strong);
      color: var(--text-tertiary); padding: 4px 10px;
      border-radius: var(--radius-sm); font-size: .75rem;
      cursor: pointer; transition: all var(--dur);
      display: inline-flex; align-items: center; gap: 4px;
    }
    .print-btn:hover { color: var(--accent); border-color: var(--accent); }
    .print-btn svg { width: 12px; height: 12px; }
    @media print { .print-btn { display: none !important; } }

    /* ── LANGUAGE TOGGLE ─── */
    .lang-toggle {
      background: none; border: 1px solid var(--border-strong);
      color: var(--text-secondary); padding: 4px 8px;
      border-radius: var(--radius-sm); font-size: .75rem; font-weight: 600;
      cursor: pointer; transition: all var(--dur); flex-shrink: 0;
      min-width: 32px; text-align: center;
    }
    .lang-toggle:hover { color: var(--text-primary); border-color: var(--accent); }
    .lang-toggle.es { background: var(--accent-soft); border-color: var(--accent-border); color: var(--accent); }

    /* ── STEP TIPS ─── */
    .step-tips { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
    .step-tip {
      display: flex; gap: 14px; padding: 16px;
      background: var(--bg-elevated); border: 1px solid var(--border-strong);
      border-radius: var(--radius); transition: all var(--dur);
    }
    .step-tip:hover { border-color: var(--accent-border); }
    .step-num {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent); color: #fff; font-weight: 700;
      font-size: .875rem; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }
    .step-body { flex: 1; }
    .step-body h4 { font-size: .9375rem; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
    .step-body p { font-size: .8125rem; color: var(--text-secondary); line-height: 1.55; margin: 0; }

    /* ── TIMELINE ─── */
    .timeline { position: relative; padding-left: 28px; margin-bottom: 28px; }
    .timeline::before {
      content: ''; position: absolute; left: 11px; top: 0; bottom: 0;
      width: 2px; background: var(--border-strong);
    }
    .timeline-item { position: relative; margin-bottom: 24px; }
    .timeline-item:last-child { margin-bottom: 0; }
    .timeline-dot {
      position: absolute; left: -28px; top: 2px;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--bg-elevated); border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      z-index: 1;
    }
    .timeline-dot svg { width: 10px; height: 10px; color: var(--accent); }
    .timeline-week {
      font-size: .6875rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .06em; color: var(--accent); margin-bottom: 4px;
    }
    .timeline-title { font-size: 1rem; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
    .timeline-body { font-size: .8125rem; color: var(--text-secondary); line-height: 1.6; }
    .timeline-body ul { padding-left: 18px; margin: 6px 0 0; }
    .timeline-body li { margin-bottom: 3px; }
    .timeline-body a { color: var(--accent); font-weight: 500; cursor: pointer; }

    /* ── RELEASE NOTES ─── */
    .release-entry {
      padding: 20px 0; border-bottom: 1px solid var(--border);
    }
    .release-entry:last-child { border-bottom: none; }
    .release-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .release-version {
      font-size: 1.125rem; font-weight: 700; color: var(--text-primary);
      letter-spacing: -.02em;
    }
    .release-date {
      font-size: .75rem; color: var(--text-tertiary); font-weight: 400;
    }
    .release-status {
      display: inline-flex; font-size: .6875rem; font-weight: 600;
      padding: 2px 8px; border-radius: 9999px;
      text-transform: uppercase; letter-spacing: .05em;
    }
    .release-status.shipped { background: var(--success-soft); color: var(--success); border: 1px solid rgba(64,192,87,.28); }
    .release-status.in-progress { background: var(--accent-soft); color: var(--accent); border: 1px solid var(--accent-border); }
    .release-status.planned { background: var(--bg-tertiary); color: var(--text-tertiary); border: 1px solid var(--border-strong); }
    .release-items { display: flex; flex-direction: column; gap: 8px; }
    .release-item {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: .875rem; color: var(--text-secondary); line-height: 1.6;
    }
    .release-badge {
      display: inline-flex; font-size: .625rem; font-weight: 600;
      padding: 1px 6px; border-radius: 3px; flex-shrink: 0; margin-top: 3px;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .release-badge.new { background: var(--success-soft); color: var(--success); }
    .release-badge.improved { background: var(--accent-soft); color: var(--accent); }
    .release-badge.fixed { background: var(--warning-soft); color: var(--warning); }
    .release-filter {
      display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .release-filter-btn {
      padding: 4px 12px; border-radius: 9999px; font-size: .75rem; font-weight: 500;
      border: 1px solid var(--border-strong); background: var(--bg-elevated);
      color: var(--text-secondary); cursor: pointer; transition: all var(--dur);
    }
    .release-filter-btn:hover { border-color: var(--accent); color: var(--text-primary); }
    .release-filter-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

    /* ── FEATURE POLL ─── */
    .poll-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
    .poll-item {
      display: flex; align-items: center; gap: 12px; padding: 14px 16px;
      background: var(--bg-elevated); border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm); transition: all var(--dur);
    }
    .poll-item:hover { border-color: var(--accent-border); }
    .poll-vote-btn {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      background: none; border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm); padding: 6px 10px; cursor: pointer;
      transition: all var(--dur); flex-shrink: 0; min-width: 48px;
    }
    .poll-vote-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
    .poll-vote-btn.voted { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
    .poll-vote-btn svg { width: 14px; height: 14px; }
    .poll-vote-count {
      font-size: .8125rem; font-weight: 700; color: var(--text-primary);
      font-family: var(--font-mono);
    }
    .poll-item-body { flex: 1; }
    .poll-item-title { font-size: .9375rem; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
    .poll-item-desc { font-size: .8125rem; color: var(--text-secondary); line-height: 1.5; }
    .poll-item-tag {
      display: inline-flex; font-size: .625rem; font-weight: 600;
      padding: 1px 6px; border-radius: 3px; text-transform: uppercase;
      letter-spacing: .04em; margin-top: 4px;
    }
    .poll-item-tag.video { background: var(--accent-soft); color: var(--accent); }
    .poll-item-tag.workflow { background: var(--success-soft); color: var(--success); }
    .poll-item-tag.integrations { background: var(--warning-soft); color: var(--warning); }
    .poll-item-tag.mobile { background: var(--danger-soft); color: var(--danger); }
    .poll-item-tag.analytics { background: rgba(156,39,176,.10); color: #ab47bc; }
    :root.light .poll-item-tag.analytics { color: #7b1fa2; }
    .poll-sort {
      display: flex; gap: 6px; margin-bottom: 16px; align-items: center;
      font-size: .75rem; color: var(--text-tertiary);
    }
    .poll-sort-btn {
      padding: 3px 10px; border-radius: 9999px; font-size: .75rem;
      border: 1px solid var(--border-strong); background: var(--bg-elevated);
      color: var(--text-secondary); cursor: pointer; transition: all var(--dur);
    }
    .poll-sort-btn:hover { border-color: var(--accent); }
    .poll-sort-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
    .poll-submit {
      padding: 16px; background: var(--bg-elevated);
      border: 1px solid var(--border-strong); border-radius: var(--radius);
      margin-top: 8px;
    }
    .poll-submit-title { font-size: .875rem; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }
    .poll-submit-row { display: flex; gap: 8px; }
    .poll-submit-input {
      flex: 1; padding: 8px 12px; border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm); background: var(--bg-secondary);
      color: var(--text-primary); font-family: var(--font-body); font-size: .8125rem;
      outline: none; transition: border-color var(--dur);
    }
    .poll-submit-input:focus { border-color: var(--accent); }
    .poll-submit-input::placeholder { color: var(--text-tertiary); }
    .poll-submit-btn {
      padding: 8px 16px; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-sm); cursor: pointer;
      font-size: .8125rem; font-weight: 500; transition: background var(--dur);
      white-space: nowrap;
    }
    .poll-submit-btn:hover { background: var(--accent-hover); }
    .poll-total { font-size: .75rem; color: var(--text-tertiary); margin-bottom: 16px; }

    /* ── WELCOME BACK BAR ─── */
    .welcome-back {
      padding: 10px 16px; background: var(--accent-soft);
      border: 1px solid var(--accent-border); border-radius: var(--radius-sm);
      margin-bottom: 20px; display: flex; align-items: center;
      justify-content: space-between; gap: 10px; font-size: .8125rem;
      animation: fadeUp .2s var(--ease);
    }
    .welcome-back a { color: var(--accent); font-weight: 500; cursor: pointer; }
    .welcome-back-close {
      background: none; border: none; color: var(--text-tertiary);
      cursor: pointer; padding: 2px; display: flex; flex-shrink: 0;
    }
    .welcome-back-close svg { width: 12px; height: 12px; }

    /* ── SEARCH HISTORY ─── */
    .search-history { padding: 8px 0; }
    .search-history-title { padding: 6px 14px; font-size: .6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-tertiary); }
    .search-history-item {
      padding: 8px 14px; cursor: pointer; font-size: .8125rem;
      color: var(--text-secondary); display: flex; align-items: center; gap: 8px;
      transition: background var(--dur);
    }
    .search-history-item:hover { background: var(--bg-hover); }
    .search-history-item svg { width: 12px; height: 12px; color: var(--text-tertiary); flex-shrink: 0; }

    /* ── NUDGE PROMPT ─── */
    .nudge-prompt {
      position: fixed; bottom: 84px; right: 80px; z-index: 88;
      background: var(--bg-elevated); border: 1px solid var(--border-strong);
      border-radius: var(--radius); padding: 12px 16px; max-width: 240px;
      box-shadow: var(--shadow-lg); font-size: .8125rem; color: var(--text-secondary);
      animation: fadeUp .2s var(--ease); display: none;
    }
    .nudge-prompt.show { display: block; }
    .nudge-prompt a { color: var(--accent); font-weight: 500; cursor: pointer; }
    .nudge-close {
      position: absolute; top: 6px; right: 8px; background: none; border: none;
      color: var(--text-tertiary); cursor: pointer; font-size: 12px;
    }
    @media (max-width: 768px) { .nudge-prompt { bottom: 130px; right: 16px; left: 16px; max-width: none; } }

    /* ── COPY ARTICLE ─── */
    .copy-article-btn {
      background: none; border: 1px solid var(--border-strong);
      color: var(--text-tertiary); padding: 4px 10px;
      border-radius: var(--radius-sm); font-size: .75rem;
      cursor: pointer; transition: all var(--dur);
      display: inline-flex; align-items: center; gap: 4px;
    }
    .copy-article-btn:hover { color: var(--accent); border-color: var(--accent); }
    .copy-article-btn svg { width: 12px; height: 12px; }
    @media print { .copy-article-btn { display: none !important; } }

    /* ── LAST UPDATED ─── */
    .last-updated { font-size: .75rem; color: var(--text-tertiary); margin-top: 6px; }

    /* ── HIGHLIGHT ─── */
    .user-highlight {
      background: rgba(253,126,20,.18); border-radius: 2px;
      padding: 0 1px; cursor: pointer; position: relative;
    }
    .user-highlight:hover { background: rgba(253,126,20,.30); }
    .highlight-tooltip {
      display: none; position: absolute; bottom: calc(100% + 6px); left: 0;
      background: var(--bg-elevated); border: 1px solid var(--border-strong);
      border-radius: var(--radius-xs); padding: 4px 6px;
      font-size: .75rem; color: var(--text-secondary);
      box-shadow: var(--shadow); white-space: nowrap; z-index: 50;
      cursor: pointer; transition: color var(--dur), border-color var(--dur);
    }
    .highlight-tooltip:hover { color: var(--danger); border-color: var(--danger); }
    .user-highlight:hover .highlight-tooltip { display: flex; align-items: center; gap: 4px; }

    /* ── COMMAND PALETTE ─── */
    .palette-overlay {
      display: none; position: fixed; inset: 0; z-index: 350;
      background: rgba(0,0,0,.55); backdrop-filter: blur(3px);
      align-items: flex-start; justify-content: center; padding-top: 20vh;
    }
    .palette-overlay.active { display: flex; }
    .palette-box {
      background: var(--bg-elevated); border: 1px solid var(--border-strong);
      border-radius: var(--radius); width: 90%; max-width: 480px;
      box-shadow: var(--shadow-lg); overflow: hidden;
    }
    .palette-input {
      width: 100%; padding: 14px 18px; border: none; border-bottom: 1px solid var(--border);
      background: transparent; color: var(--text-primary);
      font-family: var(--font-body); font-size: 1rem; outline: none;
    }
    .palette-input::placeholder { color: var(--text-tertiary); }
    .palette-results { max-height: 320px; overflow-y: auto; }
    .palette-item {
      padding: 10px 18px; display: flex; align-items: center; gap: 10px;
      cursor: pointer; transition: background var(--dur); font-size: .875rem;
    }
    .palette-item:hover, .palette-item.focused { background: var(--bg-hover); }
    .palette-item svg { width: 14px; height: 14px; color: var(--text-tertiary); flex-shrink: 0; }
    .palette-item-title { color: var(--text-primary); }
    .palette-item-hint { font-size: .75rem; color: var(--text-tertiary); margin-left: auto; }
    .palette-item-type {
      font-size: .6875rem; color: var(--text-tertiary); background: var(--bg-tertiary);
      padding: 1px 6px; border-radius: 3px; margin-left: auto;
    }

    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(33,132,243,.4); }
      70% { box-shadow: 0 0 0 8px rgba(33,132,243,0); }
      100% { box-shadow: 0 0 0 0 rgba(33,132,243,0); }
    }
    .pulse-hint { animation: pulse-ring 2s ease-out 3; }

    /* ── FAQ ACCORDION ─── */
    .faq-item { border-bottom: 1px solid var(--border); }
    .faq-question {
      padding: 14px 0; font-size: .9375rem; font-weight: 600; color: var(--text-primary);
      cursor: pointer; display: flex; justify-content: space-between; align-items: center;
      user-select: none; transition: color var(--dur);
      background: none; border: none; width: 100%; text-align: left;
      font-family: var(--font-body);
    }
    .faq-question:hover { color: var(--accent); }
    .faq-chevron {
      font-size: .625rem; color: var(--text-tertiary); transition: transform .18s var(--ease);
      flex-shrink: 0; margin-left: 12px;
    }
    .faq-item.open .faq-chevron { transform: rotate(180deg); }
    .faq-answer {
      max-height: 0; overflow: hidden; transition: max-height .25s var(--ease), padding-bottom .25s var(--ease);
      padding: 0;
    }
    .faq-item.open .faq-answer { max-height: 500px; padding-bottom: 16px; }
    .faq-answer p, .faq-answer ul, .faq-answer li { color: var(--text-secondary); }
    .faq-answer p { margin-bottom: 8px; line-height: 1.65; }

    /* ── MOBILE BOTTOM NAV ─── */
    .mobile-nav {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      height: 52px; background: var(--bg-glass);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border-top: 1px solid var(--border);
      z-index: 80; justify-content: space-around; align-items: center;
    }
    .mobile-nav-btn {
      background: none; border: none; color: var(--text-tertiary);
      font-size: 10px; display: flex; flex-direction: column;
      align-items: center; gap: 2px; cursor: pointer;
      padding: 8px 14px; min-width: 44px; min-height: 44px;
      transition: color var(--dur); text-decoration: none;
      justify-content: center;
    }
    .mobile-nav-btn:hover, .mobile-nav-btn:active { color: var(--accent); }
    .mobile-nav-btn svg { width: 20px; height: 20px; }
    @media (max-width: 768px) {
      .mobile-nav { display: flex; }
      .content-with-toc { padding-bottom: 100px !important; }
      #back-top { bottom: 68px; }
      #toast { bottom: 68px; }
      .nudge-prompt { bottom: 68px; }
    }
  </style>
</head>

<li>Use the coach filter to quickly review your notes across several recordings.</li>
</ul>
<div class="hint hint-tip"><div class="hint-icon">${IC.tip}</div><div>Playback shortcuts and the full note workflow: <a onclick="navigate('playback')">Watching and reviewing</a>.</div></div>`},

    tags: {
      title: "Tags and organization", section: "Sessions & Classes",
      content: `
<h1>Tags and organization</h1>
<p>Tags group related sessions and classes so lists stay easy to filter as your library grows.</p>
<h2>Tag ideas</h2>
<ul>
<li>Topic: <code>form-review</code>, <code>conditioning</code>, <code>competition</code></li>
<li>Format: <code>private</code>, <code>group</code>, <code>workshop</code></li>
<li>Level: <code>fundamentals</code>, <code>advanced</code>, <code>beginner</code></li>
</ul>
<h2>Adding tags</h2>
<p>In the session or class form, type a tag and press <strong>Enter</strong>. Repeat for additional tags.</p>
<h2>Finding content</h2>
<p>List views let you filter by tag — for example, everything tagged <code>milestone</code> for a specific training block.</p>
<h2>Consistency tips</h2>
<ul>
<li>Use one spelling and style per concept (avoid <code>review</code>, <code>Review</code>, and <code>form-review</code> for the same thing).</li>
<li>Agree on a shared vocabulary so your whole team uses consistent tags.</li>
<li>Tags are shared across the account, not private to one person.</li>
</ul>
<div class="hint hint-info"><div class="hint-icon">${IC.info}</div><div>Filter your lists by tag in the app after you <a href="https://app.kaynos.net" target="_blank" rel="noopener">sign in</a>.</div></div>`},

    progress: {
      title: "Progress tracking", section: "Sessions & Classes",
      content: `
<h1>Progress tracking</h1>
<p>Progress is simple on purpose: enough to see whether someone finished a recording and when they last opened it.</p>
<h2>What we store</h2>
<ul>
<li>Last playback position (for resume)</li>
<li>Whether the full video was completed</li>
<li>Last opened time</li>
</ul>
<h2>For members</h2>
<p>They resume where they left off. Overviews show items that still need a full watch versus completed items.</p>
<h2>For coaches and owners</h2>
<p>Coach and admin views show completion and recency. We do not track fine-grained analytics or viewer heatmaps.</p>
<h2>What we intentionally avoid</h2>
<p>No invasive watch analytics or third-party ad-style tracking. The product stores only what it needs for resume and high-level completion tracking.</p>
<div class="hint hint-info"><div class="hint-icon">${IC.info}</div><div>Roster and access control: <a onclick="navigate('managing-members')">Managing members</a>.</div></div>`},

    "managing-members": {
      title: "Managing members", section: "Account Management",
      content: `
<h1>Managing members</h1>
<p>Admins use <strong>Admin</strong> for the full roster. Coaches can use <strong>Clients</strong> to manage client invites on their side. Everything happens in <a href="https://app.kaynos.net" target="_blank" rel="noopener">app.kaynos.net</a>.</p>
<h2>Add someone</h2>
<p>See <a onclick="navigate('inviting-members')">Inviting your team</a> for the step-by-step invite flow.</p>
<h2>Change roles</h2>
<p><strong>Admin</strong> → select the member → role dropdown → save. Changes apply immediately. Details: <a onclick="navigate('roles')">Understanding user roles</a>.</p>
<h2>Remove access</h2>
<p><strong>Remove Member</strong> ends their access immediately. Notes they already created remain for history.</p>
<div class="hint hint-warning"><div class="hint-icon">${IC.warn}</div><div>Removal is immediate — the person loses login access to your account on <a href="https://app.kaynos.net" target="_blank" rel="noopener">app.kaynos.net</a> right away.</div></div>
<h2>Common questions</h2>
<p><strong>One person, two accounts?</strong> Use a different email address per account. Each account is completely separate.</p>
<p><strong>Member limits?</strong> The product does not enforce a headcount cap.</p>
<p><strong>Client-to-client invites?</strong> Only staff roles can invite; clients cannot invite other clients.</p>`},
