    "upload-issues": {
      title: "Video upload problems", section: "Troubleshooting",
      content: `
<h1>Video upload problems</h1>
<p>Large uploads depend on stable internet and a supported format. Work through the checks below before assuming an app bug.</p>
<div class="hint hint-info"><div class="hint-icon">${IC.info}</div><div>Reference: <a onclick="navigate('formats')">Supported formats and limits</a>, <a onclick="navigate('uploading')">Uploading videos</a>.</div></div>
<h2>Fails immediately</h2>
<p><strong>"Please select a video file":</strong> the file may not be MP4, MOV, WebM, or MKV. Convert to MP4 with <a href="https://handbrake.fr" target="_blank" rel="noopener">HandBrake</a> or <a href="https://www.videolan.org/vlc/" target="_blank" rel="noopener">VLC</a>, then try again.</p>
<p><strong>File too big:</strong> the limit is 5 GB. Trim the clip or export at 1080p — HandBrake's "Fast 1080p30" preset is a common choice.</p>
<h2>Progress appears stuck</h2>
<ol>
<li>Large files can pause between chunks for roughly 30–60 seconds — this is normal.</li>
<li>Confirm the network works (open another site).</li>
<li>Cancel the upload and start again if it doesn't advance after 2 minutes.</li>
</ol>
<h2>Fails partway through</h2>
<ul>
<li><strong>Network error during part upload:</strong> reconnect and retry.</li>
<li><strong>Part upload failed: 403:</strong> on very long uploads the session can expire. Cancel and upload again.</li>
<li><strong>500 server error:</strong> wait briefly and retry; if it persists, email <a href="mailto:support@kaynos.net">support@kaynos.net</a>.</li>
</ul>
<h2>Slow uploads</h2>
<p>Measure your <strong>upload</strong> speed, not download. <a href="https://fast.com" target="_blank" rel="noopener">fast.com</a> shows upload after the initial result.</p>
<table><thead><tr><th>Upload speed</th><th>500 MB</th><th>1 GB</th><th>2 GB</th></tr></thead><tbody>
<tr><td>10 Mbps</td><td>~7 min</td><td>~14 min</td><td>~28 min</td></tr>
<tr><td>25 Mbps</td><td>~3 min</td><td>~5 min</td><td>~11 min</td></tr>
<tr><td>50 Mbps</td><td>~1.5 min</td><td>~3 min</td><td>~5 min</td></tr>
<tr><td>100 Mbps</td><td>~45 sec</td><td>~1.5 min</td><td>~3 min</td></tr>
</tbody></table>
<p>A wired connection often beats crowded Wi-Fi. Pause heavy sync tools (Dropbox, Google Drive) and upload during a quieter time.</p>
<h2>Status stuck on "uploading"</h2>
<p>Contact <a href="mailto:support@kaynos.net">support@kaynos.net</a> with the session or class name so we can reset the status if the browser closed mid-upload.</p>
<h2>Still failing</h2>
<p>Email <a href="mailto:support@kaynos.net">support@kaynos.net</a> with: account name, browser, file type and size, and a screenshot if you have one.</p>`},

    "playback-issues": {
      title: "Video playback problems", section: "Troubleshooting",
      content: `
<h1>Video playback problems</h1>
<p>If the player is blank or showing errors, work through these checks.</p>
<div class="hint hint-info"><div class="hint-icon">${IC.info}</div><div>General playback: <a onclick="navigate('playback')">Watching and reviewing</a>. Codecs: <a onclick="navigate('formats')">Supported formats and limits</a>.</div></div>
<h2>Player blank or broken controls</h2>
<p><strong>Black screen / no controls:</strong> refresh, then hard refresh or clear cache, then try <a href="https://www.google.com/chrome/" target="_blank" rel="noopener">Chrome</a>. Confirm the upload finished (not stuck on "uploading" or showing "failed").</p>
<p><strong>"Cannot be played":</strong> often a codec or browser issue. MKV can fail in Safari — try <a href="https://www.google.com/chrome/" target="_blank" rel="noopener">Chrome</a> or <a href="https://www.mozilla.org/firefox/" target="_blank" rel="noopener">Firefox</a>, or re-export to MP4 with H.264 video and AAC audio.</p>
<h2>Buffering or long spinners</h2>
<ul>
<li>Check your bandwidth (upload and download can differ dramatically by network).</li>
<li>Close other streaming tabs or heavy downloads.</li>
<li>Very high-bitrate 4K sources may stutter — a 1080p export often plays more reliably.</li>
</ul>
<h2>Sound but no picture (or the reverse)</h2>
<p>Usually a codec mismatch. Try another browser; if it persists, re-export with standard H.264/AAC.</p>
<h2>Resume position wrong</h2>
<p>Progress saves shortly after pausing. Closing the tab immediately can occasionally skip the save.</p>`},

    "login-issues": {
      title: "Login and access issues", section: "Troubleshooting",
      content: `
<h1>Login and access issues</h1>
<p>Most issues stem from the wrong email, typos, or Caps Lock. Repeated failures can trigger a short lockout. Sign in at <a href="https://app.kaynos.net" target="_blank" rel="noopener">app.kaynos.net</a>.</p>
<h2>Password problems</h2>
<ul>
<li>Use the same email the invite was sent to.</li>
<li>Check Caps Lock; paste the password once to avoid hidden typos.</li>
<li>Ask an admin for a reset or email <a href="mailto:support@kaynos.net">support@kaynos.net</a>.</li>
</ul>
<h2>"Too many attempts"</h2>
<p>Too many failed logins from one IP are rate-limited. Wait 15–30 minutes, or contact <a href="mailto:support@kaynos.net">support@kaynos.net</a> if you need access sooner.</p>
<h2>Blank page or "no access"</h2>
<p>The account may have been removed, or the browser cached an old session. Try a private/incognito window. If that works, clear site data for <a href="https://app.kaynos.net" target="_blank" rel="noopener">app.kaynos.net</a> in normal mode.</p>
<h2>Still locked out</h2>
<p>Email <a href="mailto:support@kaynos.net">support@kaynos.net</a> with your name, account name, and email address.</p>
<div class="hint hint-tip"><div class="hint-icon">${IC.tip}</div><div>Profile and password changes: <a onclick="navigate('profile')">Profile and password</a>.</div></div>`},

      title: "Email and notification issues", section: "Troubleshooting",
      content: `

    faq: {
      title: "Frequently asked questions", section: "FAQ",
      content: `
<h1>Frequently asked questions</h1>
<p>Kaynos is built for coaches who use video review: publish sessions and classes, add timestamped notes, and members watch on their own time.</p>
<div class="hint hint-info"><div class="hint-icon">${IC.info}</div><div><strong>Quick links:</strong> App: <a href="https://app.kaynos.net" target="_blank" rel="noopener">app.kaynos.net</a> · Support: <a href="mailto:support@kaynos.net">support@kaynos.net</a> · Setup: <a onclick="navigate('setup')">Setting up your account</a></div></div>
<h2>What you're signing up for</h2>
<h3>What is Kaynos, in plain language?</h3>
<p>It replaces ad-hoc clip sharing in chat. You put session footage on a <strong>session</strong> (one client) or a <strong>class</strong> (everyone in your account), add notes on the timeline, and clients review when they can. Everything runs in the browser at <a href="https://app.kaynos.net" target="_blank" rel="noopener">app.kaynos.net</a> — no separate app install.</p>
<h3>Do my clients need to install something?</h3>
<p>No. They open <a href="https://app.kaynos.net" target="_blank" rel="noopener">app.kaynos.net</a> in a normal phone or laptop browser. If YouTube works on your network, Kaynos should too.</p>
<h3>What types of coaching does this work for?</h3>
<p>Kaynos works for any coaching practice where reviewing video helps clients improve: personal training, sports coaching, music lessons, dance instruction, or any skill-based teaching.</p>
<hr>
<h2>Running your account</h2>
<h3>Do you cap how many clients or coaches I can add?</h3>
<p>No. The product does not enforce a member or coach limit.</p>
<h3>Can clients watch each other's private lessons?</h3>
<p><strong>No.</strong> A <strong>session</strong> is visible only to that client, the staff who created or need it, and admins. <strong>Classes</strong> are shared with everyone in your account.</p>
<h3>Can people download my class video?</h3>
<p>There is no download button for end users. Playback uses expiring streaming links, keeping your curriculum harder to copy as a casual file share.</p>
<hr>
<h2>Trust, minors on camera, and policy</h2>
<h3>How serious are you about security?</h3>
<p>HTTPS in transit, hashed passwords, and video in cloud storage behind a CDN. See <a onclick="navigate('storage')">Video storage and retention</a> for details.</p>
<h3>What about minors on the footage?</h3>
<p>You are responsible for waivers, parental consent, and local law — the same as for any training footage. Read the <a href="https://app.kaynos.net/terms" target="_blank" rel="noopener">Terms of Service</a> in the app. For legal questions, consult qualified counsel.</p>
<hr>
<h2>Devices and integrations</h2>
<h3>Which browsers are supported?</h3>
<p>Current Chrome, Firefox, Safari, and Edge. If upload or playback fails in one browser, trying Chrome is a reasonable first step.</p>
<h3>Do you expose an API?</h3>
<p>Yes. Admins can create API tokens for scripts and integrations. Read <a onclick="navigate('developer-api')">Developer API</a> and avoid committing secrets to source control.</p>
<hr>
<h2>Support</h2>
<h3>How do I contact you?</h3>
<p>Email <a href="mailto:support@kaynos.net">support@kaynos.net</a> with what happened, what you expected, your account name, and your browser. A screenshot or short screen recording speeds up diagnosis. In-app chat is available when logged in to <a href="https://app.kaynos.net" target="_blank" rel="noopener">app.kaynos.net</a>.</p>`},

    "developer-api": {
      title: "Developer API", section: "Developers",
      content: `
<h1>Developer API</h1>
<p>For accounts that want automation beyond the web UI: schedules, exports, or custom reporting. The API is HTTPS-only and scoped to your account's data. Create and manage tokens under <strong>Admin → Developer API</strong> in <a href="https://app.kaynos.net" target="_blank" rel="noopener">app.kaynos.net</a> (admin role required).</p>
<div class="hint hint-info"><div class="hint-icon">${IC.info}</div><div><strong>Swagger first.</strong> Sign in as an admin, then open the in-app docs. The same browser session lets <em>Try it out</em> use your cookies — <a href="https://app.kaynos.net/admin/api-docs" target="_blank" rel="noopener">Swagger UI (production)</a>.</div></div>
<div class="hint hint-danger"><div class="hint-icon">${IC.danger}</div><div><strong>Protect your secrets.</strong> API tokens are as sensitive as passwords. Store them in a secret manager or env vars — never commit them to git or expose them in frontend code.</div></div>
<p>OpenAPI YAML: <a href="https://app.kaynos.net/openapi.yaml" target="_blank" rel="noopener">app.kaynos.net/openapi.yaml</a> · Mirror: <a href="https://raw.githubusercontent.com/jlambert229/kaynos/main/public/openapi.yaml" target="_blank" rel="noopener">GitHub raw</a></p>
<div class="hint hint-warning"><div class="hint-icon">${IC.warn}</div><div>If the app URL returns HTML instead of YAML, use the GitHub raw link.</div></div>
<h2>Two authentication doors</h2>
<ul>
<li><strong><code>/api/v1/…</code></strong> — for scripts and integrations: Bearer token minted under <strong>Admin → Developer API</strong>.</li>
<li><strong><code>/api/integrations/…</code></strong> — while logged in to the browser: create/list/revoke tokens via session cookie (Swagger "Try it out").</li>
<li>In-app route <strong><code>/admin/api-docs</code></strong> is Swagger UI; admin role required.</li>
</ul>
<h2>Base URLs</h2>
<table><thead><tr><th>Environment</th><th>Host</th><th>API prefix</th></tr></thead><tbody>
<tr><td>Production</td><td><a href="https://app.kaynos.net" target="_blank" rel="noopener"><code>https://app.kaynos.net</code></a></td><td><code>/api/v1</code></td></tr>
<tr><td>Local Netlify dev</td><td><code>http://localhost:8888</code></td><td><code>/api/v1</code></td></tr>
</tbody></table>
<p>Quick discovery: <code>GET /api/v1</code> lists routes, no token needed.</p>
<h2>Bearer header</h2>
<pre>Authorization: Bearer kn_&lt;your-secret&gt;</pre>
<p>We show the secret exactly once when you mint it. Treat it like a Stripe key — password manager or env var, never committed.</p>
<h2>Scopes</h2>
<table><thead><tr><th>Scope</th><th>Does</th></tr></thead><tbody>
<tr><td><code>read</code></td><td>GET requests for sessions, classes, members, etc.</td></tr>
<tr><td><code>write</code></td><td>Creates, updates, deletes — plus all reads.</td></tr>
</tbody></table>
<p>The token inherits the permissions of the admin who created it. If they can't do it in the UI, the API returns <code>403</code>. No backdoors.</p>
<h2>What v1 covers</h2>
<ul>
<li>Sessions and classes (lifecycle + progress reads)</li>
<li>Members / roster where the product allows automation</li>
<li>Notes pinned to sessions and classes</li>
</ul>
<h2>Managing tokens while logged in</h2>
<ol>
<li><code>GET /api/integrations/tokens</code> — inspect token metadata</li>
<li><code>POST /api/integrations/tokens</code> — create a token (plaintext secret returned once)</li>
<li><code>DELETE /api/integrations/tokens/{id}</code> — revoke a compromised key</li>
</ol>
<h3>Example create body</h3>
<pre>{"name":"nightly-export","scopes":["read"]}</pre>
<p>Add <code>"write"</code> to scopes only when you actually need it.</p>
<h2>Error responses</h2>
<table><thead><tr><th>Code</th><th>Meaning</th></tr></thead><tbody>
<tr><td><code>401</code></td><td>Missing or invalid token</td></tr>
<tr><td><code>403</code></td><td>Wrong scope or role</td></tr>
<tr><td><code>404</code></td><td>Resource not in your account</td></tr>
<tr><td><code>400</code></td><td>Bad request payload</td></tr>
</tbody></table>
<h2>Operational practices</h2>
<ul>
<li>Rotate API keys when technical staff leave.</li>
<li>Prefer read-only scopes until write access is clearly required.</li>
<li>Never embed secrets in client-side code — keep tokens server-side.</li>
</ul>
<h2>Quick links</h2>
<ul>
<li><a href="https://app.kaynos.net/admin/api-docs" target="_blank" rel="noopener">Swagger UI</a></li>
<li><a href="https://app.kaynos.net/openapi.yaml" target="_blank" rel="noopener">OpenAPI YAML (app host)</a></li>
<li><a href="https://raw.githubusercontent.com/jlambert229/kaynos/main/public/openapi.yaml" target="_blank" rel="noopener">OpenAPI YAML (GitHub raw)</a></li>
</ul>`},

    glossary: {
      title: "Glossary", section: "Getting Started",
      content: `
<h1>Glossary</h1>
<p>Key terms used throughout Kaynos and this help center.</p>
<dl>
<div class="glossary-term"><dt>Session</dt><dd>A one-on-one recording assigned to a single client — private lessons, individual review, or competition footage. Only the assigned client, the creator, and admins can see it.</dd></div>
<div class="glossary-term"><dt>Class</dt><dd>An account-wide recording visible to everyone — group sessions, workshops, or shared recordings. All members, coaches, and admins can view classes.</dd></div>
<div class="glossary-term"><dt>Admin</dt><dd>The highest-permission role. Admins can do everything coaches can, plus manage the roster, send invites, change roles, and access the Admin area.</dd></div>
<div class="glossary-term"><dt>Coach</dt><dd>A staff role that can create sessions and classes, upload video, add notes and tags, and view client progress. Coaches can invite clients but not other coaches.</dd></div>
<div class="glossary-term"><dt>Client <code>member</code></dt><dd>An end user who watches assigned sessions and all published classes, adds notes, and tracks their own progress. Clients cannot upload video or view other clients' private sessions.</dd></div>
<div class="glossary-term"><dt>Note</dt><dd>A short text annotation pinned to a specific timestamp on the video timeline. Coaches and clients can both create notes; coaches can edit any note.</dd></div>
<div class="glossary-term"><dt>Tag</dt><dd>A label attached to sessions or classes for organization and filtering. Tags are shared across the account — examples: <code>form-review</code>, <code>competition</code>, <code>fundamentals</code>.</dd></div>
<div class="glossary-term"><dt>Progress</dt><dd>A lightweight tracker that records playback position (for resume), completion status, and last-viewed time. Coaches see completion across their clients; no invasive analytics.</dd></div>
<div class="glossary-term"><dt>API Token <code>kn_...</code></dt><dd>A secret key minted under Admin → Developer API. Used to authenticate scripts and integrations against the <code>/api/v1</code> endpoints. Treat like a password.</dd></div>
<div class="glossary-term"><dt>Vimeo Source</dt><dd>An alternative to uploading a file — paste a Vimeo URL or video ID to embed video already hosted on Vimeo into a session or class.</dd></div>
<div class="glossary-term"><dt>CDN</dt><dd>Content Delivery Network — Kaynos uses Cloudflare to deliver video quickly from edge servers close to the viewer, reducing buffering.</dd></div>
</dl>
<div class="hint hint-tip"><div class="hint-icon">${IC.tip}</div><div>For role details see <a onclick="navigate('roles')">Understanding user roles</a>. For API tokens see <a onclick="navigate('developer-api')">Developer API</a>.</div></div>`},

<div class="compare-grid">
  <div class="compare-card">
    <div class="compare-label private">Private</div>
    <h3>Session</h3>
    <p>One-on-one content for a single client.</p>
    <ul>
      <li>Assigned to one specific client</li>
      <li>Only that client, the creator, and admins can see it</li>
      <li>Private lessons, individual feedback, competition footage</li>
      <li>Notes stay between coach and client</li>
    </ul>
  </div>
  <div class="compare-card">
    <div class="compare-label shared">Shared</div>
    <h3>Class</h3>
    <p>Account-wide content for everyone.</p>
    <ul>
      <li>Visible to all members, coaches, and admins</li>
      <li>Group sessions, workshops, technique breakdowns</li>
      <li>Great for shared curriculum and team training</li>
      <li>Everyone can leave notes</li>
    </ul>
  </div>
</div>
<h2>Quick decision</h2>
<ul>
<li><strong>Is this for one person?</strong> → Create a <strong>session</strong></li>
<li><strong>Should everyone see it?</strong> → Create a <strong>class</strong></li>

      title: "Feature requests", section: "",
      content: `

<p>Vote on the features you want most. Votes are saved on this device only and are not sent to Kaynos.</p>
<div class="poll-total" id="pollTotal"></div>

  };

  const NAV = [
    { section: "", pages: ["welcome", "whats-new", "release-notes", "feature-requests"] },
    { section: "Getting Started", pages: ["setup", "inviting-members", "first-upload", "roles", "glossary", "quick-tips", "onboarding-timeline"] },
    { section: "Video", pages: ["uploading", "playback", "player-shortcuts", "formats", "upload-checklist", "speed-calculator", "storage"] },
    { section: "Sessions & Classes", pages: ["session-vs-class", "creating-sessions", "creating-classes", "notes", "tags", "progress"] },
    { section: "Account Management", pages: ["managing-members", "profile", "notifications"] },
    { section: "Developers", pages: ["developer-api"] },
    { section: "Troubleshooting", pages: ["troubleshoot", "error-lookup", "browser-check", "upload-issues", "playback-issues", "login-issues", "email-issues", "performance", "mobile"] },
    { section: "FAQ", pages: ["faq", "contact"] }
  ];

  const allPageKeys = NAV.flatMap(g => g.pages);

  /* ── SAFE STORAGE ────────────────────────────────────── */
  function safeGet(key, fallback) {
    try { return JSON.parse(localStorage.getItem(key)) || fallback; }
    catch { return fallback; }
  }
  function safeSet(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); }
    catch { /* private browsing or quota exceeded */ }
  }

  /* ── SIDEBAR ─────────────────────────────────────────── */
  function getReadPages() { return safeGet('read-pages', []); }
  function getBookmarks() { return safeGet('bookmarks', []); }
  function getRecent() { return safeGet('recent-pages', []); }

  function buildSidebar() {
    const sb = document.getElementById('sidebar');
    const collapsed = JSON.parse(localStorage.getItem('sb-collapsed') || '{}');
    const readPages = getReadPages();
    const bookmarks = getBookmarks();
    const recent = getRecent();
    let html = '';

    // Dynamic sections: Bookmarks + Recent
    if (bookmarks.length || recent.length) {
      html += '<div class="sidebar-dynamic">';
      if (bookmarks.length) {
        html += '<div class="sidebar-section"><div class="sidebar-section-title">' + IC.bookmark + ' Bookmarks</div><div class="sidebar-links">';
        bookmarks.forEach(p => {
          if (PAGES[p]) html += `<a class="sidebar-link" href="#${p}" tabindex="0" data-page="${p}" onclick="navigate('${p}');return false" onkeydown="if(event.key==='Enter'){navigate('${p}');return false}"><span class="sl-text">${PAGES[p].title}</span></a>`;
        });
        html += '</div></div>';
      }
      if (recent.length) {
        html += '<div class="sidebar-section"><div class="sidebar-section-title">' + IC.clock + ' Recent</div><div class="sidebar-links">';
        recent.slice(0, 5).forEach(p => {
          if (PAGES[p]) html += `<a class="sidebar-link" href="#${p}" tabindex="0" data-page="${p}" onclick="navigate('${p}');return false" onkeydown="if(event.key==='Enter'){navigate('${p}');return false}"><span class="sl-text">${PAGES[p].title}</span></a>`;
        });
        html += '</div></div>';
      }
      html += '</div>';
    }

    NAV.forEach((g, i) => {
      const isCollapsed = g.section && collapsed[g.section];
      html += `<div class="sidebar-section${isCollapsed ? ' collapsed' : ''}" data-section="${g.section || ''}">`;
      const sectionIcons = { 'Getting Started': IC.rocket, 'Video': IC.video, 'Sessions & Classes': IC.play, 'Account Management': IC.users, 'Developers': IC.wrench, 'Troubleshooting': IC.alert, 'FAQ': IC.chat };
      if (g.section) html += `<div class="sidebar-section-title" onclick="toggleSection(this)">${sectionIcons[g.section] || ''}${g.section}<span class="chevron" style="margin-left:auto">▼</span></div>`;
      html += '<div class="sidebar-links">';
      g.pages.forEach(p => {
        const isRead = readPages.includes(p);
        const badge = (p === 'whats-new' && hasNewUpdates()) ? '<span class="new-badge" title="New updates"></span>' : '';
        html += `<a class="sidebar-link" href="#${p}" tabindex="0" data-page="${p}" onclick="navigate('${p}');return false" onkeydown="if(event.key==='Enter'){navigate('${p}');return false}"><span class="sl-text">${PAGES[p].title}${badge}</span>${isRead ? '<span class="read-dot" title="Read"></span>' : ''}</a>`;
      });
      html += '</div></div>';
    });

    // Progress bar
    const total = allPageKeys.filter(k => k !== 'welcome').length;
    const read = readPages.filter(k => k !== 'welcome' && allPageKeys.includes(k)).length;
    const pct = total > 0 ? Math.round((read / total) * 100) : 0;
    if (read > 0) html += `<div class="sidebar-progress"><span>${read}/${total} read</span><div class="sidebar-progress-bar"><div class="sidebar-progress-fill" style="width:${pct}%"></div></div></div>`;

    sb.innerHTML = html;
  }

  function toggleSection(el) {
    const section = el.closest('.sidebar-section');
    section.classList.toggle('collapsed');
    const collapsed = JSON.parse(localStorage.getItem('sb-collapsed') || '{}');
    const name = section.dataset.section;
    if (section.classList.contains('collapsed')) collapsed[name] = true;
    else delete collapsed[name];
    localStorage.setItem('sb-collapsed', JSON.stringify(collapsed));
  }

  /* ── NAVIGATE ───────────────────────────────────────── */
  function navigate(pageId) {
    const page = getPageContent(pageId);
    if (!page) { if (pageId !== 'welcome') navigate('welcome'); return; }

    if (pageId === 'whats-new') markWhatsNewSeen();

    const pc = document.getElementById('pageContent');
    // Retrigger animation
    pc.style.animation = 'none';
    void pc.offsetHeight;
    pc.style.animation = '';
    pc.innerHTML = page.content;

    // Wrap tables
    pc.querySelectorAll('table').forEach(t => {
      if (!t.closest('.table-wrap')) {
        const w = document.createElement('div');
        w.className = 'table-wrap';
        t.parentNode.insertBefore(w, t);
        w.appendChild(t);
      }
    });

    // Wrap pre blocks with copy button
    pc.querySelectorAll('pre').forEach(pre => {
      if (!pre.closest('.code-block-wrap')) {
        const w = document.createElement('div');
        w.className = 'code-block-wrap';
        pre.parentNode.insertBefore(w, pre);
        w.appendChild(pre);
        const btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'Copy';
        btn.onclick = () => copyCode(btn, pre.textContent);
        w.appendChild(btn);
      }
    });

    // Sidebar active
    document.querySelectorAll('.sidebar-link').forEach(l => {
      const isActive = l.dataset.page === pageId;
      l.classList.toggle('active', isActive);
      if (isActive) l.setAttribute('aria-current', 'page');
      else l.removeAttribute('aria-current');
    });

    // Breadcrumb
    if (page.section) {
      const sectionGroup = NAV.find(g => g.section === page.section);
      const sectionFirst = sectionGroup ? sectionGroup.pages[0] : 'welcome';
      const bc = document.createElement('div');
      bc.className = 'breadcrumb';
      bc.innerHTML = `<a href="#welcome" onclick="navigate('welcome');return false">Help Center</a><span class="breadcrumb-sep">›</span><a href="#${sectionFirst}" onclick="navigate('${sectionFirst}');return false">${page.section}</a><span class="breadcrumb-sep">›</span><span class="breadcrumb-current">${page.title}</span>`;
      pc.prepend(bc);
    }

    // Footer nav
    renderFooterNav(pageId);

    // TOC
    renderToc(pc);

    // Anchor links on headings
    pc.querySelectorAll('h2[id], h3[id]').forEach(h => {
      const a = document.createElement('a');
      a.className = 'heading-anchor';
      a.href = '#' + pageId + ':' + h.id;
      a.textContent = '#';
      a.title = 'Copy link to section';
      a.onclick = (e) => {
        e.preventDefault();
        const url = location.origin + location.pathname + '#' + pageId + ':' + h.id;
        navigator.clipboard.writeText(url).then(() => showToast('Link copied'));
      };
      h.appendChild(a);
    });

    if (!window._isPopstate) window.scrollTo({ top: 0, behavior: 'instant' });
    if (!window._isPopstate) history.pushState({ page: pageId }, '', '#' + pageId);
    document.title = pageId === 'welcome' ? 'Kaynos — Help Center' : `${page.title} — Kaynos Docs`;
    closeSidebar();
    document.getElementById('searchInput').value = '';
    document.getElementById('searchResults').classList.remove('active');
    document.getElementById('searchInput').setAttribute('aria-expanded', 'false');

    // Scroll active link into view
    const active = document.querySelector('.sidebar-link.active');
    if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  /* ── FOOTER NAV ─────────────────────────────────────── */
  function renderFooterNav(pageId) {
    const idx = allPageKeys.indexOf(pageId);
    const fn = document.getElementById('footerNav');
    fn.innerHTML = '';
    if (idx > 0) {
      const id = allPageKeys[idx - 1];
      const a = document.createElement('a');
      a.className = 'footer-nav-btn prev';
      a.href = '#' + id;
      a.onclick = (e) => { e.preventDefault(); navigate(id); };
      a.innerHTML = `<span class="fn-label">← Previous</span><span class="fn-title">${PAGES[id].title}</span>`;
      fn.appendChild(a);
    }
    if (idx < allPageKeys.length - 1) {
      const id = allPageKeys[idx + 1];
      const a = document.createElement('a');
      a.className = 'footer-nav-btn next';
      a.href = '#' + id;
      a.onclick = (e) => { e.preventDefault(); navigate(id); };
      a.innerHTML = `<span class="fn-label">Next →</span><span class="fn-title">${PAGES[id].title}</span>`;
      fn.appendChild(a);
    }
  }

  /* ── ON-PAGE TOC ────────────────────────────────────── */
  function renderToc(container) {
    const toc = document.getElementById('toc');
    const headings = container.querySelectorAll('h2, h3');
    if (headings.length < 2) { toc.innerHTML = ''; return; }

    let html = '<div class="toc-title">On this page</div>';
    headings.forEach((h, i) => {
      const id = 'h-' + i;
      h.id = id;
      const cls = h.tagName === 'H3' ? 'toc-link toc-h3' : 'toc-link';
      const label = h.childNodes[0]?.textContent || h.textContent;
      html += `<a class="${cls}" href="#${id}" onclick="tocJump(event,'${id}')">${label.trim()}</a>`;
    });
    toc.innerHTML = html;

    if (window._tocObs) window._tocObs.disconnect();
    window._tocObs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        const link = toc.querySelector(`[href="#${e.target.id}"]`);
        if (link) link.classList.toggle('active', e.isIntersecting);
      });
    }, { rootMargin: `-${56}px 0px -65% 0px`, threshold: 0 });
    headings.forEach(h => window._tocObs.observe(h));
  }

  function tocJump(e, id) {
    e.preventDefault();
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  /* ── COPY ───────────────────────────────────────────── */
  function copyCode(btn, text) {
    navigator.clipboard.writeText(text.trim()).then(() => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      showToast('Copied to clipboard');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    }).catch(() => {
      showToast('Copy failed — try selecting manually');
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(window._toast);
    window._toast = setTimeout(() => t.classList.remove('show'), 2000);
  }

  /* ── SEARCH ─────────────────────────────────────────── */
  let srIdx = -1;

  function fuzzyMatch(text, query) {
    // Simple word-based fuzzy: all query words must appear in text
    const words = query.toLowerCase().split(/\s+/).filter(w => w.length > 1);
    const lower = text.toLowerCase();
    return words.every(w => lower.includes(w));
  }

  function handleSearch(q) {
    const sr = document.getElementById('searchResults');
    srIdx = -1;
    if (!q || q.length < 2) { sr.classList.remove('active'); sr.innerHTML = ''; document.getElementById('searchInput').setAttribute('aria-expanded', 'false'); return; }
    const lower = q.toLowerCase();
    const readPages = getReadPages();
    const bookmarks = getBookmarks();
    const results = [];
    for (const [id, page] of Object.entries(PAGES)) {
      const text = page.content.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ');
      const textLower = text.toLowerCase();
      const titleMatch = page.title.toLowerCase().includes(lower);
      const exactIdx = textLower.indexOf(lower);
      const fuzzy = !titleMatch && exactIdx === -1 && fuzzyMatch(page.title + ' ' + text, q);
      if (titleMatch || exactIdx !== -1 || fuzzy) {
        let snippet = '';
        const idx = exactIdx !== -1 ? exactIdx : textLower.indexOf(lower.split(/\s+/)[0]);
        if (idx !== -1) {
          const s = Math.max(0, idx - 45), e = Math.min(textLower.length, idx + q.length + 70);
          const raw = (s > 0 ? '…' : '') + text.slice(s, e) + (e < textLower.length ? '…' : '');
          snippet = raw.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&').split(/\s+/).join('|'), 'gi'), m => `<mark>${m}</mark>`);
        }
        const score = (titleMatch ? 10 : 0) + (exactIdx !== -1 ? 5 : 0) + (bookmarks.includes(id) ? 2 : 0) + (fuzzy ? 1 : 0);
        results.push({ id, title: page.title, section: page.section, snippet, score, isRead: readPages.includes(id), isBookmarked: bookmarks.includes(id) });
      }
    }
    results.sort((a, b) => b.score - a.score);
    sr.innerHTML = results.length === 0
      ? '<div class="search-empty">No results found</div>'
      : results.slice(0, 8).map((r, i) =>
          `<div class="search-result" role="option" id="sr-${i}" data-page="${r.id}" onclick="addSearchHistory(document.getElementById('searchInput').value.trim());navigate('${r.id}')">
            <div class="sr-title">${r.title}${r.isBookmarked ? '<span class="sr-badge sr-bookmarked" title="Bookmarked">' + IC.bookmarkFill + '</span>' : ''}${r.isRead ? '<span class="sr-badge sr-read" title="Read">' + IC.check + '</span>' : ''}</div>
            ${r.section ? `<div class="sr-section">${r.section}</div>` : ''}
            ${r.snippet ? `<div class="sr-snippet">${r.snippet}</div>` : ''}
          </div>`
        ).join('');
    sr.classList.add('active');
    document.getElementById('searchInput').setAttribute('aria-expanded', 'true');
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    const sr = document.getElementById('searchResults');
    const items = sr.querySelectorAll('.search-result');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      srIdx = Math.min(srIdx + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('focused', i === srIdx));
      if (items[srIdx]) { items[srIdx].scrollIntoView({ block: 'nearest' }); document.getElementById('searchInput').setAttribute('aria-activedescendant', 'sr-' + srIdx); }
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      srIdx = Math.max(srIdx - 1, -1);
      items.forEach((el, i) => el.classList.toggle('focused', i === srIdx));
      document.getElementById('searchInput').setAttribute('aria-activedescendant', srIdx >= 0 ? 'sr-' + srIdx : '');
    } else if (e.key === 'Enter' && srIdx >= 0 && items[srIdx]) {
      addSearchHistory(document.getElementById('searchInput').value.trim());
      navigate(items[srIdx].dataset.page);
    } else if (e.key === 'Escape') {
      sr.classList.remove('active');
      srIdx = -1;
      document.getElementById('searchInput').setAttribute('aria-expanded', 'false');
      document.getElementById('searchInput').blur();
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.header-search')) {
      document.getElementById('searchResults').classList.remove('active');
      document.getElementById('searchInput').setAttribute('aria-expanded', 'false');
      srIdx = -1;
    }
  });

  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      openPalette();
    }
  });

  /* ── SIDEBAR TOGGLE ─────────────────────────────────── */
  function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const ov = document.getElementById('overlay');
    const isOpen = sb.classList.toggle('open');
    ov.classList.toggle('active', isOpen);
    if (isOpen) {
      sb.setAttribute('aria-modal', 'true');
      sb.setAttribute('role', 'dialog');
      const first = sb.querySelector('.sidebar-link');
      if (first) first.focus();
      sb.addEventListener('keydown', trapFocus);
    } else {
      sb.removeAttribute('aria-modal');
      sb.removeAttribute('role');
      sb.removeEventListener('keydown', trapFocus);
      document.querySelector('.menu-btn').focus();
    }
  }
  function closeSidebar() {
    const sb = document.getElementById('sidebar');
    sb.classList.remove('open');
    document.getElementById('overlay').classList.remove('active');
    sb.removeAttribute('aria-modal');
    sb.removeAttribute('role');
    sb.removeEventListener('keydown', trapFocus);
  }
  function trapFocus(e) {
    if (e.key === 'Escape') { closeSidebar(); document.querySelector('.menu-btn').focus(); return; }
    if (e.key !== 'Tab') return;
    const sb = document.getElementById('sidebar');
    const focusable = sb.querySelectorAll('.sidebar-link');
    if (!focusable.length) return;
    const first = focusable[0], last = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  }

  /* ── SCROLL EFFECTS ─────────────────────────────────── */
  let _scrollTick = false;
  window.addEventListener('scroll', () => {
    if (!_scrollTick) {
      requestAnimationFrame(() => {
        const d = document.documentElement;
        const pct = d.scrollHeight > d.clientHeight
          ? (d.scrollTop / (d.scrollHeight - d.clientHeight)) * 100 : 0;
        document.getElementById('progress-bar').style.width = pct + '%';
        document.getElementById('back-top').classList.toggle('visible', d.scrollTop > 400);
        _scrollTick = false;
      });
      _scrollTick = true;
    }
    // Debounced scroll position save
    clearTimeout(window._scrollSave);
    window._scrollSave = setTimeout(saveScrollPos, 300);
  }, { passive: true });

  /* ── POPSTATE ───────────────────────────────────────── */
  window.addEventListener('popstate', e => {
    const pageId = e.state?.page || 'welcome';
    window._isPopstate = true;
    navigate(pageId);
    window._isPopstate = false;
    restoreScrollPos(pageId);
  });

  /* ── KEYBOARD SHORTCUTS ─────────────────────────────── */
  function openKbd() { document.getElementById('kbdModal').classList.add('active'); }
  function closeKbd() { document.getElementById('kbdModal').classList.remove('active'); }

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
    if (document.getElementById('kbdModal').classList.contains('active')) {
      if (e.key === 'Escape') closeKbd();
      return;
    }
    if (document.getElementById('paletteOverlay').classList.contains('active')) return;
    if (document.getElementById('tourOverlay').classList.contains('active')) return;
    if (e.key === '?') { e.preventDefault(); openKbd(); return; }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
      const cur = location.hash.slice(1) || 'welcome';
      const idx = allPageKeys.indexOf(cur);
      if (idx === -1) return;
      if (e.key === 'ArrowLeft' && idx > 0) navigate(allPageKeys[idx - 1]);
      if (e.key === 'ArrowRight' && idx < allPageKeys.length - 1) navigate(allPageKeys[idx + 1]);
    }
    if (e.key === 't' || e.key === 'T') window.scrollTo({ top: 0, behavior: 'smooth' });
    if (e.key === 'h' || e.key === 'H') navigate('welcome');
    if (e.key === 'b' || e.key === 'B') {
      const cur = location.hash.slice(1).split(':')[0] || 'welcome';
      if (cur !== 'welcome') { toggleBookmark(cur); showToast(getBookmarks().includes(cur) ? 'Page bookmarked' : 'Bookmark removed'); }
    }
  });

  /* ── FEEDBACK WIDGET (removed — was non-functional, see KAY-198) ── */
  function renderFeedback() {}
  function sendFeedback() {}

  /* ── READING PROGRESS & BOOKMARKS ────────────────────── */
  function markAsRead(pageId) {
    if (pageId === 'welcome') return;
    const read = getReadPages();
    if (!read.includes(pageId)) {
      read.push(pageId);
      localStorage.setItem('read-pages', JSON.stringify(read));
    }
  }

  function addToRecent(pageId) {
    if (pageId === 'welcome') return;
    let recent = getRecent();
    recent = recent.filter(p => p !== pageId);
    recent.unshift(pageId);
    if (recent.length > 5) recent = recent.slice(0, 5);
    localStorage.setItem('recent-pages', JSON.stringify(recent));
  }

  function toggleBookmark(pageId) {
    let bm = getBookmarks();
    if (bm.includes(pageId)) bm = bm.filter(p => p !== pageId);
    else bm.push(pageId);
    localStorage.setItem('bookmarks', JSON.stringify(bm));
    buildSidebar();
    updateBookmarkBtn(pageId);
    // Re-set active state
    document.querySelectorAll('.sidebar-link').forEach(l => {
      l.classList.toggle('active', l.dataset.page === pageId);
    });
  }

  function renderBookmarkBtn(container, pageId) {
    if (pageId === 'welcome') return;
    let bar = container.querySelector('.article-actions');
    if (!bar) {
      bar = document.createElement('div');
      bar.className = 'article-actions';
      const meta = container.querySelector('.article-meta');
      if (meta) meta.insertAdjacentElement('afterend', bar);
      else {
        const h1 = container.querySelector('h1');
        if (h1) h1.insertAdjacentElement('afterend', bar);
      }
    }
    const isBookmarked = getBookmarks().includes(pageId);
    const btn = document.createElement('button');
    btn.className = 'bookmark-btn' + (isBookmarked ? ' bookmarked' : '');
    btn.id = 'bookmarkBtn';
    btn.onclick = () => toggleBookmark(pageId);
    btn.innerHTML = (isBookmarked ? IC.bookmarkFill : IC.bookmark) + (isBookmarked ? ' Saved' : ' Save');
    bar.appendChild(btn);
  }

  function updateBookmarkBtn(pageId) {
    const btn = document.getElementById('bookmarkBtn');
    if (!btn) return;
    const isBookmarked = getBookmarks().includes(pageId);
    btn.className = 'bookmark-btn' + (isBookmarked ? ' bookmarked' : '');
    btn.innerHTML = (isBookmarked ? IC.bookmarkFill : IC.bookmark) + (isBookmarked ? ' Saved' : ' Save');
  }

  /* ── FAQ ACCORDION ──────────────────────────────────── */
  function renderFaqAccordion(container, pageId) {
    if (pageId !== 'faq') return;
    const h3s = container.querySelectorAll('h3');
    h3s.forEach((h3, i) => {
      const item = document.createElement('div');
      item.className = 'faq-item';
      const question = document.createElement('button');
      question.className = 'faq-question';
      question.type = 'button';
      question.setAttribute('aria-expanded', 'false');
      question.setAttribute('aria-controls', `faq-answer-${i}`);
      question.innerHTML = `<span>${h3.textContent}</span><span class="faq-chevron" aria-hidden="true">▼</span>`;
      question.onclick = () => {
        const isOpen = item.classList.toggle('open');
        question.setAttribute('aria-expanded', isOpen);
      };
      const answer = document.createElement('div');
      answer.className = 'faq-answer';
      answer.id = `faq-answer-${i}`;
      answer.setAttribute('role', 'region');
      answer.setAttribute('aria-labelledby', `faq-q-${i}`);
      question.id = `faq-q-${i}`;
      // Collect siblings until next h3, h2, or hr
      let sib = h3.nextElementSibling;
      const siblings = [];
      while (sib && sib.tagName !== 'H3' && sib.tagName !== 'H2' && sib.tagName !== 'HR') {
        siblings.push(sib);
        sib = sib.nextElementSibling;
      }
      siblings.forEach(s => answer.appendChild(s));
      item.appendChild(question);
      item.appendChild(answer);
      h3.replaceWith(item);
    });
  }

  /* ── READING TIME ───────────────────────────────────── */
  function renderArticleMeta(container, pageId) {
    if (pageId === 'welcome') return;
    // Use raw page content to avoid counting UI chrome (buttons, tooltips)
    const raw = (PAGES[pageId]?.content || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
    const words = raw ? raw.split(/\s+/).length : 0;
    const mins = Math.max(1, Math.round(words / 200));
    const h1 = container.querySelector('h1');
    if (!h1) return;
    const meta = document.createElement('div');
    meta.className = 'article-meta';
    meta.innerHTML = `<span>${mins} min read</span><span class="article-meta-dot"></span><span>${words} words</span>`;
    h1.insertAdjacentElement('afterend', meta);
  }

  /* ── RELATED ARTICLES ──────────────────────────────── */
  function renderRelated(container, pageId) {
    const page = PAGES[pageId];
    if (!page || !page.section || pageId === 'welcome') return;
    const sameSection = allPageKeys.filter(k => PAGES[k].section === page.section && k !== pageId);
    if (!sameSection.length) return;
    // Fisher-Yates shuffle for unbiased selection
    const shuffled = [...sameSection];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    const picks = shuffled.slice(0, 3);
    const div = document.createElement('div');
    div.className = 'related-articles';
    div.innerHTML = '<div class="related-title">Related articles</div><div class="related-grid">' +
      picks.map(k => `<a class="related-card" href="#${k}" onclick="navigate('${k}');return false"><span class="related-card-title">${PAGES[k].title}</span><span class="related-card-section">${PAGES[k].section}</span></a>`).join('') +
      '</div>';
    container.appendChild(div);
  }

  /* ── ENHANCED NAVIGATE (patch to add extras) ───────── */
  const _origNavigate = navigate;
  navigate = function(pageId) {
    try { _origNavigate(pageId); } catch(e) { console.error('Navigate error:', e); return; }
    const pc = document.getElementById('pageContent');
    if (!pc || !pc.innerHTML) return;
    renderArticleMeta(pc, pageId);
    renderLastUpdated(pc, pageId);
    renderBookmarkBtn(pc, pageId);
    renderShareBtn(pc, pageId);
    renderPrintBtn(pc, pageId);
    renderCopyArticleBtn(pc, pageId);
    if (pageId === 'welcome') renderWelcomeBack(pc);
    if (pageId === 'welcome') renderChecklist(pc);
    if (pageId === 'troubleshoot') renderWizard('start');
    if (pageId === 'upload-checklist') renderPreflight();
    if (pageId === 'browser-check') checkBrowser();
    if (pageId === 'release-notes') renderReleases();
    if (pageId === 'feature-requests') renderPoll();
    renderFaqAccordion(pc, pageId);
    addGlossaryTooltips(pc);
    renderRelated(pc, pageId);
    renderFeedback(pc);
    applyHighlights(pc, pageId);
    markAsRead(pageId);

  function trapTourFocus(e) {

    if (!focusable.length) return;
    const first = focusable[0], last = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }

  function lookupError(q) {
    const container = document.getElementById('errorResults');
    if (!container) return;
    if (!q || q.length < 2) { container.innerHTML = ''; return; }
    const lower = q.toLowerCase();
    const matches = ERROR_DB.filter(e => e.patterns.some(p => lower.includes(p)));
    if (matches.length === 0 && q.length > 3) {
      // Fuzzy fallback — match any word
      const words = lower.split(/\s+/).filter(w => w.length > 2);
      ERROR_DB.forEach(e => {
        if (words.some(w => e.patterns.some(p => p.includes(w)) || e.title.toLowerCase().includes(w))) {
          if (!matches.includes(e)) matches.push(e);
        }
      });
    }
    container.innerHTML = matches.slice(0, 4).map(m =>
      `<div class="error-match" onclick="navigate('${m.page}')">
        <div class="error-match-title">${m.title}</div>
        <div class="error-match-hint">${m.hint} → ${PAGES[m.page].title}</div>

  /* ── GLOSSARY TOOLTIPS ─────────────────────────────── */
  const GLOSSARY_TERMS = {
    'session': 'A one-on-one recording assigned to a single client — only they, the creator, and admins can see it.',
    'class': 'An account-wide recording visible to all members, coaches, and admins.',
    'admin': 'The highest-permission role — manages roster, invites, roles, and settings.',
    'coach': 'Staff role that creates sessions/classes, uploads video, and adds notes.',
    'client': 'End user who watches sessions and classes, adds notes, and tracks progress.',
    'note': 'A text annotation pinned to a specific timestamp on the video timeline.',
    'tag': 'A label for organizing sessions and classes (e.g. form-review, competition).',
    'api token': 'A secret key (kn_...) for authenticating scripts against the API.',
  };

  function addGlossaryTooltips(container) {
    const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
    const replacements = [];
    while (walker.nextNode()) {
      const node = walker.currentNode;
      if (node.parentElement.closest('.glossary-term, .hint, h1, h2, h3, a, code, pre, .term-tooltip')) continue;
      for (const [term, def] of Object.entries(GLOSSARY_TERMS)) {
        const re = new RegExp(`\\b(${term})\\b`, 'i');
        const match = node.textContent.match(re);
        if (match) {
          replacements.push({ node, term: match[1], def, index: match.index });
          break; // One tooltip per text node
        }
      }
    }
    // Process in reverse to avoid node index shifting
    replacements.reverse().forEach(({ node, term, def, index }) => {
      const before = node.textContent.slice(0, index);
      const after = node.textContent.slice(index + term.length);
      const span = document.createElement('span');
      span.className = 'term-tooltip';
      span.tabIndex = 0;
      span.textContent = term;
      const popup = document.createElement('span');
      popup.className = 'term-tooltip-popup';
      popup.textContent = def;
      span.appendChild(popup);
      const parent = node.parentNode;
      if (before) parent.insertBefore(document.createTextNode(before), node);
      parent.insertBefore(span, node);
      if (after) parent.insertBefore(document.createTextNode(after), node);
      parent.removeChild(node);
    });
  }

    let md = '';
    pc.querySelectorAll('h1, h2, h3, p, li, pre').forEach(el => {

      if (!text) return;
      if (el.tagName === 'H1') md += '# ' + text + '\n\n';
      else if (el.tagName === 'H2') md += '## ' + text + '\n\n';
      else if (el.tagName === 'H3') md += '### ' + text + '\n\n';
      else if (el.tagName === 'LI') md += '- ' + text + '\n';
      else if (el.tagName === 'PRE') md += '```\n' + text + '\n```\n\n';
      else md += text + '\n\n';
    });
    md += '\n---\nFrom Kaynos Help Center: ' + location.origin + location.pathname + '#' + pageId;
    navigator.clipboard.writeText(md.trim()).then(() => showToast('Article copied as markdown'));

  /* ── TEXT HIGHLIGHT ────────────────────────────────── */
  function getHighlights() { return JSON.parse(localStorage.getItem('highlights') || '{}'); }

  document.addEventListener('mouseup', () => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || sel.toString().trim().length < 5) return;
    const pc = document.getElementById('pageContent');
    if (!sel.anchorNode || !pc.contains(sel.anchorNode)) return;
    // Don't highlight inside interactive elements
    if (sel.anchorNode.parentElement.closest('.hint, .quick-link, a, button, .wizard-option, .checklist-item')) return;
    const text = sel.toString().trim();
    const pageId = (location.hash.slice(1).split(':')[0]) || 'welcome';
    if (pageId === 'welcome') return;
    const highlights = getHighlights();
    if (!highlights[pageId]) highlights[pageId] = [];
    if (highlights[pageId].some(h => h.text === text)) return;
    highlights[pageId].push({ text, ts: Date.now() });
    localStorage.setItem('highlights', JSON.stringify(highlights));
    showToast('Text highlighted — saved for this page');
    sel.removeAllRanges();
    applyHighlights(pc, pageId);
  });

  function applyHighlights(container, pageId) {
    const highlights = getHighlights();
    if (!highlights[pageId] || !highlights[pageId].length) return;
    highlights[pageId].forEach(h => {
      const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
      while (walker.nextNode()) {
        const node = walker.currentNode;
        if (node.parentElement.closest('.user-highlight, .hint, h1, a, button, code, pre')) continue;
        const idx = node.textContent.indexOf(h.text);
        if (idx === -1) continue;
        const before = node.textContent.slice(0, idx);
        const after = node.textContent.slice(idx + h.text.length);
        const span = document.createElement('span');
        span.className = 'user-highlight';
        span.textContent = h.text;
        const tooltip = document.createElement('span');
        tooltip.className = 'highlight-tooltip';
        tooltip.innerHTML = IC.x + ' Remove';
        tooltip.onclick = (e) => {
          e.stopPropagation();
          const hl = getHighlights();
          hl[pageId] = hl[pageId].filter(x => x.text !== h.text);
          localStorage.setItem('highlights', JSON.stringify(hl));
          showToast('Highlight removed');
          navigate(pageId);
        };
        span.appendChild(tooltip);
        const parent = node.parentNode;
        if (before) parent.insertBefore(document.createTextNode(before), node);
        parent.insertBefore(span, node);
        if (after) parent.insertBefore(document.createTextNode(after), node);
        parent.removeChild(node);
        break;
      }
    });
  }

  function filterPalette(q) {
    const lower = (q || '').toLowerCase();
    const results = [];
    // Actions
    PALETTE_ACTIONS.forEach(a => {
      if (!lower || a.title.toLowerCase().includes(lower)) results.push(a);
    });
    // Pages
    for (const [id, page] of Object.entries(PAGES)) {
      if (id === 'welcome') continue;
      if (!lower || page.title.toLowerCase().includes(lower) || (page.section || '').toLowerCase().includes(lower)) {
        results.push({ title: page.title, icon: IC.book, action: () => navigate(id), type: page.section || 'Page' });
      }
    }
    const container = document.getElementById('paletteResults');
    if (results.length === 0) {
      container.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-tertiary);font-size:.875rem">No results</div>';
      return;
    }
    const shown = lower ? results.slice(0, 10) : results.slice(0, 8);
    container.innerHTML = shown.map((r, i) =>
      `<div class="palette-item${i === paletteIdx ? ' focused' : ''}" onclick="paletteSelect(${i})" data-idx="${i}">${r.icon}<span class="palette-item-title">${r.title}</span><span class="palette-item-type">${r.type}</span></div>`
    ).join('');
    window._paletteItems = shown;
    paletteIdx = -1;
  }
  function paletteSelect(idx) {
    const items = window._paletteItems;
    if (items && items[idx]) { closePalette(); items[idx].action(); }
  }
  function handlePaletteKey(e) {
    const items = document.querySelectorAll('#paletteResults .palette-item');
    if (e.key === 'Escape') { closePalette(); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); paletteIdx = Math.min(paletteIdx + 1, items.length - 1); items.forEach((el, i) => el.classList.toggle('focused', i === paletteIdx)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); paletteIdx = Math.max(paletteIdx - 1, 0); items.forEach((el, i) => el.classList.toggle('focused', i === paletteIdx)); }
    else if (e.key === 'Enter' && paletteIdx >= 0) { paletteSelect(paletteIdx); }
  }

  function renderPoll() {
    const container = document.getElementById('pollList');
    const totalEl = document.getElementById('pollTotal');
    const sortEl = document.getElementById('pollSort');
    if (!container) return;

    const votes = getPollVotes();
    const totalVotes = Object.values(votes).reduce((a, b) => a + b, 0);

    if (totalEl) totalEl.textContent = totalVotes > 0 ? `${totalVotes} vote${totalVotes !== 1 ? 's' : ''} cast` : 'No votes yet — be the first!';

    if (sortEl) {
      sortEl.innerHTML = `<span>Sort by</span>
        <button class="poll-sort-btn${pollSort === 'votes' ? ' active' : ''}" onclick="setPollSort('votes')">Most voted</button>
        <button class="poll-sort-btn${pollSort === 'recent' ? ' active' : ''}" onclick="setPollSort('recent')">Newest</button>
        <button class="poll-sort-btn${pollSort === 'alpha' ? ' active' : ''}" onclick="setPollSort('alpha')">A–Z</button>`;
    }

    // Add user-submitted ideas
    const custom = safeGet('poll-custom', []);
    const allFeatures = [...POLL_FEATURES, ...custom.map(c => ({ id: 'custom-' + c.id, title: c.title, desc: '', tag: 'workflow' }))];

    // Sort
    const sorted = [...allFeatures];
    if (pollSort === 'votes') sorted.sort((a, b) => (votes[b.id] || 0) - (votes[a.id] || 0));
    else if (pollSort === 'alpha') sorted.sort((a, b) => a.title.localeCompare(b.title));
    // 'recent' keeps default order (newest custom at top)

    const voted = safeGet('poll-voted', []);

    container.innerHTML = sorted.map(f => {
      const count = votes[f.id] || 0;
      const hasVoted = voted.includes(f.id);
      return `<div class="poll-item">
        <button class="poll-vote-btn${hasVoted ? ' voted' : ''}" onclick="togglePollVote('${f.id}')" aria-label="Vote for ${escapeHtml(f.title)}">

          ${f.desc ? `<div class="poll-item-desc">${escapeHtml(f.desc)}</div>` : ''}

        </div>
      </div>`;
    }).join('');
  }

  function togglePollVote(featureId) {
    const votes = getPollVotes();
    const voted = safeGet('poll-voted', []);
    if (voted.includes(featureId)) {
      // Unvote
      votes[featureId] = Math.max(0, (votes[featureId] || 0) - 1);
      safeSet('poll-voted', voted.filter(v => v !== featureId));
    } else {
      // Vote
      votes[featureId] = (votes[featureId] || 0) + 1;
      voted.push(featureId);
      safeSet('poll-voted', voted);
    }
    safeSet('poll-votes', votes);
    renderPoll();
  }

      return { ...PAGES[pageId], ...ES_TRANSLATIONS[pageId] };
    }
    if (currentLang === 'es' && !ES_TRANSLATIONS[pageId] && PAGES[pageId]) {
      // Untranslated page — show English with note
      return PAGES[pageId];
    }
    return PAGES[pageId];
  }

  /* ── WIZARD ESCALATION ─────────────────────────────── */
  function addWizardEscalation(container, stepId) {
    const step = WIZARD[stepId];
    if (!step || !step.result) return;
    const div = document.createElement('div');
    div.className = 'wizard-feedback';
    div.innerHTML = `<span>Did this fix your problem?</span>
      <button class="wizard-fb-btn" onclick="wizardFixed(this)">Yes</button>
      <button class="wizard-fb-btn" onclick="wizardNotFixed(this,'${stepId}')">No</button>`;
    const esc = document.createElement('div');
    esc.className = 'wizard-escalate';
    esc.id = 'wizardEscalate';
    const escSubject = encodeURIComponent('Help: ' + step.title);
    const escBody = encodeURIComponent('I tried the suggestion for "' + step.title + '" but it didn\'t work.\n\nBrowser: ' + navigator.userAgent.split(' ').slice(-2).join(' ') + '\n\nWhat happened:\n');
    esc.innerHTML = `Still stuck? <a href="mailto:support@kaynos.net?subject=${escSubject}&body=${escBody}">Email support with this issue pre-filled →</a>`;
    container.appendChild(div);
    container.appendChild(esc);
  }
  function wizardFixed(btn) { btn.classList.add('selected'); showToast('Glad it helped!'); }
  function wizardNotFixed(btn, stepId) {
    btn.classList.add('selected');
    document.getElementById('wizardEscalate').classList.add('show');
  }

  /* ── SHAREABLE WIZARD LINKS ────────────────────────── */
  function getWizardShareLink(stepId) {
    return location.origin + location.pathname + '#troubleshoot:wizard-' + stepId;
  }
  function copyWizardLink(stepId) {
    navigator.clipboard.writeText(getWizardShareLink(stepId)).then(() => showToast('Link copied'));
  }

  /* ── PRINT / EXPORT ────────────────────────────────── */
  function renderPrintBtn(container, pageId) {
    if (pageId === 'welcome') return;
    const bar = container.querySelector('.article-actions');
    if (!bar) return;
    const btn = document.createElement('button');
    btn.className = 'print-btn';
    btn.innerHTML = IC.print + ' Print';
    btn.onclick = () => window.print();
    bar.appendChild(btn);
  }

  /* ── UPLOAD TIME CALCULATOR ─────────────────────────── */
  function calcUpload() {
    const sizeMB = parseFloat(document.getElementById('calcSize')?.value);
    const speedMbps = parseFloat(document.getElementById('calcSpeed')?.value);
    const el = document.getElementById('calcResult');
    if (!el || !sizeMB || !speedMbps || sizeMB <= 0 || speedMbps <= 0 || sizeMB > 100000 || speedMbps > 10000) {
      if (el) el.classList.remove('show');
      return;
    }
    const seconds = (sizeMB * 8) / speedMbps;
    let timeStr;
    if (seconds < 60) timeStr = Math.round(seconds) + ' seconds';
    else if (seconds < 3600) timeStr = Math.round(seconds / 60) + ' minutes';
    else timeStr = (seconds / 3600).toFixed(1) + ' hours';
    el.textContent = `Estimated upload time: ~${timeStr}`;
    el.classList.add('show');
  }

  /* ── UPLOAD PREFLIGHT CHECKLIST ────────────────────── */
  const PREFLIGHT = [
    { id: 'pf-format', text: 'File is MP4, MOV, WebM, or MKV' },
    { id: 'pf-size', text: 'File is under 5 GB' },
    { id: 'pf-landscape', text: 'Recorded in landscape orientation' },
    { id: 'pf-1080', text: 'Resolution is 1080p or lower (recommended)' },
    { id: 'pf-codec', text: 'Video codec is H.264 with AAC audio (if you had a choice)' },
    { id: 'pf-trim', text: 'Trimmed dead air at start and end' },
    { id: 'pf-wifi', text: 'Connected to stable Wi-Fi or wired internet' },
    { id: 'pf-sync', text: 'Paused heavy sync tools (Dropbox, Google Drive)' },
  ];

  function renderPreflight() {
    const container = document.getElementById('preflightList');
    if (!container) return;
    const checked = JSON.parse(sessionStorage.getItem('preflight') || '[]');
    container.innerHTML = '';
    PREFLIGHT.forEach(item => {
      const isDone = checked.includes(item.id);
      const el = document.createElement('div');
      el.className = 'preflight-item' + (isDone ? ' checked' : '');
      el.innerHTML = `<div class="preflight-box">${isDone ? IC.check : ''}</div><span class="pf-text">${item.text}</span>`;
      el.onclick = () => {
        let c = JSON.parse(sessionStorage.getItem('preflight') || '[]');
        if (c.includes(item.id)) c = c.filter(x => x !== item.id);
        else c.push(item.id);
        sessionStorage.setItem('preflight', JSON.stringify(c));
        renderPreflight();
      };
      container.appendChild(el);
    });
    // Ready status
    if (checked.length === PREFLIGHT.length) {
      const status = document.createElement('div');
      status.className = 'preflight-status ready';
      status.textContent = 'All checks passed — you\'re ready to upload!';
      container.appendChild(status);
    }
  }

  /* ── BROWSER CHECK ─────────────────────────────────── */
  function checkBrowser() {
    const el = document.getElementById('browserResult');
    if (!el) return;
    const ua = navigator.userAgent;
    const isIOS = /iPad|iPhone|iPod/.test(ua);
    let browser = 'Unknown';
    let status = 'warn';
    let msg = '';
    if (isIOS) { browser = 'Safari (iOS)'; status = 'warn'; msg = 'Good support. All iOS browsers use WebKit — MKV may not play, use MP4 instead.'; }
    else if (ua.includes('Edg')) { browser = 'Edge'; status = 'good'; msg = 'Full support.'; }
    else if (ua.includes('Chrome')) { browser = 'Chrome'; status = 'good'; msg = 'Full support — recommended browser.'; }
    else if (ua.includes('Firefox')) { browser = 'Firefox'; status = 'good'; msg = 'Full support — great choice.'; }
    else if (ua.includes('Safari')) { browser = 'Safari'; status = 'warn'; msg = 'Good support. MKV files may not play — use MP4 instead.'; }
    else { msg = 'Unknown browser. If you run into issues, try Chrome.'; }
    el.className = 'browser-result ' + status;
    el.innerHTML = `${status === 'good' ? IC.check : IC.warn} <div><strong>You're using ${browser}.</strong> ${msg}</div>`;
  }

  /* ── DOC SEARCH ─────────────────────────────────────── */
  let chatOpen = false;
  let chatInitialized = false;
  function toggleChat() {
    chatOpen = !chatOpen;
    document.getElementById('chatPanel').classList.toggle('open', chatOpen);
    if (chatOpen && !chatInitialized) {
      chatInitialized = true;
      addBotMsg("Search the docs by keyword. This is a local search tool — no messages are sent or stored.", [
        "How do I upload video?",
        "What are the user roles?",
        "Video won't play",
        "How do I use the API?"
      ]);
    }
    if (chatOpen) document.getElementById('chatInput').focus();
  }

  function addBotMsg(text, suggestions) {
    const msgs = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'chat-msg bot';
    div.innerHTML = text;
    if (suggestions && suggestions.length) {
      const sg = document.createElement('div');
      sg.className = 'chat-suggestions';
      suggestions.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'chat-suggestion';
        btn.textContent = s;
        btn.onclick = () => { document.getElementById('chatInput').value = s; sendChat(); };
        sg.appendChild(btn);
      });
      div.appendChild(sg);
    }
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addUserMsg(text) {
    const msgs = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'chat-msg user';
    div.textContent = text;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function sendChat() {
    const input = document.getElementById('chatInput');
    const q = input.value.trim();
    if (!q) return;
    input.value = '';
    addUserMsg(q);

    // Search docs for relevant pages
    const lower = q.toLowerCase();
    const words = lower.split(/\s+/).filter(w => w.length > 1);
    const scored = [];
    for (const [id, page] of Object.entries(PAGES)) {
      if (id === 'welcome') continue;
      const text = (page.title + ' ' + page.content.replace(/<[^>]+>/g, ' ')).toLowerCase();
      let score = 0;
      words.forEach(w => {
        if (page.title.toLowerCase().includes(w)) score += 5;
        const count = (text.match(new RegExp(w, 'g')) || []).length;
        score += Math.min(count, 10);
      });
      if (score > 0) scored.push({ id, title: page.title, section: page.section, score });
    }
    scored.sort((a, b) => b.score - a.score);
    const top = scored.slice(0, 3);

    if (top.length === 0) {
      addBotMsg("I couldn't find docs matching that. Try different keywords, or email <a href='mailto:support@kaynos.net'>support@kaynos.net</a> for direct help.", [
        "Upload problems",
        "Login issues",
        "Video formats"
      ]);
    } else {
      const links = top.map(r =>
        `<a onclick="navigate('${r.id}');toggleChat()">${r.title}</a> <span style="font-size:.7rem;color:var(--text-tertiary)">${r.section || ''}</span>`
      ).join('<br>');
      const followups = scored.slice(3, 6).map(r => r.title);
      addBotMsg(`Here's what I found:<br><br>${links}<br><br>Click any link to jump there.`, followups.length ? followups : null);
    }
  }

  /* ── TEXT SIZE ──────────────────────────────────────── */
  function adjustTextSize(dir) {
    const root = document.documentElement;
    const current = parseFloat(getComputedStyle(root).fontSize);
    const next = Math.max(13, Math.min(20, current + dir));
    root.style.fontSize = next + 'px';
    localStorage.setItem('text-size', next);
  }
  (function initTextSize() {
    const saved = localStorage.getItem('text-size');
    if (saved) document.documentElement.style.fontSize = saved + 'px';
  })();

  /* ── SHARE BUTTON ──────────────────────────────────── */
  function renderShareBtn(container, pageId) {
    if (pageId === 'welcome') return;
    let bar = container.querySelector('.article-actions');
    if (!bar) return;
    const btn = document.createElement('button');
    btn.className = 'share-btn';
    btn.innerHTML = IC.share + ' Share';
    btn.onclick = () => {
      const url = location.origin + location.pathname + '#' + pageId;
      if (navigator.share) {
        navigator.share({ title: PAGES[pageId].title + ' — Kaynos Docs', url });
      } else {
        navigator.clipboard.writeText(url).then(() => showToast('Link copied'));
      }
    };
    bar.appendChild(btn);
  }

  /* ── OFFLINE DETECTION ─────────────────────────────── */
  window.addEventListener('offline', () => document.getElementById('offlineBanner').classList.add('show'));
  window.addEventListener('online', () => document.getElementById('offlineBanner').classList.remove('show'));

  /* ── AUTO-EXPAND SIDEBAR SECTION ───────────────────── */
  function autoExpandSection(pageId) {
    const page = PAGES[pageId];
    if (!page || !page.section) return;
    const collapsed = JSON.parse(localStorage.getItem('sb-collapsed') || '{}');
    if (collapsed[page.section]) {
      delete collapsed[page.section];
      localStorage.setItem('sb-collapsed', JSON.stringify(collapsed));
    }
  }

  /* ── THEME TOGGLE ───────────────────────────────────── */
  function applyTheme(mode) {
    document.documentElement.classList.toggle('light', mode === 'light');
    document.getElementById('themeIcon').innerHTML = mode === 'light'
      ? '<path d="M8 1v1M8 14v1M1 8h1M14 8h1M3.1 3.1l.7.7M12.2 12.2l.7.7M12.9 3.1l-.7.7M3.8 12.2l-.7.7"/><circle cx="8" cy="8" r="3"/>'
      : '<path d="M13.5 8a5.5 5.5 0 01-7.4 5.2A6.5 6.5 0 008.3 1 5.5 5.5 0 0113.5 8z"/>';
    document.querySelector('meta[name="theme-color"]').content = mode === 'light' ? '#ffffff' : '#060609';
  }
  function toggleTheme() {
    const isLight = document.documentElement.classList.contains('light');
    const next = isLight ? 'dark' : 'light';
    localStorage.setItem('theme', next);
    applyTheme(next);
  }
  (function initTheme() {
    const stored = localStorage.getItem('theme');
    const pref = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    applyTheme(stored || pref);
  })();

  /* ── PLATFORM-AWARE MODIFIER KEY ─────────────────────── */
  const isMac = /Mac|iPhone|iPad|iPod/.test(navigator.platform || navigator.userAgent);
  if (!isMac) {
    const modKey = document.getElementById('searchKbd')?.querySelector('kbd');
    if (modKey) modKey.textContent = 'Ctrl';
    document.querySelectorAll('.mod-key').forEach(el => { el.textContent = 'Ctrl'; });
  }

  /* ── INIT ───────────────────────────────────────────── */
  buildSidebar();
  const hash = location.hash.slice(1);
  const [initPage, initSection] = hash.split(':');
  navigate(initPage && PAGES[initPage] ? initPage : 'welcome');
  if (initSection) {
    if (initSection.startsWith('wizard-')) {
      requestAnimationFrame(() => renderWizard(initSection.replace('wizard-', '')));
    } else {
      requestAnimationFrame(() => {
        const el = document.getElementById(initSection);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    }
  }
  // Language init
  document.getElementById('langToggle').textContent = currentLang.toUpperCase();
  document.getElementById('langToggle').classList.toggle('es', currentLang === 'es');

  // First-time onboarding
  if (isFirstVisit()) {
    setTimeout(startTour, 600);
  }
  </script>
</body>
</html>
