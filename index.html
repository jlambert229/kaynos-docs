  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #060609;
      --bg-elevated:  #111115;
      --bg-secondary: #1a1a20;
      --bg-tertiary:  #252530;
      --bg-glass:     rgba(6,6,9,0.88);
      --bg-hover:     rgba(255,255,255,0.04);
      --bg-active:    rgba(255,255,255,0.07);
      --text-primary:   #f0f0f6;
      --text-secondary: rgba(240,240,246,0.65);
      --text-tertiary:  rgba(240,240,246,0.38);
      --border:         rgba(255,255,255,0.07);
      --border-strong:  rgba(255,255,255,0.12);
      --accent:         #2184f3;
      --accent-hover:   #4da3f7;
      --accent-soft:    rgba(33,132,243,0.10);
      --accent-border:  rgba(33,132,243,0.25);
      --success:        #40c057;
      --success-soft:   rgba(64,192,87,0.10);
      --warning:        #fd7e14;
      --warning-soft:   rgba(253,126,20,0.10);
      --danger:         #fa5252;
      --danger-soft:    rgba(250,82,82,0.10);
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
      --sidebar-w: 268px;
      --toc-w:     216px;
      --header-h:  56px;
      --radius:    10px;
      --radius-sm: 7px;
      --radius-xs: 4px;
      --shadow:    0 1px 12px rgba(0,0,0,.35), 0 0 1px rgba(255,255,255,.04);
      --shadow-lg: 0 8px 40px rgba(0,0,0,.50), 0 0 1px rgba(255,255,255,.05);
      --ease: cubic-bezier(0.22,0.61,0.36,1);
      --dur: 0.14s;
      color-scheme: dark;
    }

    /* ── LIGHT MODE ─── */
    :root.light {
      --bg:           #ffffff;
      --bg-elevated:  #f8f9fa;
      --bg-secondary: #f1f3f5;
      --bg-tertiary:  #e9ecef;
      --bg-glass:     rgba(255,255,255,0.92);
      --bg-hover:     rgba(0,0,0,0.03);
      --bg-active:    rgba(0,0,0,0.06);
      --text-primary:   #1a1a2e;
      --text-secondary: rgba(26,26,46,0.72);
      --text-tertiary:  rgba(26,26,46,0.45);
      --border:         rgba(0,0,0,0.08);
      --border-strong:  rgba(0,0,0,0.14);
      --accent:         #1a6fdb;
      --accent-hover:   #1560c2;
      --accent-soft:    rgba(26,111,219,0.08);
      --accent-border:  rgba(26,111,219,0.22);
      --success:        #2b8a3e;
      --success-soft:   rgba(43,138,62,0.08);
      --warning:        #e8590c;
      --warning-soft:   rgba(232,89,12,0.08);
      --danger:         #e03131;
      --danger-soft:    rgba(224,49,49,0.08);
      --shadow:    0 1px 8px rgba(0,0,0,.08), 0 0 1px rgba(0,0,0,.12);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.12), 0 0 1px rgba(0,0,0,.08);
      color-scheme: light;
    }

    html { font-size: 16px; scroll-behavior: smooth; text-size-adjust: 100%; -webkit-text-size-adjust: 100%; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
      html { scroll-behavior: auto; }
    }

    * { scrollbar-width: thin; scrollbar-color: var(--bg-tertiary) transparent; }
    *::-webkit-scrollbar { width: 5px; height: 5px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 9999px; }

    ::selection { background: rgba(33,132,243,.28); color: var(--text-primary); }

    body {
      font-family: var(--font-body);
      color: var(--text-primary);
      background: var(--bg);
      line-height: 1.6;
      font-size: .9375rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── READING PROGRESS ─── */
    #progress-bar {
      position: fixed; top: 0; left: 0; height: 2px; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-hover));
      z-index: 200; transition: width .1s linear; pointer-events: none;
    }

    /* ── HEADER ─── */
    .header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--bg-glass);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 20px; z-index: 100; gap: 12px;
    }

    .header-logo {
      font-weight: 600; font-size: 14.5px; letter-spacing: -.025em;
      color: var(--text-primary); text-decoration: none;
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0; white-space: nowrap;
    }
    .header-logo-icon {
      width: 26px; height: 26px; background: #050508;
      border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .header-logo-sep { color: var(--text-tertiary); font-weight: 400; margin: 0 1px; }
    .header-logo-sub { color: var(--text-tertiary); font-weight: 400; font-size: 13px; }

    .header-search { flex: 1; max-width: 380px; position: relative; }
    .header-search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--text-tertiary); pointer-events: none; display: flex;
    }
    .header-search input {
      width: 100%; height: 34px;
      padding: 0 72px 0 34px;
      border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
      background: var(--bg-secondary);
      font-family: var(--font-body); font-size: .875rem; color: var(--text-primary);
      outline: none; transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
    }
    .header-search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(33,132,243,.10);
    }
    .header-search input::placeholder { color: var(--text-tertiary); }
    .search-kbd {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      display: flex; gap: 2px; pointer-events: none;
    }
    .search-kbd kbd {
      font-family: var(--font-body); font-size: 10px;
      color: var(--text-tertiary); border: 1px solid var(--border-strong);
      border-radius: 3px; padding: 1px 4px; background: var(--bg-tertiary);
    }

    .search-results {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: var(--bg-elevated); border: 1px solid var(--border-strong);
      border-radius: var(--radius); max-height: 400px; overflow-y: auto;
      display: none; box-shadow: var(--shadow-lg); z-index: 110;
    }
    .search-results.active { display: block; }
    .search-result {
      padding: 10px 14px; cursor: pointer;
      border-bottom: 1px solid var(--border); font-size: .875rem;
      transition: background var(--dur);
    }
    .search-result:last-child { border-bottom: none; }
    .search-result:hover, .search-result.focused { background: var(--bg-hover); }
    .search-result .sr-title { font-weight: 500; margin-bottom: 2px; }
    .search-result .sr-section { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .05em; }
    .search-result .sr-snippet { font-size: .8125rem; color: var(--text-secondary); margin-top: 4px; line-height: 1.5; }
    .search-result mark { background: rgba(33,132,243,.20); color: var(--accent-hover); border-radius: 2px; padding: 0 2px; }
    .search-empty { padding: 24px 14px; text-align: center; color: var(--text-tertiary); font-size: .875rem; }

    .header-spacer { flex: 1; }

    .header-app-link {
      flex-shrink: 0; font-size: .875rem; font-weight: 500;
      color: var(--text-secondary); text-decoration: none;
      white-space: nowrap; padding: 5px 10px; border-radius: var(--radius-sm);
      border: 1px solid var(--border-strong);
      transition: all var(--dur) var(--ease);
      display: flex; align-items: center; gap: 5px;
    }
    .header-app-link:hover {
      color: var(--text-primary); border-color: var(--accent);
      background: var(--accent-soft); text-decoration: none;
    }

    .menu-btn {
      display: none; background: none; border: none;
      color: var(--text-secondary); cursor: pointer;
      padding: 6px; border-radius: var(--radius-sm);
      transition: color var(--dur), background var(--dur); flex-shrink: 0;
    }
    .menu-btn:hover { color: var(--text-primary); background: var(--bg-hover); }

    .theme-toggle {
      background: none; border: 1px solid var(--border-strong);
      color: var(--text-secondary); cursor: pointer;
      padding: 5px 8px; border-radius: var(--radius-sm);
      transition: all var(--dur); display: flex; align-items: center;
      flex-shrink: 0; font-size: 14px; line-height: 1;
    }
    .theme-toggle:hover { color: var(--text-primary); border-color: var(--accent); background: var(--accent-soft); }

    /* ── LAYOUT ─── */
    .layout {
      margin-top: var(--header-h);
      margin-left: var(--sidebar-w);
      min-height: calc(100vh - var(--header-h));
    }

    /* ── SIDEBAR ─── */
    .sidebar {
      position: fixed; top: var(--header-h); left: 0;
      width: var(--sidebar-w); height: calc(100vh - var(--header-h));
      background: var(--bg-elevated); border-right: 1px solid var(--border);
      overflow-y: auto; padding: 16px 0 32px; z-index: 90;
      transition: transform .22s var(--ease);
    }
    .sidebar-section { margin-bottom: 4px; }
    .sidebar-section-title {
      padding: 10px 16px 4px; font-size: 10.5px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .09em; color: var(--text-tertiary);
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none; transition: color var(--dur);
    }
    .sidebar-section-title:hover { color: var(--text-secondary); }
    .sidebar-section-title .chevron {
      transition: transform .18s var(--ease); font-size: 9px; opacity: .5;
    }
    .sidebar-section.collapsed .chevron { transform: rotate(-90deg); }
    .sidebar-section.collapsed .sidebar-links { display: none; }
    .sidebar-link {
      display: block; padding: 6px 16px 6px 20px;
      font-size: .875rem; color: var(--text-secondary);
      text-decoration: none; transition: color var(--dur), background var(--dur);
      cursor: pointer; border-left: 2px solid transparent;
      margin: 1px 0;
    }
    .sidebar-link:hover { color: var(--text-primary); background: var(--bg-hover); }
    .sidebar-link.active {
      color: var(--accent); border-left-color: var(--accent);
      font-weight: 500; background: var(--accent-soft);
    }

    /* ── CONTENT ─── */
    .content { min-width: 0; display: flex; justify-content: center; }
    .content-with-toc {
      width: 100%; display: flex; justify-content: center;
      padding: 40px 48px 96px;
    }
    .content-wrap { width: 100%; max-width: 720px; display: flex; flex-direction: column; }

    /* ── PAGE TRANSITION ─── */
    .content-inner { animation: fadeUp .18s var(--ease); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── TYPOGRAPHY ─── */
    .content-inner h1 {
      font-size: 2rem; font-weight: 700; letter-spacing: -.035em;
      line-height: 1.15; margin-bottom: 6px; color: var(--text-primary);
    }
    .article-meta {
      font-size: .8125rem; color: var(--text-tertiary); margin-bottom: 18px;
      display: flex; align-items: center; gap: 12px;
    }
    .article-meta-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-tertiary); }
    .content-inner h2 {
      font-size: 1.1875rem; font-weight: 600; letter-spacing: -.015em;
      margin-top: 44px; margin-bottom: 14px;
      padding-top: 28px; border-top: 1px solid var(--border);
      line-height: 1.3; scroll-margin-top: calc(var(--header-h) + 16px);
    }
    .content-inner h2:first-of-type { border-top: none; padding-top: 0; margin-top: 28px; }
    .heading-anchor {
      opacity: 0; margin-left: 6px; color: var(--text-tertiary);
      text-decoration: none; font-weight: 400; transition: opacity var(--dur), color var(--dur);
      cursor: pointer; font-size: .85em;
    }
    .content-inner h2:hover .heading-anchor,
    .content-inner h3:hover .heading-anchor,
    .heading-anchor:focus { opacity: 1; }
    .heading-anchor:hover { color: var(--accent); }
    .content-inner h3 {
      font-size: 1rem; font-weight: 600; margin-top: 28px; margin-bottom: 10px;
      color: var(--text-primary); scroll-margin-top: calc(var(--header-h) + 16px);
    }
    .content-inner p { margin-bottom: 16px; color: var(--text-secondary); line-height: 1.7; }
    .content-inner ul, .content-inner ol { margin-bottom: 16px; padding-left: 22px; }
    .content-inner li { margin-bottom: 7px; color: var(--text-secondary); line-height: 1.65; }
    .content-inner strong { font-weight: 600; color: var(--text-primary); }
    .content-inner code {
      font-family: var(--font-mono); font-size: .8125rem;
      background: var(--bg-secondary); padding: 2px 6px;
      border-radius: var(--radius-xs); color: var(--accent-hover);
      border: 1px solid var(--border);
    }
    .content-inner a { color: var(--accent); text-decoration: none; transition: color var(--dur); }
    .content-inner a:hover { color: var(--accent-hover); text-decoration: underline; text-decoration-color: rgba(33,132,243,.4); }
    .content-inner hr { border: none; border-top: 1px solid var(--border); margin: 36px 0; }

    /* ── CODE BLOCKS ─── */
    .code-block-wrap { position: relative; margin-bottom: 20px; }
    .content-inner pre {
      background: var(--bg-secondary); padding: 16px 18px;
      border-radius: var(--radius-sm); font-family: var(--font-mono);
      font-size: .8125rem; overflow-x: auto;
      border: 1px solid var(--border); line-height: 1.65;
      color: var(--text-secondary); margin-bottom: 0;
    }
    .copy-btn {
      position: absolute; top: 8px; right: 8px;
      padding: 4px 9px; background: var(--bg-tertiary);
      border: 1px solid var(--border-strong); border-radius: var(--radius-xs);
      color: var(--text-tertiary); font-size: 11px; font-family: var(--font-body);
      cursor: pointer; transition: all var(--dur); opacity: 0;
    }
    .code-block-wrap:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { color: var(--text-primary); background: var(--bg-active); }
    .copy-btn.copied { color: var(--success); border-color: rgba(64,192,87,.4); }

    /* ── TABLES ─── */
    .table-wrap { overflow-x: auto; margin-bottom: 24px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .content-inner table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    .content-inner th {
      text-align: left; padding: 10px 14px;
      background: var(--bg-secondary); font-weight: 600;
      font-size: .8125rem; color: var(--text-secondary);
      border-bottom: 1px solid var(--border-strong); white-space: nowrap;
    }
    .content-inner td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: top; color: var(--text-secondary); }
    .content-inner tr:last-child td { border-bottom: none; }
    .content-inner tr:hover td { background: var(--bg-hover); }

    /* ── HINTS ─── */
    .hint {
      padding: 13px 16px; border-radius: var(--radius-sm);
      margin-bottom: 20px; font-size: .875rem;
      display: flex; gap: 10px; line-height: 1.65;
    }
    .hint-icon { flex-shrink: 0; font-size: 15px; margin-top: 1px; line-height: 1.4; }
    .hint-warning  { background: var(--warning-soft); border: 1px solid rgba(253,126,20,.28); }
    .hint-info     { background: var(--accent-soft);  border: 1px solid var(--accent-border); }
    .hint-tip      { background: var(--success-soft); border: 1px solid rgba(64,192,87,.28); }
    .hint-danger   { background: var(--danger-soft);  border: 1px solid rgba(250,82,82,.28); }
    .hint-info a, .hint-warning a, .hint-tip a, .hint-danger a { color: var(--accent); font-weight: 500; }
    .hint > div:last-child { flex: 1; }

    /* ── QUICK LINKS ─── */
    .quick-links { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
    .quick-link {
      padding: 14px 16px; background: var(--bg-elevated);
      border: 1px solid var(--border-strong); border-radius: var(--radius);
      text-decoration: none; color: var(--text-primary);
      transition: border-color var(--dur), box-shadow var(--dur), background var(--dur), transform var(--dur);
      cursor: pointer; font-size: .875rem; display: flex; flex-direction: column; gap: 3px;
    }
    .quick-link:hover {
      border-color: var(--accent); background: var(--bg-secondary);
      box-shadow: 0 0 0 1px rgba(33,132,243,.12), var(--shadow);
      text-decoration: none; transform: translateY(-1px);
    }
    .quick-link .ql-icon { font-size: 18px; margin-bottom: 6px; line-height: 1; }
    .quick-link .ql-title { font-weight: 500; color: var(--text-primary); }
    .quick-link .ql-desc { font-size: .8125rem; color: var(--text-secondary); line-height: 1.4; }

    /* ── BREADCRUMB ─── */
    .breadcrumb {
      font-size: .8125rem; color: var(--text-tertiary);
      margin-bottom: 20px; display: flex; align-items: center; gap: 6px;
    }
    .breadcrumb a { color: var(--text-tertiary); text-decoration: none; transition: color var(--dur); cursor: pointer; }
    .breadcrumb a:hover { color: var(--accent); }
    .breadcrumb-sep { opacity: .4; }
    .breadcrumb-current { color: var(--text-secondary); }

    /* ── FOOTER NAV ─── */
    .footer-nav {
      display: flex; justify-content: space-between;
      margin-top: 56px; padding-top: 24px;
      border-top: 1px solid var(--border); gap: 12px;
    }
    .footer-nav-btn {
      text-decoration: none; padding: 12px 16px;
      border-radius: var(--radius-sm); border: 1px solid var(--border-strong);
      background: var(--bg-elevated); transition: all var(--dur);
      display: flex; flex-direction: column; gap: 3px;
      min-width: 0; flex: 1; max-width: 240px; cursor: pointer;
    }
    .footer-nav-btn.next { align-items: flex-end; margin-left: auto; }
    .footer-nav-btn:hover { border-color: var(--accent); background: var(--bg-secondary); }
    .fn-label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .05em; }
    .fn-title { font-size: .875rem; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── ON-PAGE TOC ─── */
    .toc {
      display: none; position: sticky;
      top: calc(var(--header-h) + 24px); width: var(--toc-w);
      max-height: calc(100vh - var(--header-h) - 48px);
      overflow-y: auto; flex-shrink: 0; padding: 0 0 24px;
      align-self: flex-start; margin-left: 40px;
    }
    .toc-title { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .09em; color: var(--text-tertiary); margin-bottom: 10px; }
    .toc-link {
      display: block; padding: 4px 0 4px 12px;
      font-size: .8125rem; color: var(--text-tertiary);
      text-decoration: none; border-left: 2px solid transparent;

<h1>Inviting your team</h1>
<p>Members join by email with a temporary password. Admins may invite coaches or clients; coaches may invite clients only. Everything happens in <a href="https://app.kaynos.net" target="_blank" rel="noopener">app.kaynos.net</a> under <strong>Admin</strong> or <strong>Clients</strong>.</p>
<div class="hint hint-info"><div class="hint-icon">ℹ️</div><div>Role capabilities are summarized on <a onclick="navigate('roles')">Understanding user roles</a>.</div></div>
<h2>Send an invite</h2>
<ol>
<li>Go to <strong>Admin</strong> (full roster control) or <strong>Clients</strong> (coaches adding a client).</li>
<li>Click <strong>Add Member</strong> / <strong>Add Client</strong>.</li>
<li>Enter name, email address, and role (admin can also set coach vs member).</li>
<li>Click <strong>Send Invite</strong>.</li>
</ol>
<p>Delivery is usually quick. If nothing arrives, check spam and verify the address for typos.</p>
<div class="hint hint-warning"><div class="hint-icon">⚠️</div><div>Still missing mail? See <a onclick="navigate('email-issues')">Email and notification issues</a> or contact <a href="mailto:support@kaynos.net">support@kaynos.net</a>.</div></div>
<h2>Who can invite</h2>
<table><thead><tr><th>Your role</th><th>Can add</th></tr></thead><tbody>
<tr><td><strong>Admin</strong></td><td>Coaches and clients</td></tr>
<tr><td><strong>Coach</strong></td><td>Clients only</td></tr>
<tr><td><strong>Client</strong></td><td>Nobody</td></tr>
</tbody></table>
<h2>What each role can do</h2>
<table><thead><tr><th>Role</th><th>What they can do</th></tr></thead><tbody>
<tr><td><strong>Admin</strong></td><td>Everything a coach can do, plus roster management, invites, and settings.</td></tr>
<tr><td><strong>Coach</strong></td><td>Sessions, classes, video upload, notes, tags, and client progress.</td></tr>
<tr><td><strong>Client</strong></td><td>Private sessions assigned to them, all published classes, notes, progress tracking. No uploads; cannot view other clients' private sessions.</td></tr>
</tbody></table>
<h2>Resend or reset</h2>
<p><strong>Admin</strong> → find them in the roster → <strong>Reset Password</strong>. A fresh temp password is emailed to them.</p>
<h2>Tips</h2>
<ul>
<li>Onboard coaches before adding a large client wave when possible.</li>
<li>Use an email address people actually check — it becomes their login.</li>
<li>There is no fixed seat limit in the product.</li>
</ul>`},

    "first-upload": {
      title: "Your first video upload", section: "Getting Started",
      content: `
<h1>Your first video upload</h1>
<p>A <strong>session</strong> is for one assigned client (private lesson, individual review). A <strong>class</strong> is for everyone in your account (group session, shared recording). Upload a file or link Vimeo in either case — create them after you <a href="https://app.kaynos.net" target="_blank" rel="noopener">sign in</a>.</p>
<div class="hint hint-tip"><div class="hint-icon">💡</div><div>New to the flow? Read <a onclick="navigate('creating-sessions')">Creating a session</a> and <a onclick="navigate('creating-classes')">Creating a class</a>. Limits and codecs: <a onclick="navigate('formats')">Supported formats and limits</a>.</div></div>
<h2>Upload a file</h2>
<ol>
<li>Create a new session or class, then pick <strong>Upload</strong> for the video source.</li>
<li>Drag your file onto the box, or click to choose from Finder / Files.</li>
<li>Watch the progress bar for speed and estimated time remaining.</li>
<li>Green check appears when done — then fill in title, date, client, and save.</li>
</ol>
<h2>Upload behavior</h2>
<ul>
<li>Files under ~100 MB often upload in a single request.</li>
<li>Larger files use chunked parallel upload with automatic retries (up to three) on network errors.</li>
<li>You can cancel an in-progress upload at any time.</li>
</ul>
<h2>Supported formats</h2>
<table><thead><tr><th>Format</th><th>Extension</th><th>Notes</th></tr></thead><tbody>
<tr><td>MP4</td><td><code>.mp4</code></td><td>Recommended default</td></tr>
<tr><td>MOV</td><td><code>.mov</code></td><td>Common on iPhone and GoPro</td></tr>
<tr><td>WebM</td><td><code>.webm</code></td><td>Screen and browser capture</td></tr>
<tr><td>MKV</td><td><code>.mkv</code></td><td>Supported; less common</td></tr>
</tbody></table>
<p>Maximum file size is <strong>5 GB</strong>. Full details: <a onclick="navigate('formats')">Supported formats and limits</a>.</p>
<h2>Vimeo</h2>
<p>Use the <strong>Vimeo</strong> source option and paste the URL or video ID to embed video already hosted on <a href="https://vimeo.com" target="_blank" rel="noopener">Vimeo</a>.</p>
<h2>Recording tips</h2>
<ul>
<li><strong>Landscape orientation.</strong> Your TV and your phone both want it.</li>
<li><strong>Camera slightly high</strong> so the full training area is visible, not only lower legs.</li>
<li><strong>Even lighting</strong> makes small details easier to see on review.</li>
</ul>`},

    roles: {
      title: "Understanding user roles", section: "Getting Started",
      content: `
<h1>Understanding user roles</h1>
<p>Each person has one of three roles. Assign them so permissions match how your team runs.</p>
<h2>Admin</h2>
<p>Typically the owner or head coach. Same capabilities as coaches, plus roster management, invites, role changes, and the <strong>Admin</strong> area for account-wide visibility.</p>
<h2>Coach</h2>
<p>Coaches run sessions and classes, upload video, add notes and tags, and view client progress.</p>
<h2>Client</h2>
<p>Clients access their assigned sessions and all classes, watch video, add notes, and track viewing progress. They cannot upload video or view other clients' private sessions.</p>
<h2>Change a role</h2>
<p>Admins only: <strong>Admin</strong> → select the member → role dropdown → save.</p>
<div class="hint hint-warning"><div class="hint-icon">⚠️</div><div>Downgrading a coach to a client removes the ability to create sessions or upload video. Existing content remains available. For invite rules, see <a onclick="navigate('inviting-members')">Inviting your team</a>.</div></div>`},

    uploading: {
      title: "Uploading videos", section: "Video",
      content: `
<h1>Uploading videos</h1>
<p>Each session or class uses one source: <strong>Upload</strong> (file from your device), <strong>Vimeo</strong> (embedded link), or <strong>Notes Only</strong> (no video). Upload from <a href="https://app.kaynos.net" target="_blank" rel="noopener">app.kaynos.net</a> when creating or editing.</p>
<div class="hint hint-info"><div class="hint-icon">ℹ️</div><div>Format and size limits: <a onclick="navigate('formats')">Supported formats and limits</a>. Stuck? <a onclick="navigate('upload-issues')">Video upload problems</a>.</div></div>
<h2>Large files</h2>
<p>Big uploads are split into chunks and sent with parallel connections. Failed parts retry automatically (up to three times) with exponential backoff.</p>
<h2>Requirements</h2>
<ul>
<li>Formats: MP4, MOV, WebM, MKV (convert others before uploading).</li>
<li>Maximum 5 GB per video.</li>
<li>Only admins and coaches may upload.</li>
</ul>
<h2>During upload</h2>
<p>The UI shows percent complete, current speed, time remaining, and a <strong>Cancel</strong> button if you need to stop.</p>
<h2>Replace a video</h2>
<p>Open the session or class, remove the current video with <strong>×</strong>, then upload a replacement. The previous file is deleted from storage.</p>
<div class="hint hint-danger"><div class="hint-icon">🚫</div><div><strong>Replacing video is destructive.</strong> The old file is deleted from storage with no undo. Archive a copy elsewhere first if you might need it later.</div></div>`},

    playback: {
      title: "Watching and reviewing", section: "Video",
      content: `
<h1>Watching and reviewing</h1>
<p>Playback runs entirely in the browser — no separate app install needed. Open recordings at <a href="https://app.kaynos.net" target="_blank" rel="noopener">app.kaynos.net</a>.</p>
<div class="hint hint-tip"><div class="hint-icon">💡</div><div>Problems playing video? Try <a onclick="navigate('playback-issues')">Video playback problems</a>.</div></div>
<h2>Playback speed</h2>
<p>Use <strong>0.5×</strong> through <strong>2×</strong> for slow-motion analysis or faster skimming.</p>
<h2>Timeline markers</h2>
<p>Markers on the timeline are notes. Hover to preview the text, click to jump to that exact moment.</p>
<h2>Add a note while watching</h2>
<ol>
<li>Pause (or press <strong>N</strong>).</li>
<li>Click <strong>Add Note</strong>, enter your text, then <strong>Save</strong>.</li>
</ol>
<p>The note is tied to the current playhead position.</p>
<h2>Keyboard shortcuts</h2>
<table><thead><tr><th>Key</th><th>Action</th></tr></thead><tbody>
<tr><td><code>Space</code> / <code>K</code></td><td>Play / Pause</td></tr>
<tr><td><code>J</code> / <code>L</code></td><td>Skip back / forward</td></tr>
<tr><td><code>N</code></td><td>Pause and add note</td></tr>
<tr><td><code>F</code></td><td>Toggle fullscreen</td></tr>
</tbody></table>
<h2>Progress tracking</h2>
<p>Playback position is saved for resume. Coaches can see completion percentage and last-viewed time without heavy analytics.</p>`},

    formats: {
      title: "Supported formats and limits", section: "Video",
      content: `
<h1>Supported formats and limits</h1>
<p>Use common codecs your devices and browsers handle well. When unsure, export to MP4 (H.264 + AAC). Free converters: <a href="https://handbrake.fr" target="_blank" rel="noopener">HandBrake</a>, <a href="https://www.videolan.org/vlc/" target="_blank" rel="noopener">VLC</a>.</p>
<div class="hint hint-info"><div class="hint-icon">ℹ️</div><div>Where files live and how long they're kept: <a onclick="navigate('storage')">Video storage and retention</a>.</div></div>
<table><thead><tr><th>Format</th><th>Extension</th><th>Support level</th></tr></thead><tbody>
<tr><td>MP4</td><td><code>.mp4</code></td><td>✅ Recommended default</td></tr>
<tr><td>MOV</td><td><code>.mov</code></td><td>✅ Supported</td></tr>
<tr><td>WebM</td><td><code>.webm</code></td><td>✅ Supported</td></tr>
<tr><td>MKV</td><td><code>.mkv</code></td><td>✅ Supported</td></tr>
</tbody></table>
<p><strong>MP4</strong> is the most predictable for uploads and playback. MOV from iPhone usually works well.</p>
<h2>File size</h2>
<ul>
<li>Maximum <strong>5 GB</strong> per file.</li>
<li>Files under about <strong>2 GB</strong> upload faster on typical home or gym Wi-Fi.</li>
</ul>
<h2>Smaller files, same teaching value</h2>
<ul>
<li><strong>1080p</strong> is enough for most instruction — very high bitrates slow uploads without much visible benefit.</li>
<li>Prefer <strong>H.264</strong> video and <strong>AAC</strong> audio when your export tool offers a choice.</li>
<li>Trim dead air at the start or end of clips before uploading.</li>
</ul>`},

    storage: {
      title: "Video storage and retention", section: "Video",
      content: `
<h1>Video storage and retention</h1>
<h2>Where video is stored</h2>
<p>Videos are stored in <a href="https://www.backblaze.com/b2/cloud-storage.html" target="_blank" rel="noopener">Backblaze B2</a>, delivered through <a href="https://www.cloudflare.com/application-services/products/cdn/" target="_blank" rel="noopener">Cloudflare</a> CDN. Infrastructure is US-hosted.</p>
<h2>Retention</h2>
<p>Video remains available while your account is active. We do not apply an automatic 90-day deletion policy.</p>
<div class="hint hint-tip"><div class="hint-icon">💡</div><div>Upload limits and codecs: <a onclick="navigate('formats')">Supported formats and limits</a>.</div></div>
<h2>Security</h2>
<ul>
<li>HTTPS for all data in transit.</li>
<li>Account data is isolated — your files are not mixed with other organizations' storage.</li>
<li>Playback URLs are time-limited. Share access inside Kaynos rather than relying on long-lived direct links.</li>
</ul>`},

    "creating-sessions": {
      title: "Creating a session", section: "Sessions & Classes",
      content: `
<h1>Creating a session</h1>
<p>A <strong>session</strong> is one-on-one content: private lessons, individual review, or competition footage for a single client. Only that client and staff who need access will see it.</p>
<h2>Workflow</h2>
<ol>
<li>Go to <strong>Sessions</strong> → <strong>New Session</strong>.</li>
<li>Choose your video source: <strong>Upload</strong>, <strong>Vimeo</strong>, or <strong>Notes Only</strong>.</li>
<li>Fill in title, date, assign the client from your roster, and add optional tags.</li>
<li>Click <strong>Create Session</strong>.</li>
</ol>
<h2>Who sees it</h2>
<p>The assigned client, the creator, and admins. Other clients cannot open someone else's private session.</p>
<div class="hint hint-info"><div class="hint-icon">ℹ️</div><div>First upload walkthrough: <a onclick="navigate('first-upload')">Your first video upload</a>. Visibility model: <a onclick="navigate('faq')">FAQ</a>.</div></div>`},

    "creating-classes": {
      title: "Creating a class", section: "Sessions & Classes",
      content: `

<p>A <strong>class</strong> is account-wide: group sessions, workshops, or any recording meant for all clients.</p>

    notes: {
      title: "Notes and timestamps", section: "Sessions & Classes",
      content: `
<h1>Notes and timestamps</h1>
<p>Attach short notes to exact moments on the timeline so everyone lands on the same frame during review.</p>
<h2>Adding a note from the player</h2>
<ol>
<li>Pause the video (shortcut: <strong>N</strong>).</li>
<li>Click <strong>Add Note</strong>, type your text, then <strong>Save</strong>.</li>
</ol>
<p>The note is saved at the current playhead position. Markers appear on the scrub bar; click any to jump.</p>
<h2>Filters</h2>
<p><strong>All</strong> shows every note; <strong>Coach</strong> shows coach notes only; <strong>Mine</strong> shows only the signed-in client's notes.</p>
<h2>Who can edit</h2>
<p>Coaches may edit any note. Clients may edit only notes they created.</p>
<h2>Tips</h2>
<ul>
<li>Short, specific lines (a technique name + brief observation) are easier to scan later than long paragraphs.</li>
<li>Clients can leave questions on their own sessions for coach follow-up.</li>
<li>Use the coach filter to quickly review your notes across several recordings.</li>
</ul>
<div class="hint hint-tip"><div class="hint-icon">💡</div><div>Playback shortcuts and the full note workflow: <a onclick="navigate('playback')">Watching and reviewing</a>.</div></div>`},

    tags: {
      title: "Tags and organization", section: "Sessions & Classes",
      content: `
<h1>Tags and organization</h1>
<p>Tags group related sessions and classes so lists stay easy to filter as your library grows.</p>
<h2>Tag ideas</h2>
<ul>
<li>Topic: <code>form-review</code>, <code>conditioning</code>, <code>competition</code></li>
<li>Format: <code>private</code>, <code>group</code>, <code>workshop</code></li>
<li>Level: <code>fundamentals</code>, <code>advanced</code>, <code>beginner</code></li>
</ul>
<h2>Adding tags</h2>
<p>In the session or class form, type a tag and press <strong>Enter</strong>. Repeat for additional tags.</p>
<h2>Finding content</h2>
<p>List views let you filter by tag — for example, everything tagged <code>milestone</code> for a specific training block.</p>
<h2>Consistency tips</h2>
<ul>
<li>Use one spelling and style per concept (avoid <code>review</code>, <code>Review</code>, and <code>form-review</code> for the same thing).</li>
<li>Agree on a shared vocabulary so your whole team uses consistent tags.</li>
<li>Tags are shared across the account, not private to one person.</li>
</ul>
<div class="hint hint-info"><div class="hint-icon">ℹ️</div><div>Filter your lists by tag in the app after you <a href="https://app.kaynos.net" target="_blank" rel="noopener">sign in</a>.</div></div>`},

    progress: {
      title: "Progress tracking", section: "Sessions & Classes",
      content: `
<h1>Progress tracking</h1>
<p>Progress is simple on purpose: enough to see whether someone finished a recording and when they last opened it.</p>
<h2>What we store</h2>
<ul>
<li>Last playback position (for resume)</li>
<li>Whether the full video was completed</li>
<li>Last opened time</li>
</ul>
<h2>For members</h2>
<p>They resume where they left off. Overviews show items that still need a full watch versus completed items.</p>
<h2>For coaches and owners</h2>
<p>Coach and admin views show completion and recency. We do not track fine-grained analytics or viewer heatmaps.</p>
<h2>What we intentionally avoid</h2>
<p>No invasive watch analytics or third-party ad-style tracking. The product stores only what it needs for resume and high-level completion tracking.</p>
<div class="hint hint-info"><div class="hint-icon">ℹ️</div><div>Roster and access control: <a onclick="navigate('managing-members')">Managing members</a>.</div></div>`},

    "managing-members": {

      content: `

<h2>Add someone</h2>
<p>See <a onclick="navigate('inviting-members')">Inviting your team</a> for the step-by-step invite flow.</p>

<h2>Remove access</h2>
<p><strong>Remove Member</strong> ends their access immediately. Notes they already created remain for history.</p>
<div class="hint hint-warning"><div class="hint-icon">⚠️</div><div>Removal is immediate — the person loses login access to your account on <a href="https://app.kaynos.net" target="_blank" rel="noopener">app.kaynos.net</a> right away.</div></div>

    notifications: {

    "upload-issues": {
      title: "Video upload problems", section: "Troubleshooting",
      content: `
<h1>Video upload problems</h1>
<p>Large uploads depend on stable internet and a supported format. Work through the checks below before assuming an app bug.</p>
<div class="hint hint-info"><div class="hint-icon">ℹ️</div><div>Reference: <a onclick="navigate('formats')">Supported formats and limits</a>, <a onclick="navigate('uploading')">Uploading videos</a>.</div></div>
<h2>Fails immediately</h2>
<p><strong>"Please select a video file":</strong> the file may not be MP4, MOV, WebM, or MKV. Convert to MP4 with <a href="https://handbrake.fr" target="_blank" rel="noopener">HandBrake</a> or <a href="https://www.videolan.org/vlc/" target="_blank" rel="noopener">VLC</a>, then try again.</p>
<p><strong>File too big:</strong> the limit is 5 GB. Trim the clip or export at 1080p — HandBrake's "Fast 1080p30" preset is a common choice.</p>
<h2>Progress appears stuck</h2>
<ol>
<li>Large files can pause between chunks for roughly 30–60 seconds — this is normal.</li>
<li>Confirm the network works (open another site).</li>
<li>Cancel the upload and start again if it doesn't advance after 2 minutes.</li>
</ol>
<h2>Fails partway through</h2>
<ul>
<li><strong>Network error during part upload:</strong> reconnect and retry.</li>
<li><strong>Part upload failed: 403:</strong> on very long uploads the session can expire. Cancel and upload again.</li>
<li><strong>500 server error:</strong> wait briefly and retry; if it persists, email <a href="mailto:support@kaynos.net">support@kaynos.net</a>.</li>
</ul>
<h2>Slow uploads</h2>
<p>Measure your <strong>upload</strong> speed, not download. <a href="https://fast.com" target="_blank" rel="noopener">fast.com</a> shows upload after the initial result.</p>
<table><thead><tr><th>Upload speed</th><th>500 MB</th><th>1 GB</th><th>2 GB</th></tr></thead><tbody>
<tr><td>10 Mbps</td><td>~7 min</td><td>~14 min</td><td>~28 min</td></tr>
<tr><td>25 Mbps</td><td>~3 min</td><td>~5 min</td><td>~11 min</td></tr>
<tr><td>50 Mbps</td><td>~1.5 min</td><td>~3 min</td><td>~5 min</td></tr>
<tr><td>100 Mbps</td><td>~45 sec</td><td>~1.5 min</td><td>~3 min</td></tr>
</tbody></table>
<p>A wired connection often beats crowded Wi-Fi. Pause heavy sync tools (Dropbox, Google Drive) and upload during a quieter time.</p>
<h2>Status stuck on "uploading"</h2>
<p>Contact <a href="mailto:support@kaynos.net">support@kaynos.net</a> with the session or class name so we can reset the status if the browser closed mid-upload.</p>
<h2>Still failing</h2>
<p>Email <a href="mailto:support@kaynos.net">support@kaynos.net</a> with: account name, browser, file type and size, and a screenshot if you have one.</p>`},

    "playback-issues": {
      title: "Video playback problems", section: "Troubleshooting",
      content: `
<h1>Video playback problems</h1>
<p>If the player is blank or showing errors, work through these checks.</p>
<div class="hint hint-info"><div class="hint-icon">ℹ️</div><div>General playback: <a onclick="navigate('playback')">Watching and reviewing</a>. Codecs: <a onclick="navigate('formats')">Supported formats and limits</a>.</div></div>
<h2>Player blank or broken controls</h2>
<p><strong>Black screen / no controls:</strong> refresh, then hard refresh or clear cache, then try <a href="https://www.google.com/chrome/" target="_blank" rel="noopener">Chrome</a>. Confirm the upload finished (not stuck on "uploading" or showing "failed").</p>
<p><strong>"Cannot be played":</strong> often a codec or browser issue. MKV can fail in Safari — try <a href="https://www.google.com/chrome/" target="_blank" rel="noopener">Chrome</a> or <a href="https://www.mozilla.org/firefox/" target="_blank" rel="noopener">Firefox</a>, or re-export to MP4 with H.264 video and AAC audio.</p>
<h2>Buffering or long spinners</h2>
<ul>
<li>Check your bandwidth (upload and download can differ dramatically by network).</li>
<li>Close other streaming tabs or heavy downloads.</li>
<li>Very high-bitrate 4K sources may stutter — a 1080p export often plays more reliably.</li>
</ul>
<h2>Sound but no picture (or the reverse)</h2>
<p>Usually a codec mismatch. Try another browser; if it persists, re-export with standard H.264/AAC.</p>
<h2>Resume position wrong</h2>
<p>Progress saves shortly after pausing. Closing the tab immediately can occasionally skip the save.</p>`},

    faq: {
      title: "Frequently asked questions", section: "FAQ",
      content: `
<h1>Frequently asked questions</h1>
<p>Kaynos is built for coaches who use video review: publish sessions and classes, add timestamped notes, and members watch on their own time.</p>
<div class="hint hint-info"><div class="hint-icon">ℹ️</div><div><strong>Quick links:</strong> App: <a href="https://app.kaynos.net" target="_blank" rel="noopener">app.kaynos.net</a> · Support: <a href="mailto:support@kaynos.net">support@kaynos.net</a> · Setup: <a onclick="navigate('setup')">Setting up your account</a></div></div>
<h2>What you're signing up for</h2>
<h3>What is Kaynos, in plain language?</h3>
<p>It replaces ad-hoc clip sharing in chat. You put session footage on a <strong>session</strong> (one client) or a <strong>class</strong> (everyone in your account), add notes on the timeline, and clients review when they can. Everything runs in the browser at <a href="https://app.kaynos.net" target="_blank" rel="noopener">app.kaynos.net</a> — no separate app install.</p>
<h3>Do my clients need to install something?</h3>
<p>No. They open <a href="https://app.kaynos.net" target="_blank" rel="noopener">app.kaynos.net</a> in a normal phone or laptop browser. If YouTube works on your network, Kaynos should too.</p>
<h3>What types of coaching does this work for?</h3>
<p>Kaynos works for any coaching practice where reviewing video helps clients improve: personal training, sports coaching, music lessons, dance instruction, or any skill-based teaching.</p>
<hr>
<h2>Running your account</h2>
<h3>Do you cap how many clients or coaches I can add?</h3>
<p>No. The product does not enforce a member or coach limit.</p>
<h3>Can clients watch each other's private lessons?</h3>
<p><strong>No.</strong> A <strong>session</strong> is visible only to that client, the staff who created or need it, and admins. <strong>Classes</strong> are shared with everyone in your account.</p>
<h3>Can people download my class video?</h3>
<p>There is no download button for end users. Playback uses expiring streaming links, keeping your curriculum harder to copy as a casual file share.</p>
<hr>
<h2>Trust, minors on camera, and policy</h2>
<h3>How serious are you about security?</h3>
<p>HTTPS in transit, hashed passwords, and video in cloud storage behind a CDN. See <a onclick="navigate('storage')">Video storage and retention</a> for details.</p>
<h3>What about minors on the footage?</h3>
<p>You are responsible for waivers, parental consent, and local law — the same as for any training footage. Read the <a href="https://app.kaynos.net/terms" target="_blank" rel="noopener">Terms of Service</a> in the app. For legal questions, consult qualified counsel.</p>
<hr>
<h2>Devices and integrations</h2>
<h3>Which browsers are supported?</h3>
<p>Current Chrome, Firefox, Safari, and Edge. If upload or playback fails in one browser, trying Chrome is a reasonable first step.</p>
<h3>Do you expose an API?</h3>
<p>Yes. Admins can create API tokens for scripts and integrations. Read <a onclick="navigate('developer-api')">Developer API</a> and avoid committing secrets to source control.</p>
<hr>
<h2>Support</h2>
<h3>How do I contact you?</h3>
<p>Email <a href="mailto:support@kaynos.net">support@kaynos.net</a> with what happened, what you expected, your account name, and your browser. A screenshot or short screen recording speeds up diagnosis. In-app chat is available when logged in to <a href="https://app.kaynos.net" target="_blank" rel="noopener">app.kaynos.net</a>.</p>`},

    "developer-api": {
      title: "Developer API", section: "Developers",
      content: `
<h1>Developer API</h1>
<p>For accounts that want automation beyond the web UI: schedules, exports, or custom reporting. The API is HTTPS-only and scoped to your account's data. Create and manage tokens under <strong>Admin → Developer API</strong> in <a href="https://app.kaynos.net" target="_blank" rel="noopener">app.kaynos.net</a> (admin role required).</p>
<div class="hint hint-info"><div class="hint-icon">ℹ️</div><div><strong>Swagger first.</strong> Sign in as an admin, then open the in-app docs. The same browser session lets <em>Try it out</em> use your cookies — <a href="https://app.kaynos.net/admin/api-docs" target="_blank" rel="noopener">Swagger UI (production)</a>.</div></div>
<div class="hint hint-danger"><div class="hint-icon">🚫</div><div><strong>Protect your secrets.</strong> API tokens are as sensitive as passwords. Store them in a secret manager or env vars — never commit them to git or expose them in frontend code.</div></div>
<p>OpenAPI YAML: <a href="https://app.kaynos.net/openapi.yaml" target="_blank" rel="noopener">app.kaynos.net/openapi.yaml</a> · Mirror: <a href="https://raw.githubusercontent.com/jlambert229/kaynos/main/public/openapi.yaml" target="_blank" rel="noopener">GitHub raw</a></p>
<div class="hint hint-warning"><div class="hint-icon">⚠️</div><div>If the app URL returns HTML instead of YAML, use the GitHub raw link.</div></div>
<h2>Two authentication doors</h2>
<ul>
<li><strong><code>/api/v1/…</code></strong> — for scripts and integrations: Bearer token minted under <strong>Admin → Developer API</strong>.</li>
<li><strong><code>/api/integrations/…</code></strong> — while logged in to the browser: create/list/revoke tokens via session cookie (Swagger "Try it out").</li>
<li>In-app route <strong><code>/admin/api-docs</code></strong> is Swagger UI; admin role required.</li>
</ul>
<h2>Base URLs</h2>
<table><thead><tr><th>Environment</th><th>Host</th><th>API prefix</th></tr></thead><tbody>
<tr><td>Production</td><td><a href="https://app.kaynos.net" target="_blank" rel="noopener"><code>https://app.kaynos.net</code></a></td><td><code>/api/v1</code></td></tr>
<tr><td>Local Netlify dev</td><td><code>http://localhost:8888</code></td><td><code>/api/v1</code></td></tr>
</tbody></table>
<p>Quick discovery: <code>GET /api/v1</code> lists routes, no token needed.</p>
<h2>Bearer header</h2>
<pre>Authorization: Bearer kn_&lt;your-secret&gt;</pre>
<p>We show the secret exactly once when you mint it. Treat it like a Stripe key — password manager or env var, never committed.</p>
<h2>Scopes</h2>
<table><thead><tr><th>Scope</th><th>Does</th></tr></thead><tbody>
<tr><td><code>read</code></td><td>GET requests for sessions, classes, members, etc.</td></tr>
<tr><td><code>write</code></td><td>Creates, updates, deletes — plus all reads.</td></tr>
</tbody></table>
<p>The token inherits the permissions of the admin who created it. If they can't do it in the UI, the API returns <code>403</code>. No backdoors.</p>
<h2>What v1 covers</h2>
<ul>
<li>Sessions and classes (lifecycle + progress reads)</li>
<li>Members / roster where the product allows automation</li>
<li>Notes pinned to sessions and classes</li>
</ul>
<h2>Managing tokens while logged in</h2>
<ol>
<li><code>GET /api/integrations/tokens</code> — inspect token metadata</li>
<li><code>POST /api/integrations/tokens</code> — create a token (plaintext secret returned once)</li>
<li><code>DELETE /api/integrations/tokens/{id}</code> — revoke a compromised key</li>
</ol>
<h3>Example create body</h3>
<pre>{"name":"nightly-export","scopes":["read"]}</pre>
<p>Add <code>"write"</code> to scopes only when you actually need it.</p>
<h2>Error responses</h2>
<table><thead><tr><th>Code</th><th>Meaning</th></tr></thead><tbody>
<tr><td><code>401</code></td><td>Missing or invalid token</td></tr>
<tr><td><code>403</code></td><td>Wrong scope or role</td></tr>
<tr><td><code>404</code></td><td>Resource not in your account</td></tr>
<tr><td><code>400</code></td><td>Bad request payload</td></tr>
</tbody></table>
<h2>Operational practices</h2>
<ul>
<li>Rotate API keys when technical staff leave.</li>
<li>Prefer read-only scopes until write access is clearly required.</li>
<li>Never embed secrets in client-side code — keep tokens server-side.</li>
</ul>
<h2>Quick links</h2>
<ul>
<li><a href="https://app.kaynos.net/admin/api-docs" target="_blank" rel="noopener">Swagger UI</a></li>
<li><a href="https://app.kaynos.net/openapi.yaml" target="_blank" rel="noopener">OpenAPI YAML (app host)</a></li>
<li><a href="https://raw.githubusercontent.com/jlambert229/kaynos/main/public/openapi.yaml" target="_blank" rel="noopener">OpenAPI YAML (GitHub raw)</a></li>
</ul>`},

      content: `

  };

  const NAV = [
    { section: "", pages: ["welcome", "whats-new"] },
    { section: "Getting Started", pages: ["setup", "inviting-members", "first-upload", "roles"] },
    { section: "Video", pages: ["uploading", "playback", "formats", "storage"] },
    { section: "Sessions & Classes", pages: ["creating-sessions", "creating-classes", "notes", "tags", "progress"] },
    { section: "Account Management", pages: ["managing-members", "profile", "notifications"] },
    { section: "Developers", pages: ["developer-api"] },
    { section: "Troubleshooting", pages: ["upload-issues", "playback-issues", "login-issues", "email-issues", "performance", "mobile"] },
    { section: "FAQ", pages: ["faq"] }
  ];

  const allPageKeys = NAV.flatMap(g => g.pages);

  /* ── SIDEBAR ─────────────────────────────────────────── */
  function buildSidebar() {
    const sb = document.getElementById('sidebar');
    const collapsed = JSON.parse(localStorage.getItem('sb-collapsed') || '{}');
    let html = '';
    NAV.forEach((g, i) => {
      const isCollapsed = g.section && collapsed[g.section];
      html += `<div class="sidebar-section${isCollapsed ? ' collapsed' : ''}" data-section="${g.section || ''}">`;
      if (g.section) html += `<div class="sidebar-section-title" onclick="toggleSection(this)">${g.section}<span class="chevron">▼</span></div>`;
      html += '<div class="sidebar-links">';
      g.pages.forEach(p => {
        html += `<a class="sidebar-link" tabindex="0" data-page="${p}" onclick="navigate('${p}')" onkeydown="if(event.key==='Enter')navigate('${p}')">${PAGES[p].title}</a>`;
      });
      html += '</div></div>';
    });
    sb.innerHTML = html;
  }

  function toggleSection(el) {
    const section = el.closest('.sidebar-section');
    section.classList.toggle('collapsed');
    const collapsed = JSON.parse(localStorage.getItem('sb-collapsed') || '{}');
    const name = section.dataset.section;
    if (section.classList.contains('collapsed')) collapsed[name] = true;
    else delete collapsed[name];
    localStorage.setItem('sb-collapsed', JSON.stringify(collapsed));
  }

  /* ── NAVIGATE ───────────────────────────────────────── */
  function navigate(pageId) {
    const page = PAGES[pageId];
    if (!page) { navigate('welcome'); return; }

    const pc = document.getElementById('pageContent');
    // Retrigger animation
    pc.style.animation = 'none';
    void pc.offsetHeight;
    pc.style.animation = '';
    pc.innerHTML = page.content;

    // Wrap tables
    pc.querySelectorAll('table').forEach(t => {
      if (!t.closest('.table-wrap')) {
        const w = document.createElement('div');
        w.className = 'table-wrap';
        t.parentNode.insertBefore(w, t);
        w.appendChild(t);
      }
    });

    // Wrap pre blocks with copy button
    pc.querySelectorAll('pre').forEach(pre => {
      if (!pre.closest('.code-block-wrap')) {
        const w = document.createElement('div');
        w.className = 'code-block-wrap';
        pre.parentNode.insertBefore(w, pre);
        w.appendChild(pre);
        const btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'Copy';
        btn.onclick = () => copyCode(btn, pre.textContent);
        w.appendChild(btn);
      }
    });

    // Sidebar active
    document.querySelectorAll('.sidebar-link').forEach(l => {
      const isActive = l.dataset.page === pageId;
      l.classList.toggle('active', isActive);
      if (isActive) l.setAttribute('aria-current', 'page');
      else l.removeAttribute('aria-current');
    });

    // Breadcrumb
    if (page.section) {
      const bc = document.createElement('div');
      bc.className = 'breadcrumb';
      bc.innerHTML = `<a onclick="navigate('welcome')">Help Center</a><span class="breadcrumb-sep">›</span><span class="breadcrumb-current">${page.section}</span>`;
      pc.prepend(bc);
    }

    // Footer nav
    renderFooterNav(pageId);

    // TOC
    renderToc(pc);

    // Anchor links on headings
    pc.querySelectorAll('h2[id], h3[id]').forEach(h => {
      const a = document.createElement('a');
      a.className = 'heading-anchor';
      a.href = '#' + pageId + ':' + h.id;
      a.textContent = '#';
      a.title = 'Copy link to section';
      a.onclick = (e) => {
        e.preventDefault();
        const url = location.origin + location.pathname + '#' + pageId + ':' + h.id;
        navigator.clipboard.writeText(url).then(() => showToast('Link copied'));
      };
      h.appendChild(a);
    });

    window.scrollTo({ top: 0, behavior: 'instant' });
    history.pushState({ page: pageId }, '', '#' + pageId);
    document.title = pageId === 'welcome' ? 'Kaynos — Help Center' : `${page.title} — Kaynos Docs`;
    closeSidebar();
    document.getElementById('searchInput').value = '';
    document.getElementById('searchResults').classList.remove('active');
    document.getElementById('searchInput').setAttribute('aria-expanded', 'false');

    // Scroll active link into view
    const active = document.querySelector('.sidebar-link.active');
    if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  /* ── FOOTER NAV ─────────────────────────────────────── */
  function renderFooterNav(pageId) {
    const idx = allPageKeys.indexOf(pageId);
    const fn = document.getElementById('footerNav');
    fn.innerHTML = '';
    if (idx > 0) {
      const id = allPageKeys[idx - 1];
      const a = document.createElement('a');
      a.className = 'footer-nav-btn prev';
      a.onclick = () => navigate(id);
      a.innerHTML = `<span class="fn-label">← Previous</span><span class="fn-title">${PAGES[id].title}</span>`;
      fn.appendChild(a);
    }
    if (idx < allPageKeys.length - 1) {
      const id = allPageKeys[idx + 1];
      const a = document.createElement('a');
      a.className = 'footer-nav-btn next';
      a.onclick = () => navigate(id);
      a.innerHTML = `<span class="fn-label">Next →</span><span class="fn-title">${PAGES[id].title}</span>`;
      fn.appendChild(a);
    }
  }

  /* ── ON-PAGE TOC ────────────────────────────────────── */
  function renderToc(container) {
    const toc = document.getElementById('toc');
    const headings = container.querySelectorAll('h2, h3');
    if (headings.length < 2) { toc.innerHTML = ''; return; }

    let html = '<div class="toc-title">On this page</div>';
    headings.forEach((h, i) => {
      const id = 'h-' + i;
      h.id = id;
      const cls = h.tagName === 'H3' ? 'toc-link toc-h3' : 'toc-link';
      html += `<a class="${cls}" href="#${id}" onclick="tocJump(event,'${id}')">${h.textContent}</a>`;
    });
    toc.innerHTML = html;

    if (window._tocObs) window._tocObs.disconnect();
    window._tocObs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        const link = toc.querySelector(`[href="#${e.target.id}"]`);
        if (link) link.classList.toggle('active', e.isIntersecting);
      });
    }, { rootMargin: `-${56}px 0px -65% 0px`, threshold: 0 });
    headings.forEach(h => window._tocObs.observe(h));
  }

  function tocJump(e, id) {
    e.preventDefault();
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  /* ── COPY ───────────────────────────────────────────── */
  function copyCode(btn, text) {
    navigator.clipboard.writeText(text.trim()).then(() => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      showToast('Copied to clipboard');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    }).catch(() => {
      showToast('Copy failed — try selecting manually');
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(window._toast);
    window._toast = setTimeout(() => t.classList.remove('show'), 2000);
  }

  /* ── SEARCH ─────────────────────────────────────────── */
  let srIdx = -1;

  function handleSearch(q) {
    const sr = document.getElementById('searchResults');
    srIdx = -1;
    if (!q || q.length < 2) { sr.classList.remove('active'); sr.innerHTML = ''; document.getElementById('searchInput').setAttribute('aria-expanded', 'false'); return; }
    const lower = q.toLowerCase();
    const results = [];
    for (const [id, page] of Object.entries(PAGES)) {
      const text = page.content.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').toLowerCase();
      const titleMatch = page.title.toLowerCase().includes(lower);
      const idx = text.indexOf(lower);
      if (titleMatch || idx !== -1) {
        let snippet = '';
        if (idx !== -1) {
          const s = Math.max(0, idx - 45), e = Math.min(text.length, idx + q.length + 70);
          const raw = (s > 0 ? '…' : '') + text.slice(s, e) + (e < text.length ? '…' : '');
          snippet = raw.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), m => `<mark>${m}</mark>`);
        }
        results.push({ id, title: page.title, section: page.section, snippet, titleMatch });
      }
    }
    results.sort((a, b) => (b.titleMatch ? 1 : 0) - (a.titleMatch ? 1 : 0));
    sr.innerHTML = results.length === 0
      ? '<div class="search-empty">No results found</div>'
      : results.slice(0, 8).map((r, i) =>
          `<div class="search-result" role="option" id="sr-${i}" data-page="${r.id}" onclick="navigate('${r.id}')">
            <div class="sr-title">${r.title}</div>
            ${r.section ? `<div class="sr-section">${r.section}</div>` : ''}
            ${r.snippet ? `<div class="sr-snippet">${r.snippet}</div>` : ''}
          </div>`
        ).join('');
    sr.classList.add('active');
    document.getElementById('searchInput').setAttribute('aria-expanded', 'true');
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    const sr = document.getElementById('searchResults');
    const items = sr.querySelectorAll('.search-result');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      srIdx = Math.min(srIdx + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('focused', i === srIdx));
      if (items[srIdx]) items[srIdx].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      srIdx = Math.max(srIdx - 1, -1);
      items.forEach((el, i) => el.classList.toggle('focused', i === srIdx));
    } else if (e.key === 'Enter' && srIdx >= 0 && items[srIdx]) {
      navigate(items[srIdx].dataset.page);
    } else if (e.key === 'Escape') {
      sr.classList.remove('active');
      srIdx = -1;
      document.getElementById('searchInput').setAttribute('aria-expanded', 'false');
      document.getElementById('searchInput').blur();
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.header-search')) {
      document.getElementById('searchResults').classList.remove('active');
      document.getElementById('searchInput').setAttribute('aria-expanded', 'false');
      srIdx = -1;
    }
  });

  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      const inp = document.getElementById('searchInput');
      inp.focus(); inp.select();
    }
  });

  /* ── SIDEBAR TOGGLE ─────────────────────────────────── */
  function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const ov = document.getElementById('overlay');
    const isOpen = sb.classList.toggle('open');
    ov.classList.toggle('active', isOpen);
    if (isOpen) {
      sb.setAttribute('aria-modal', 'true');
      sb.setAttribute('role', 'dialog');
      const first = sb.querySelector('.sidebar-link');
      if (first) first.focus();
      sb.addEventListener('keydown', trapFocus);
    } else {
      sb.removeAttribute('aria-modal');
      sb.removeAttribute('role');
      sb.removeEventListener('keydown', trapFocus);
      document.querySelector('.menu-btn').focus();
    }
  }
  function closeSidebar() {
    const sb = document.getElementById('sidebar');
    sb.classList.remove('open');
    document.getElementById('overlay').classList.remove('active');
    sb.removeAttribute('aria-modal');
    sb.removeAttribute('role');
    sb.removeEventListener('keydown', trapFocus);
  }
  function trapFocus(e) {
    if (e.key === 'Escape') { closeSidebar(); document.querySelector('.menu-btn').focus(); return; }
    if (e.key !== 'Tab') return;
    const sb = document.getElementById('sidebar');
    const focusable = sb.querySelectorAll('.sidebar-link');
    if (!focusable.length) return;
    const first = focusable[0], last = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  }

  /* ── SCROLL EFFECTS ─────────────────────────────────── */
  window.addEventListener('scroll', () => {
    const d = document.documentElement;
    const pct = d.scrollHeight > d.clientHeight
      ? (d.scrollTop / (d.scrollHeight - d.clientHeight)) * 100 : 0;
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('back-top').classList.toggle('visible', d.scrollTop > 400);
  }, { passive: true });

  /* ── POPSTATE ───────────────────────────────────────── */
  window.addEventListener('popstate', e => {
    navigate(e.state?.page || 'welcome');
  });

  /* ── KEYBOARD SHORTCUTS ─────────────────────────────── */
  function openKbd() { document.getElementById('kbdModal').classList.add('active'); }
  function closeKbd() { document.getElementById('kbdModal').classList.remove('active'); }

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
    if (document.getElementById('kbdModal').classList.contains('active')) {
      if (e.key === 'Escape') closeKbd();
      return;
    }
    if (e.key === '?') { e.preventDefault(); openKbd(); return; }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
      const cur = location.hash.slice(1) || 'welcome';
      const idx = allPageKeys.indexOf(cur);
      if (idx === -1) return;
      if (e.key === 'ArrowLeft' && idx > 0) navigate(allPageKeys[idx - 1]);
      if (e.key === 'ArrowRight' && idx < allPageKeys.length - 1) navigate(allPageKeys[idx + 1]);
    }
    if (e.key === 't' || e.key === 'T') window.scrollTo({ top: 0, behavior: 'smooth' });
    if (e.key === 'h' || e.key === 'H') navigate('welcome');
  });

  /* ── FEEDBACK WIDGET ───────────────────────────────── */
  function renderFeedback(container) {
    const existing = container.querySelector('.page-feedback');
    if (existing) existing.remove();
    const cur = location.hash.slice(1) || 'welcome';
    if (cur === 'welcome') return;
    const div = document.createElement('div');
    div.className = 'page-feedback';
    div.innerHTML = `<span>Was this helpful?</span>
      <button class="feedback-btn" onclick="sendFeedback(this,'yes')">Yes</button>
      <button class="feedback-btn" onclick="sendFeedback(this,'no')">No</button>
      <span class="feedback-thanks">Thanks for your feedback!</span>`;
    container.appendChild(div);
  }

  function sendFeedback(btn, value) {
    btn.classList.add('selected');
    const thanks = btn.parentElement.querySelector('.feedback-thanks');
    thanks.style.display = 'inline';
    btn.parentElement.querySelectorAll('.feedback-btn:not(.selected)').forEach(b => b.style.display = 'none');
  }

  /* ── FAQ ACCORDION ──────────────────────────────────── */
  function renderFaqAccordion(container, pageId) {
    if (pageId !== 'faq') return;
    const h3s = container.querySelectorAll('h3');
    h3s.forEach(h3 => {
      const item = document.createElement('div');
      item.className = 'faq-item';
      const question = document.createElement('div');
      question.className = 'faq-question';
      question.innerHTML = `<span>${h3.textContent}</span><span class="faq-chevron">▼</span>`;
      question.onclick = () => item.classList.toggle('open');
      const answer = document.createElement('div');
      answer.className = 'faq-answer';
      // Collect siblings until next h3, h2, or hr
      let sib = h3.nextElementSibling;
      const siblings = [];
      while (sib && sib.tagName !== 'H3' && sib.tagName !== 'H2' && sib.tagName !== 'HR') {
        siblings.push(sib);
        sib = sib.nextElementSibling;
      }
      siblings.forEach(s => answer.appendChild(s));
      item.appendChild(question);
      item.appendChild(answer);
      h3.replaceWith(item);
    });
  }

  /* ── READING TIME ───────────────────────────────────── */
  function renderArticleMeta(container, pageId) {
    if (pageId === 'welcome') return;
    const text = container.textContent || '';
    const words = text.trim().split(/\s+/).length;
    const mins = Math.max(1, Math.round(words / 200));
    const h1 = container.querySelector('h1');
    if (!h1) return;
    const meta = document.createElement('div');
    meta.className = 'article-meta';
    meta.innerHTML = `<span>${mins} min read</span><span class="article-meta-dot"></span><span>${words} words</span>`;
    h1.insertAdjacentElement('afterend', meta);
  }

  /* ── RELATED ARTICLES ──────────────────────────────── */
  function renderRelated(container, pageId) {
    const page = PAGES[pageId];
    if (!page || !page.section || pageId === 'welcome') return;
    const sameSection = allPageKeys.filter(k => PAGES[k].section === page.section && k !== pageId);
    if (!sameSection.length) return;
    const picks = sameSection.sort(() => .5 - Math.random()).slice(0, 3);
    const div = document.createElement('div');
    div.className = 'related-articles';
    div.innerHTML = '<div class="related-title">Related articles</div><div class="related-grid">' +
      picks.map(k => `<a class="related-card" href="#${k}" onclick="navigate('${k}');return false"><span class="related-card-title">${PAGES[k].title}</span><span class="related-card-section">${PAGES[k].section}</span></a>`).join('') +
      '</div>';
    container.appendChild(div);
  }

  /* ── ENHANCED NAVIGATE (patch to add extras) ───────── */
  const _origNavigate = navigate;
  navigate = function(pageId) {
    _origNavigate(pageId);
    const pc = document.getElementById('pageContent');
    renderArticleMeta(pc, pageId);
    renderFaqAccordion(pc, pageId);
    renderRelated(pc, pageId);
    renderFeedback(pc);
  };

  /* ── THEME TOGGLE ───────────────────────────────────── */
  function applyTheme(mode) {
    document.documentElement.classList.toggle('light', mode === 'light');
    document.getElementById('themeToggle').textContent = mode === 'light' ? '☀️' : '🌙';
    document.querySelector('meta[name="theme-color"]').content = mode === 'light' ? '#ffffff' : '#060609';
  }
  function toggleTheme() {
    const isLight = document.documentElement.classList.contains('light');
    const next = isLight ? 'dark' : 'light';
    localStorage.setItem('theme', next);
    applyTheme(next);
  }
  (function initTheme() {
    const stored = localStorage.getItem('theme');
    const pref = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    applyTheme(stored || pref);
  })();

  /* ── INIT ───────────────────────────────────────────── */
  buildSidebar();
  const hash = location.hash.slice(1);
  const [initPage, initSection] = hash.split(':');
  navigate(initPage && PAGES[initPage] ? initPage : 'welcome');
  if (initSection) {
    requestAnimationFrame(() => {
      const el = document.getElementById(initSection);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  }
  </script>
</body>
</html>
