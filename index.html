<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaynos — Help Center</title>
  <meta name="theme-color" content="#060609" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    /* Design tokens aligned with Kaynos app (src/styles.css) */
    :root {
      --bg: #060609;
      --bg-elevated: #141418;
      --bg-secondary: #1e1e24;
      --bg-tertiary: #2a2a32;
      --bg-glass: rgba(20, 20, 24, 0.82);
      --bg-hover: rgba(245, 245, 247, 0.04);
      --bg-active: rgba(245, 245, 247, 0.07);
      --text-primary: #f0f0f4;
      --text-secondary: rgba(240, 240, 244, 0.68);
      --text-tertiary: rgba(240, 240, 244, 0.46);
      --border: rgba(240, 240, 244, 0.08);
      --border-strong: rgba(240, 240, 244, 0.15);
      --accent: #3b9eff;
      --accent-hover: #5aafff;
      --accent-soft: rgba(59, 158, 255, 0.12);
      --success: #32D74B;
      --warning: #FF9F0A;
      --danger: #FF453A;
      --font-body: 'Inter', 'Helvetica Neue', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
      --sidebar-w: 280px;
      --header-h: 56px;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 2px 20px rgba(0, 0, 0, 0.30), 0 0 1px rgba(255, 255, 255, 0.04);
      --shadow-lg: 0 12px 48px rgba(0, 0, 0, 0.40), 0 0 1px rgba(255, 255, 255, 0.05);
      --leading-normal: 1.5;
      --leading-relaxed: 1.65;
      --text-base: 0.875rem;
      --text-3xl: 1.875rem;
      --text-xl: 1.25rem;
      --text-lg: 1.0625rem;
      --ease-out: cubic-bezier(0.22, 0.61, 0.36, 1);
      --duration-fast: 0.15s;

      /* Legacy names used in markup */
      --text: var(--text-primary);
      --bg-sidebar: var(--bg-elevated);
      --bg-card: var(--bg-elevated);
      --bg-code: var(--bg-secondary);
      --border-light: var(--border);
      --accent-light: var(--accent-soft);
      --accent-dark: var(--accent-hover);

      color-scheme: dark;
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
      text-size-adjust: 100%;
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }

      html {
        scroll-behavior: auto;
      }
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: var(--bg-tertiary) transparent;
    }

    *::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    *::-webkit-scrollbar-track {
      background: transparent;
    }

    *::-webkit-scrollbar-thumb {
      background: var(--bg-tertiary);
      border-radius: 9999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    ::selection {
      background: rgba(59, 158, 255, 0.30);
      color: var(--text-primary);
    }

    body {
      font-family: var(--font-body);
      color: var(--text);
      background: var(--bg);
      line-height: var(--leading-normal);
      font-size: var(--text-base);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* HEADER */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-h);
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 100;
      gap: 16px
    }

    .header-logo {
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -.02em;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .header-logo span {
      opacity: .4;
      font-weight: 400
    }

    .header-search {
      flex: 1;
      max-width: 400px;
      position: relative
    }

    .header-search input {
      width: 100%;
      height: 36px;
      padding: 0 12px 0 36px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      background: var(--bg-secondary);
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--text);
      outline: none;
      transition: border-color var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out);
    }

    .header-search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(59, 158, 255, 0.12);
    }

    .header-search input::placeholder {
      color: var(--text-tertiary)
    }

    .header-search svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      pointer-events: none
    }

    .menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      padding: 4px
    }

    .search-results {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      max-height: 360px;
      overflow-y: auto;
      display: none;
      box-shadow: var(--shadow-lg);
    }

    .search-results.active {
      display: block
    }

    .search-result {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border-light);
      font-size: 14px
    }

    .search-result:last-child {
      border-bottom: none
    }

    .search-result:hover {
      background: var(--bg-hover);
    }

    .search-result .sr-title {
      font-weight: 500;
      margin-bottom: 2px
    }

    .search-result .sr-section {
      font-size: 12px;
      color: var(--text-tertiary)
    }

    .search-result .sr-snippet {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px
    }

    .search-result mark {
      background: var(--accent-soft);
      color: var(--accent-hover);
      border-radius: 2px;
      padding: 0 2px;
    }

    .search-empty {
      padding: 20px 14px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 14px
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      top: var(--header-h);
      left: 0;
      width: var(--sidebar-w);
      height: calc(100vh - var(--header-h));
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px 0;
      z-index: 90;
      transition: transform 0.25s var(--ease-out);
      box-shadow: inset 0 1px 0 rgba(59, 158, 255, 0.12);
    }

    .sidebar-section {
      margin-bottom: 8px
    }

    .sidebar-section-title {
      padding: 6px 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-tertiary)
    }

    .sidebar-link {
      display: block;
      padding: 6px 20px 6px 28px;
      font-size: 14px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color .1s, background .1s;
      cursor: pointer;
      border-left: 2px solid transparent
    }

    .sidebar-link:hover {
      color: var(--text);
      background: var(--bg-hover);
    }

    .sidebar-link.active {
      color: var(--accent);
      border-left-color: var(--accent);
      font-weight: 600;
      background: var(--accent-soft);
    }

    /* CONTENT */
    .content {
      margin-left: var(--sidebar-w);
      margin-top: var(--header-h);
      min-height: calc(100vh - var(--header-h))
    }

    .content-inner {
      max-width: 740px;
      margin: 0 auto;
      padding: 40px 48px 80px
    }

    /* TYPOGRAPHY */
    .content-inner h1 {
      font-size: var(--text-3xl);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .content-inner h2 {
      font-size: var(--text-xl);
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-top: 40px;
      margin-bottom: 12px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      line-height: 1.3;
    }

    .content-inner h2:first-of-type {
      border-top: none;
      padding-top: 0
    }

    .content-inner h3 {
      font-size: var(--text-lg);
      font-weight: 600;
      margin-top: 28px;
      margin-bottom: 8px;
    }

    .content-inner p {
      margin-bottom: 16px;
      color: var(--text)
    }

    .content-inner ul,
    .content-inner ol {
      margin-bottom: 16px;
      padding-left: 24px
    }

    .content-inner li {
      margin-bottom: 6px;
      color: var(--text)
    }

    .content-inner strong {
      font-weight: 600
    }

    .content-inner code {
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      background: var(--bg-code);
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      color: var(--accent-hover);
    }

    .content-inner a {
      color: var(--accent);
      text-decoration: none;
      transition: color var(--duration-fast) var(--ease-out);
    }

    .content-inner a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    .content-inner hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0
    }

    /* TABLES */
    .content-inner table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
      font-size: 14px
    }

    .content-inner th {
      text-align: left;
      padding: 10px 14px;
      background: var(--bg-code);
      font-weight: 600;
      font-size: 13px;
      border: 1px solid var(--border)
    }

    .content-inner td {
      padding: 10px 14px;
      border: 1px solid var(--border);
      vertical-align: top
    }

    /* HINTS */
    .hint {
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      font-size: var(--text-base);
      display: flex;
      gap: 10px;
      line-height: var(--leading-relaxed);
    }

    .hint-warning {
      background: rgba(255, 159, 10, 0.12);
      border: 1px solid rgba(255, 159, 10, 0.35);
      color: var(--text-primary);
    }

    .hint-info {
      background: var(--accent-soft);
      border: 1px solid rgba(59, 158, 255, 0.35);
      color: var(--text-primary);
    }

    .hint-info a,
    .hint-warning a,
    .hint-tip a,
    .hint-danger a {
      color: var(--accent-hover);
      font-weight: 500;
    }

    .hint-tip {
      background: rgba(50, 215, 75, 0.10);
      border: 1px solid rgba(50, 215, 75, 0.32);
      color: var(--text-primary);
    }

    .hint-danger {
      background: rgba(255, 69, 58, 0.12);
      border: 1px solid rgba(255, 69, 58, 0.38);
      color: var(--text-primary);
    }

    .hint-icon {
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 2px
    }

    /* QUICK LINKS */
    .quick-links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px
    }

    .quick-link {
      padding: 14px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      text-decoration: none;
      color: var(--text);
      transition: border-color var(--duration-fast) var(--ease-out),
        box-shadow var(--duration-fast) var(--ease-out),
        background var(--duration-fast) var(--ease-out);
      cursor: pointer;
      font-size: var(--text-base);
    }

    .quick-link:hover {
      border-color: var(--accent);
      background: var(--bg-secondary);
      box-shadow: var(--shadow);
      text-decoration: none;
    }

    .quick-link .ql-title {
      font-weight: 500;
      margin-bottom: 2px
    }

    .quick-link .ql-desc {
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    /* BREADCRUMB */
    .breadcrumb {
      font-size: 0.8125rem;
      color: var(--text-tertiary);
      margin-bottom: 16px;
    }

    .breadcrumb a {
      color: var(--text-tertiary);
      text-decoration: none
    }

    .breadcrumb a:hover {
      color: var(--accent-hover);
    }

    .breadcrumb span {
      margin: 0 6px
    }

    /* FOOTER NAV */
    .footer-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border)
    }

    .footer-nav a {
      text-decoration: none;
      color: var(--text-secondary);
      font-size: var(--text-base);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color var(--duration-fast) var(--ease-out);
    }

    .footer-nav a:hover {
      color: var(--accent-hover);
    }

    .footer-nav .fn-label {
      font-size: 12px;
      color: var(--text-tertiary)
    }

    .footer-nav .fn-title {
      font-weight: 500;
      color: var(--text)
    }

    .footer-nav a:hover .fn-title {
      color: var(--accent-hover);
    }

    /* MOBILE */
    @media(max-width:768px) {
      .sidebar {
        transform: translateX(-100%)
      }

      .sidebar.open {
        transform: translateX(0)
      }

      .content {
        margin-left: 0
      }

      .content-inner {
        padding: 24px 20px 60px
      }

      .menu-btn {
        display: block
      }

      .header-search {
        max-width: none
      }

      .quick-links {
        grid-template-columns: 1fr
      }

      .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 85
      }

      .overlay.active {
        display: block;
      }
    }

    .menu-btn:focus-visible,
    .header-search input:focus-visible,
    .sidebar-link:focus-visible,
    .quick-link:focus-visible,
    .header-logo:focus-visible,
    .footer-nav a:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px rgba(59, 158, 255, 0.55);
    }
  </style>
</head>

<body>

  <header class="header">
    <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
        <line x1="3" y1="5" x2="17" y2="5" />
        <line x1="3" y1="10" x2="17" y2="10" />

  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <nav class="sidebar" id="sidebar"></nav>

  <main class="content">
    <div class="content-inner" id="pageContent"></div>

  <script>
    const PAGES = {
      welcome: {
        title: "Welcome to Kaynos",
        section: "",
        content: `
<h1>Welcome to Kaynos</h1>
<p>Kaynos is video review for your school: coaches publish sessions and classes, add timestamped notes, and members watch when it fits their schedule. The product lives at <a href="https://app.kaynos.net" target="_blank" rel="noopener noreferrer">app.kaynos.net</a>.</p>

<ul>
<li><strong>Email:</strong> <a href="mailto:support@kaynos.net">support@kaynos.net</a></li>
<li><strong>Chat:</strong> Bottom-right in <a href="https://app.kaynos.net" target="_blank" rel="noopener noreferrer">the app</a> when you are logged in</li>
<li><strong>Expect:</strong> Usually same day on business days if you give us detail</li>
</ul>
`},

      setup: {
        title: "Setting up your school",
        section: "Getting Started",
        content: `

      "inviting-members": {

        section: "Getting Started",
        content: `
<h1>Inviting your team</h1>
<p>Members join by email with a temporary password. Admins may invite coaches or students; instructors may invite students only. That keeps roster control with staff. All of this happens in the app at <a href="https://app.kaynos.net" target="_blank" rel="noopener noreferrer">app.kaynos.net</a> under <strong>Admin</strong> or <strong>Students</strong>.</p>

<tr><td><strong>Student</strong></td><td>Nobody</td></tr>
</tbody></table>
<h2>What each role can do</h2>
<table><thead><tr><th>Role</th><th>What they can do</th></tr></thead><tbody>
<tr><td><strong>Admin</strong></td><td>Everything an instructor can do, plus roster, invites, and settings.</td></tr>
<tr><td><strong>Instructor</strong></td><td>Sessions, classes, video upload, notes, tags, and student progress.</td></tr>

</tbody></table>
<h2>Resend or reset</h2>
<p><strong>Admin</strong> → find them in the roster → <strong>Reset Password</strong>. Fresh temp password, new mail.</p>
<h2>Tips</h2>
<ul>
<li>Onboard coaches before adding a large student wave when you can.</li>
<li>Use an email address people check; it becomes their login.</li>
<li>No fixed seat limit in the product.</li>
</ul>
`},

      "first-upload": {
        title: "Your first video upload",
        section: "Getting Started",
        content: `
<h1>Your first video upload</h1>
<p>A <strong>session</strong> is for one assigned student (private lesson, individual review). A <strong>class</strong> is for everyone in the school (group lesson, open mat recap). Upload a file or link Vimeo in either case. Create them in the app after you <a href="https://app.kaynos.net" target="_blank" rel="noopener noreferrer">sign in</a>.</p>
<div class="hint hint-tip"><span class="hint-icon" aria-hidden="true">💡</span><div>New to the flow? Read <a onclick="navigate('creating-sessions')">Creating a session</a> and <a onclick="navigate('creating-classes')">Creating a class</a>. Limits and codecs: <a onclick="navigate('formats')">Supported formats and limits</a>.</div></div>
<h2>Upload a file</h2>
<ol>
<li>New session or class, pick <strong>Upload</strong> for the video source.</li>
<li>Drag onto the box or click to choose a file in Finder / Files.</li>
<li>Use the progress bar for speed and ETA.</li>
<li>Green check, then finish title / date / student and hit save.</li>
</ol>
<h2>Upload behavior</h2>
<ul>
<li>Smaller files (roughly under 100 MB) often upload in one request.</li>
<li>Larger files use chunked parallel upload with automatic retries (up to three) on network errors.</li>
<li>You can cancel an in-progress upload.</li>
</ul>
<h2>Supported formats</h2>
<table><thead><tr><th>Format</th><th>Extension</th><th>Notes</th></tr></thead><tbody>
<tr><td>MP4</td><td>.mp4</td><td>Recommended default</td></tr>
<tr><td>MOV</td><td>.mov</td><td>Common on iPhone and GoPro</td></tr>
<tr><td>WebM</td><td>.webm</td><td>Screen and browser capture</td></tr>
<tr><td>MKV</td><td>.mkv</td><td>Supported; less common</td></tr>
</tbody></table>
<p>Maximum file size <strong>5 GB</strong>. Very large files may take a long time depending on upload speed. Full table: <a onclick="navigate('formats')">Supported formats and limits</a>.</p>
<h2>Vimeo</h2>
<p>Use the <strong>Vimeo</strong> source and paste the URL or video ID to embed video you already host on <a href="https://vimeo.com" target="_blank" rel="noopener noreferrer">Vimeo</a>. See Vimeo’s <a href="https://help.vimeo.com/hc/en-us" target="_blank" rel="noopener noreferrer">Help Center</a> for sharing links and privacy.</p>
<h2>Recording tips</h2>
<ul>
<li>Landscape. Your TV and your phone both want it.</li>
<li>Camera slightly high so the full training area is visible, not only lower legs.</li>
<li>Even lighting makes small details easier to see on review.</li>
</ul>
`},

      roles: {
        title: "Understanding user roles",
        section: "Getting Started",
        content: `
<h1>Understanding user roles</h1>
<p>Each person has one of three roles. Assign them so permissions match how your school runs.</p>
<h2>Admin</h2>
<p>Typically the owner or head instructor. Same capabilities as instructors, plus roster management, invites, role changes, and the <strong>Admin</strong> area for school-wide visibility.</p>
<h2>Instructor</h2>
<p>Instructors run sessions and classes, upload video, add notes and tags, and view student progress.</p>
<h2>Student</h2>
<p>Students access their assigned sessions and all school classes, watch video, add notes, and track viewing progress. They cannot upload video or view other students’ private sessions.</p>
<h2>Change a role</h2>
<p>Admins only: <strong>Admin</strong> → member → role dropdown → save.</p>
<div class="hint hint-warning"><span class="hint-icon">⚠️</span><div>Downgrading an instructor to a student removes the ability to create sessions or upload video. Existing content remains available. For invite rules, see <a onclick="navigate('inviting-members')">Inviting your team</a>.</div></div>
`},

      uploading: {
        title: "Uploading videos",
        section: "Video",
        content: `

<div class="hint hint-info"><span class="hint-icon" aria-hidden="true">ℹ️</span><div>Format and size caps: <a onclick="navigate('formats')">Supported formats and limits</a>. Stuck? <a onclick="navigate('upload-issues')">Video upload problems</a>.</div></div>
<h2>Large files</h2>
<p>Big uploads are split into chunks and sent with parallel connections. Failed parts retry automatically (up to three times) with backoff.</p>
<h2>Requirements</h2>
<ul>

      playback: {

      progress: {

        section: "Sessions & Classes",
        content: `

      "upload-issues": {
        title: "Video upload problems",
        section: "Troubleshooting",
        content: `
<h1>Video upload problems</h1>
<p>Large uploads depend on stable internet and a supported format. Check the items below before assuming an app bug.</p>
<div class="hint hint-info"><span class="hint-icon" aria-hidden="true">ℹ️</span><div>Reference: <a onclick="navigate('formats')">Supported formats and limits</a>, <a onclick="navigate('uploading')">Uploading videos</a>. Product URL: <a href="https://app.kaynos.net" target="_blank" rel="noopener noreferrer">app.kaynos.net</a>.</div></div>
<h2>Fails right away</h2>
<p><strong>“Please select a video file”</strong>: the file may not be MP4, MOV, WebM, or MKV. Convert to MP4 with <a href="https://handbrake.fr" target="_blank" rel="noopener noreferrer">HandBrake</a> or <a href="https://www.videolan.org/vlc/" target="_blank" rel="noopener noreferrer">VLC</a>, then try again.</p>
<p><strong>Too big</strong>: the limit is 5 GB. Trim the clip or export at 1080p; HandBrake’s “Fast 1080p30” preset is a common choice.</p>
<h2>Progress appears stuck</h2>
<ol>
<li>Large files can pause between chunks for roughly 30–60 seconds.</li>
<li>Confirm the network works (open another site).</li>
<li>Cancel the upload and start again if it does not advance.</li>
</ol>
<h2>Fails partway</h2>
<ul>
<li><strong>Network error during part upload</strong>: reconnect and retry.</li>
<li><strong>Part upload failed: 403</strong>: on very long uploads the session can expire. Cancel and upload again.</li>
<li><strong>500</strong>: server-side error. Wait briefly and retry; if it persists, email <a href="mailto:support@kaynos.net">support@kaynos.net</a>.</li>
</ul>
<h2>Slow uploads</h2>
<p>Measure <strong>upload</strong> speed, not download. <a href="https://fast.com" target="_blank" rel="noopener noreferrer">fast.com</a> shows upload after the first result.</p>
<table><thead><tr><th>Upload speed</th><th>500 MB</th><th>1 GB</th><th>2 GB</th></tr></thead><tbody>
<tr><td>10 Mbps</td><td>~7 min</td><td>~14 min</td><td>~28 min</td></tr>
<tr><td>25 Mbps</td><td>~3 min</td><td>~5 min</td><td>~11 min</td></tr>
<tr><td>50 Mbps</td><td>~1.5 min</td><td>~3 min</td><td>~5 min</td></tr>
<tr><td>100 Mbps</td><td>~45 sec</td><td>~1.5 min</td><td>~3 min</td></tr>
</tbody></table>
<p>A wired connection often beats crowded gym Wi‑Fi. Pause heavy sync tools. Upload during a quieter time if the network is busy.</p>
<h2>Status stuck on “uploading”</h2>
<p>Contact <a href="mailto:support@kaynos.net">support@kaynos.net</a> with the session or class so we can reset the status if the browser closed mid-upload.</p>
<h2>Still failing</h2>
<p>Email <a href="mailto:support@kaynos.net">support@kaynos.net</a>: school name, browser, file type and size, and a screenshot if you have one.</p>
`},

      "playback-issues": {
        title: "Video playback problems",
        section: "Troubleshooting",
        content: `
<h1>Video playback problems</h1>
<p>If the player is blank or errors, work through these checks.</p>
<div class="hint hint-info"><span class="hint-icon" aria-hidden="true">ℹ️</span><div>General playback behavior: <a onclick="navigate('playback')">Watching and reviewing</a>. Codecs: <a onclick="navigate('formats')">Supported formats and limits</a>. App: <a href="https://app.kaynos.net" target="_blank" rel="noopener noreferrer">app.kaynos.net</a>.</div></div>
<h2>Player blank or broken controls</h2>
<p><strong>Black screen / no controls:</strong> refresh, then hard refresh or clear cache, then try <a href="https://www.google.com/chrome/" target="_blank" rel="noopener noreferrer">Chrome</a>. Confirm the upload finished (not “uploading” or “failed”).</p>
<p><strong>“Cannot be played”:</strong> often a codec or browser issue. MKV can fail in Safari; try <a href="https://www.google.com/chrome/" target="_blank" rel="noopener noreferrer">Chrome</a> or <a href="https://www.mozilla.org/firefox/" target="_blank" rel="noopener noreferrer">Firefox</a>, or re-export to MP4 with H.264 video and AAC audio.</p>
<h2>Buffering or long spinners</h2>
<ul>
<li>Check bandwidth (upload and download can differ by network).</li>
<li>Close other streaming tabs or heavy downloads.</li>
<li>Very high-bitrate 4K sources may stutter; a 1080p export may play more reliably.</li>
</ul>
<h2>Sound but no picture (or the reverse)</h2>
<p>Often a codec mismatch. Try another browser; if it persists, re-export with standard H.264/AAC.</p>
<h2>Resume position wrong</h2>
<p>Progress saves shortly after pausing. Closing the tab immediately can occasionally skip the save.</p>
`},

      "login-issues": {
        title: "Login and access issues",
        section: "Troubleshooting",
        content: `
<h1>Login and access issues</h1>

      faq: {
        title: "Frequently asked questions",
        section: "FAQ",
        content: `
<h1>Frequently asked questions</h1>
<p>Kaynos is built for schools that use video review: instructors publish sessions and classes, add timestamped notes, and members watch on their own time. The rest of this help center covers setup and troubleshooting in detail.</p>
<div class="hint hint-info"><span class="hint-icon" aria-hidden="true">📌</span><div><strong>Quick links</strong><br>App: <a href="https://app.kaynos.net" target="_blank" rel="noopener noreferrer">app.kaynos.net</a> · Support: <a href="mailto:support@kaynos.net">support@kaynos.net</a> · Setup: <a onclick="navigate('setup')">Setting up your school</a></div></div>

<h2>What you are signing up for</h2>

<h3>What is Kaynos, in plain language?</h3>
<p>It replaces ad-hoc clip sharing in chat. You put instruction or sparring footage on a <strong>session</strong> (one student) or a <strong>class</strong> (everyone in the school), add notes on the timeline, and students review when they can. Everything runs in the browser at <a href="https://app.kaynos.net" target="_blank" rel="noopener noreferrer">app.kaynos.net</a>, without a separate app install.</p>

<h3>Do my students need to install something?</h3>
<p>No. They open <a href="https://app.kaynos.net" target="_blank" rel="noopener noreferrer">app.kaynos.net</a> in a normal phone or laptop browser. If YouTube works on your network, Kaynos should too.</p>

<h3>Is this only for BJJ?</h3>
<p>Kaynos started with Brazilian jiu-jitsu, but the same workflow fits any sport or gym where coaches annotate video: wrestling, judo, MMA, striking, and similar programs.</p>

<hr>

<h2>Running the school</h2>

<h3>Do you cap how many students or coaches I can add?</h3>
<p>No. The product does not enforce a member or coach limit.</p>

<h3>Can students watch each other’s private lessons?</h3>
<p><strong>No.</strong> A <strong>session</strong> is visible only to that student, staff who created or need it, and admins. <strong>Classes</strong> are shared with everyone in the school, like a group lesson recording.</p>

<h3>Can families download my class video and pass it around?</h3>
<p>There is no download button for end users. Playback uses expiring streaming links. Your curriculum stays harder to copy out as a casual file share.</p>

<hr>

<h2>Trust, minors on camera, and policy</h2>

<h3>How serious are you about security?</h3>
<p>HTTPS in transit, hashed passwords, and video in cloud storage behind a CDN. See <a onclick="navigate('storage')">Video storage and retention</a> for storage detail.</p>

<h3>What about minors on the footage?</h3>
<p>Your school is responsible for waivers, parental consent, and local law, the same as for any training footage. Read the <a href="https://app.kaynos.net/terms" target="_blank" rel="noopener noreferrer">Terms of Service</a> in the app. For legal questions, consult qualified counsel; we cannot provide legal advice.</p>

<hr>

<h2>Devices and integrations</h2>

<h3>Which browsers are supported?</h3>
<p>Current Chrome, Firefox, Safari, and Edge. If upload or playback fails in one browser, trying Chrome is a reasonable first step.</p>

<h3>Do you expose an API?</h3>
<p>Yes. School admins can create API tokens for scripts and integrations. Read <a onclick="navigate('developer-api')">Developer API</a> and avoid committing secrets to source control.</p>

<hr>

<h2>Support</h2>

<h3>How do I contact you?</h3>
<p>Email <a href="mailto:support@kaynos.net">support@kaynos.net</a> with what happened, what you expected, school name, and browser. A screenshot or short screen recording speeds up diagnosis. In-app chat is available when you are logged in to <a href="https://app.kaynos.net" target="_blank" rel="noopener noreferrer">app.kaynos.net</a>.</p>
`},

      "developer-api": {
        title: "Developer API",
        section: "Developers",
        content: `
<h1>Developer API</h1>
<p>For schools that want automation beyond the web UI: schedules, exports, or custom reporting. The API is HTTPS-only and scoped to your school’s data. Create and manage tokens under <strong>Admin → Developer API</strong> in <a href="https://app.kaynos.net" target="_blank" rel="noopener noreferrer">app.kaynos.net</a> (admin role required).</p>

<div class="hint hint-info"><span class="hint-icon" aria-hidden="true">📘</span><div><strong>Swagger first</strong><br>Sign in as a <strong>school admin</strong>, then open the in-app docs. The same browser session lets <em>Try it out</em> use your cookies.<br><a href="https://app.kaynos.net/admin/api-docs" target="_blank" rel="noopener noreferrer">Swagger UI (production)</a></div></div>

<div class="hint hint-danger"><span class="hint-icon" aria-hidden="true">🔐</span><div><strong>Secrets</strong><br>API tokens are as sensitive as passwords. Store them in a secret manager or env vars; never commit them to git or expose them in frontend code.</div></div>

<p>OpenAPI YAML: <a href="https://app.kaynos.net/openapi.yaml" target="_blank" rel="noopener noreferrer">app.kaynos.net/openapi.yaml</a> and mirror <a href="https://raw.githubusercontent.com/jlambert229/kaynos/main/public/openapi.yaml" target="_blank" rel="noopener noreferrer">GitHub raw</a>.</p>
<div class="hint hint-warning"><span class="hint-icon" aria-hidden="true">⚠️</span><div>If the app URL returns HTML instead of YAML, use the GitHub raw link (some caches or routing edge cases).</div></div>

<h2>Two doors in</h2>
<ul>
<li><strong><code>/api/v1/...</code></strong> for scripts and integrations: Bearer token minted under <strong>Admin → Developer API</strong>.</li>
<li><strong><code>/api/integrations/...</code></strong> while you’re logged into the browser: create/list/revoke tokens via session cookie (Swagger “Try it out”).</li>
<li>In-app route <strong><code>/admin/api-docs</code></strong> is Swagger; admin hat required.</li>
</ul>

<h2>Where to point the curl</h2>
<table>
<thead><tr><th>Where</th><th>Host</th><th>API prefix</th></tr></thead>
<tbody>
<tr><td>Production</td><td><a href="https://app.kaynos.net" target="_blank" rel="noopener noreferrer"><code>https://app.kaynos.net</code></a></td><td><code>/api/v1</code></td></tr>
<tr><td>Local Netlify dev</td><td><code>http://localhost:8888</code> (typical)</td><td><code>/api/v1</code></td></tr>
</tbody>
</table>
<p>Quick discovery: <code>GET /api/v1</code> lists routes, no token needed.</p>

<h2>Bearer header</h2>
<pre style="background:var(--bg-code);padding:14px 16px;border-radius:var(--radius-sm);font-family:var(--font-mono);font-size:0.8125rem;overflow-x:auto;margin-bottom:16px;border:1px solid var(--border)">Authorization: Bearer kn_&lt;your-secret&gt;</pre>
<p>We show the secret exactly once when you mint it. Treat it like a Stripe key: password manager or env var, never committed.</p>

<h3>Scopes (keep it tight)</h3>
<table>
<thead><tr><th>Scope</th><th>Does</th></tr></thead>
<tbody>
<tr><td><code>read</code></td><td>GETs for sessions, classes, members, etc.</td></tr>
<tr><td><code>write</code></td><td>Creates/updates/deletes plus reads.</td></tr>
</tbody>
</table>

<h3>Whose permissions?</h3>
<p>The token inherits the admin (or whoever created it) as far as the product is concerned. They can’t do it in the UI, API returns <code>403</code>. No backdoors.</p>

<h2>What v1 covers (Swagger = truth for fields)</h2>
<ul>
<li>Sessions and classes (life cycle + progress reads)</li>
<li>Members / roster where the product allows automation</li>
<li>Notes pinned to sessions and classes</li>
</ul>

<h2>Managing tokens while logged in</h2>
<ol>
<li><code>GET /api/integrations/tokens</code> to inspect metadata</li>
<li><code>POST /api/integrations/tokens</code> with body like <code>{"name":"nightly-export","scopes":["read"]}</code> (add <code>write</code> only if you mean it); plaintext secret returns once</li>
<li><code>DELETE /api/integrations/tokens/{id}</code> to burn a compromised key</li>
</ol>

<h2>When calls fail</h2>
<p>JSON body with an <code>error</code> string. Typical: <code>401</code> missing/invalid token, <code>403</code> wrong scope or role, <code>404</code> thing not in your school, <code>400</code> bad payload.</p>

<h2>Operational practices</h2>
<ul>
<li>Rotate API keys when technical staff leave.</li>
<li>Prefer read-only scopes until write access is clearly required.</li>
<li>Never embed secrets in client-side code; keep tokens on the server.</li>
</ul>

<h2>Quick links</h2>
<ul>
<li><a href="https://app.kaynos.net/admin/api-docs" target="_blank" rel="noopener noreferrer">Swagger</a></li>
<li><a href="https://app.kaynos.net/openapi.yaml" target="_blank" rel="noopener noreferrer">OpenAPI (app host)</a></li>
<li><a href="https://raw.githubusercontent.com/jlambert229/kaynos/main/public/openapi.yaml" target="_blank" rel="noopener noreferrer">OpenAPI (GitHub raw)</a></li>
</ul>
`}

    const NAV = [
      { section: "", pages: ["welcome"] },
      { section: "Getting Started", pages: ["setup", "inviting-members", "first-upload", "roles"] },
      { section: "Video", pages: ["uploading", "playback", "formats", "storage"] },
      { section: "Sessions & Classes", pages: ["creating-sessions", "creating-classes", "notes", "tags", "progress"] },
      { section: "Account Management", pages: ["managing-members", "profile", "notifications"] },
      { section: "Developers", pages: ["developer-api"] },
      { section: "Troubleshooting", pages: ["upload-issues", "playback-issues", "login-issues", "email-issues", "performance", "mobile"] },
      { section: "FAQ", pages: ["faq"] }
    ];

    const allPageKeys = NAV.flatMap(g => g.pages);

    function buildSidebar() {
      const sb = document.getElementById('sidebar');
      let html = '';
      NAV.forEach(g => {
        if (g.section) html += `<div class="sidebar-section"><div class="sidebar-section-title">${g.section}</div>`;
        else html += `<div class="sidebar-section">`;
        g.pages.forEach(p => {
          html += `<a class="sidebar-link" data-page="${p}" onclick="navigate('${p}')">${PAGES[p].title}</a>`;
        });
        html += '</div>';
      });
      sb.innerHTML = html;
    }

    function navigate(pageId) {
      const page = PAGES[pageId];
      if (!page) return;
      document.getElementById('pageContent').innerHTML = page.content;
      document.querySelectorAll('.sidebar-link').forEach(l => l.classList.toggle('active', l.dataset.page === pageId));
      window.scrollTo(0, 0);
      history.pushState({ page: pageId }, '', '#' + pageId);
      document.title = page.title + ' — Kaynos Docs';
      closeSidebar();
      document.getElementById('searchInput').value = '';
      document.getElementById('searchResults').classList.remove('active');
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('active');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('active');
    }

    function handleSearch(q) {
      const sr = document.getElementById('searchResults');
      if (!q || q.length < 2) { sr.classList.remove('active'); sr.innerHTML = ''; return }
      const lower = q.toLowerCase();
      const results = [];
      for (const [id, page] of Object.entries(PAGES)) {
        const text = page.content.replace(/<[^>]+>/g, ' ').toLowerCase();
        const idx = text.indexOf(lower);
        if (idx !== -1 || page.title.toLowerCase().includes(lower)) {
          let snippet = '';
          if (idx !== -1) {
            const start = Math.max(0, idx - 40);
            const end = Math.min(text.length, idx + q.length + 60);
            snippet = (start > 0 ? '...' : '') + text.slice(start, end).replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), m => `<mark>${m}</mark>`) + (end < text.length ? '...' : '');
          }
          results.push({ id, title: page.title, section: page.section, snippet });
        }
      }
      if (results.length === 0) {
        sr.innerHTML = '<div class="search-empty">No results found</div>';
      } else {
        sr.innerHTML = results.slice(0, 8).map(r => `<div class="search-result" onclick="navigate('${r.id}')"><div class="sr-title">${r.title}</div>${r.section ? `<div class="sr-section">${r.section}</div>` : ''}${r.snippet ? `<div class="sr-snippet">${r.snippet}</div>` : ''}</div>`).join('');
      }
      sr.classList.add('active');
    }

    document.addEventListener('click', e => {
      if (!e.target.closest('.header-search')) document.getElementById('searchResults').classList.remove('active');
    });
    document.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus() }
    });

    window.addEventListener('popstate', e => {
      if (e.state && e.state.page) navigate(e.state.page);
      else navigate('welcome');
    });

    buildSidebar();
    const hash = location.hash.slice(1);
    navigate(hash && PAGES[hash] ? hash : 'welcome');
  </script>
